ic flexure is the junction of the ascending and transverse colon, not transverse-to-descending.", "Correct — the splenic flexure is the junction of the transverse and descending colon, located under the spleen in the left upper quadrant.", "Incorrect — the ileocecal junction connects the small intestine to the cecum, unrelated to this junction.", "Incorrect — the sigmoid colon is further distal, connecting the descending colon to the rectum."], "concept": "Colon flexures: hepatic flexure (ascending to transverse, right side) and splenic flexure (transverse to descending, left side).", "formula": "", "id": 541, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/GI", "stem": "An outpouching or weakening of the intestinal wall most commonly seen in the large intestine is termed:", "choices": ["Diverticulum", "Aneurysm", "Calculus", "Fistula"], "correct": 0, "expl": ["Correct — a diverticulum is an outpouching/weakening of the intestinal wall, most commonly seen in the large intestine (diverticulosis).", "Incorrect — an aneurysm describes a vascular wall outpouching, not intestinal.", "Incorrect — a calculus is a stone (e.g., gallstone, kidney stone), not an outpouching.", "Incorrect — a fistula is an abnormal connection between two structures, not simply an outpouching."], "concept": "Diverticula are common acquired outpouchings of the colon wall, particularly in the sigmoid colon, increasing in prevalence with age.", "formula": "", "id": 542, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/GI", "stem": "The curative treatment of choice for gastric carcinoma is:", "choices": ["Chemotherapy", "Radiation therapy", "Surgery", "Cryotherapy"], "correct": 2, "expl": ["Incorrect — chemotherapy is typically adjuvant/neoadjuvant, not the primary curative modality.", "Incorrect — radiation therapy plays an adjuvant role, not the primary curative modality.", "Correct — surgical resection remains the curative treatment of choice for gastric carcinoma.", "Incorrect — cryotherapy is not a standard curative modality for gastric carcinoma."], "concept": "Surgery (gastrectomy) is the mainstay curative treatment for localized gastric cancer, often combined with perioperative chemotherapy/chemoradiation.", "formula": "", "id": 543, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/GI", "stem": "The most common presenting symptom of cancer of the stomach among the following is:", "choices": ["Severe pain", "Hematemesis", "Vague epigastric discomfort", "Palpable mass"], "correct": 2, "expl": ["Incorrect — severe pain is not the most common early presenting symptom.", "Incorrect — hematemesis is a less common, later presenting sign.", "Correct — vague, nonspecific epigastric discomfort is the most common early presenting symptom of gastric cancer, contributing to frequent late-stage diagnosis.", "Incorrect — a palpable mass is typically a late finding, not the most common presenting symptom."], "concept": "Gastric cancer's vague early symptoms (indigestion-like discomfort) often delay diagnosis until more advanced stages.", "formula": "", "id": 544, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/GI", "stem": "True or false: Surgery is used more for tumors located in the upper one-third of the esophagus.", "choices": ["True — surgery is preferred for upper-third tumors", "False — surgery is used more for tumors in the lower one-third of the esophagus", "True — surgery is equally used across all esophageal locations", "False — surgery is never used for esophageal cancer"], "correct": 1, "expl": ["Incorrect — this misstates the standard approach; upper esophageal tumors are more often treated primarily with chemoradiation due to proximity to critical structures.", "Correct — the statement is false; surgery is used more often for tumors of the lower one-third of the esophagus, where resection is more anatomically feasible.", "Incorrect — surgical approach differs by tumor location, and it is not used equally across all esophageal sites.", "Incorrect — surgery remains an important modality for many esophageal cancers, just not preferentially for upper-third tumors."], "concept": "Upper esophageal tumors, near the larynx/pharynx and great vessels, are often managed with definitive chemoradiation, while lower-third tumors are more amenable to surgical resection.", "formula": "", "id": 545, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/GI", "stem": "True or false: Adenocarcinomas of the esophagus are more frequently located in the lower one-third of the esophagus.", "choices": ["True", "False — they occur more often in the upper third", "False — they occur more often in the middle third", "False — location has no association with histology"], "correct": 0, "expl": ["Correct — the statement is true; esophageal adenocarcinomas (often Barrett's-related) are more frequently found in the lower one-third/gastroesophageal junction.", "Incorrect — squamous cell carcinoma, not adenocarcinoma, is more common in the upper esophagus.", "Incorrect — adenocarcinoma is more classically associated with the lower, not middle, esophagus.", "Incorrect — there is a well-established location-histology association in esophageal cancer."], "concept": "Esophageal adenocarcinoma is strongly linked to Barrett's esophagus/GERD and predominates in the distal esophagus/GE junction, while squamous cell carcinoma predominates proximally.", "formula": "", "id": 546, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/GI", "stem": "Common sites for metastasis for colon cancer are: (1) Liver (2) Lung (3) Peritoneum (4) Bone", "choices": ["1, 3", "2, 3", "2, 3, and 4", "1, 2, and 3"], "correct": 3, "expl": ["Incorrect — lung and peritoneum are also common sites, along with liver.", "Incorrect — liver is also a common (in fact the most common) site of colon cancer metastasis.", "Incorrect — liver is a very common site of colon cancer metastasis, more so than bone.", "Correct — colon cancer commonly metastasizes to the liver (most common, via portal circulation), lungs, and peritoneum."], "concept": "Colon cancer's venous drainage via the portal system makes the liver the most common metastatic site, with lung and peritoneal spread also common.", "formula": "", "id": 547, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/GI", "stem": "Dietary factors associated with increased risk of gastric cancers include:", "choices": ["Low consumption of fruits and vegetables", "Low consumption of smoked and salted foods", "High consumption of smoked and salted foods", "A & B", "A & C"], "correct": 4, "expl": ["Incorrect — low fruit/vegetable intake is one of two classic dietary risk factors, but this option alone is incomplete.", "Incorrect — low consumption of smoked/salted foods would be protective, not a risk factor.", "Incorrect — high smoked/salted food intake is one classic risk factor, but this option alone is incomplete.", "Incorrect — low smoked/salted food consumption is protective, not a risk factor; this pairing is incorrect.", "Correct — low fruit/vegetable consumption and high consumption of smoked/salted foods are both classic dietary risk factors for gastric cancer."], "concept": "Diets low in fresh produce and high in smoked/salted/preserved foods (associated with nitrosamine formation) increase gastric cancer risk.", "formula": "", "id": 548, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/GI", "stem": "Radiation treatment fields for cancer of the ____ should include inguinal lymph nodes.", "choices": ["Small bowel", "Anus", "Sigmoid colon", "Rectum"], "correct": 1, "expl": ["Incorrect — small bowel cancer does not typically require elective inguinal nodal coverage.", "Correct — anal cancer treatment fields routinely include the inguinal lymph nodes due to the anal canal's dual lymphatic drainage pattern.", "Incorrect — sigmoid colon cancer does not typically require inguinal nodal coverage.", "Incorrect — rectal cancer fields generally do not require elective inguinal coverage unless there is very distal/anal margin involvement."], "concept": "The anal canal drains to both pelvic and inguinal lymph nodes (unlike the rectum), so anal cancer radiation fields must cover the inguinal region.", "formula": "", "id": 549, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Treatment Planning/Calculation", "stem": "A three-field technique for treatment of the rectum is weighted 2:1:1 PA:RT:LT. Total prescribed dose is 50 Gy. The posterior field contribution will be:", "choices": ["12.5 Gy", "20 Gy", "25 Gy", "40 Gy"], "correct": 2, "expl": ["Incorrect — this would correspond to a 1:1:1:1 (quarter) weighting, not 2:1:1.", "Incorrect — this underestimates the posterior field's 2-unit share of the total weighting.", "Correct — with a 2:1:1 weighting (4 total weight units), the PA field carries 2/4 = 50% of the dose: 50 Gy x 0.5 = 25 Gy.", "Incorrect — this overestimates the posterior field's share of the weighted total."], "concept": "For weighted multi-field techniques, each field's dose contribution = total prescribed dose x (its weight / sum of all weights).", "formula": "PA contribution = Total dose x [PA weight / (PA+RT+LT weights)] = 50 x (2/4) = 25 Gy", "id": 550, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Patient Care/Side Effects", "stem": "Intense desquamation may occur in the gluteal fold during radiation therapy to the lower pelvis. Patients should be advised to:", "choices": ["Use cold packs in the folds twice daily", "Take hot baths daily", "Apply Vaseline every other day", "Gently pat the area dry after each toilet"], "correct": 3, "expl": ["Incorrect — cold packs are not standard skin-care advice for desquamation in skin folds.", "Incorrect — hot baths can further irritate already-compromised, desquamating skin.", "Incorrect — petroleum-based products are generally avoided on open/moist desquamation without physician direction.", "Correct — gentle patting dry after toileting (rather than rubbing) minimizes further mechanical irritation to already compromised skin in the gluteal fold."], "concept": "Skin-care instructions for moist desquamation emphasize gentle handling and avoidance of friction, heat, and irritants.", "formula": "", "id": 551, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/GI", "stem": "A risk factor associated with colon cancer is:", "choices": ["Exposure to ultraviolet light", "Diet high in salty foods", "History of colon polyps", "Human papilloma virus"], "correct": 2, "expl": ["Incorrect — UV light exposure is a risk factor for skin cancer, not colon cancer.", "Incorrect — a salty diet is more classically linked to gastric cancer, not colon cancer.", "Correct — a history of colon (adenomatous) polyps is a well-established risk factor for colon cancer via the adenoma-carcinoma sequence.", "Incorrect — HPV is linked to cervical, anal, and oropharyngeal cancers, not typically colon cancer."], "concept": "Adenomatous polyps are precursor lesions for colorectal cancer, making a personal/family history of polyps a key risk factor.", "formula": "", "id": 552, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Anatomy/Pathology", "stem": "Intestinal tumors grow progressively through the layers of the intestines in the following order:", "choices": ["Serosa, submucosa, mucosa, muscularis", "Muscularis, serosa, submucosa, mucosa", "Mucosa, submucosa, muscularis, serosa", "Submucosa, mucosa, serosa, muscularis"], "correct": 2, "expl": ["Incorrect — this reverses the correct order of layers.", "Incorrect — this does not match the correct anatomic sequence from lumen outward.", "Correct — intestinal wall layers from innermost (lumen) to outermost are mucosa, submucosa, muscularis (propria), and serosa; tumors invade progressively through these layers.", "Incorrect — this does not match the correct anatomic sequence from lumen outward."], "concept": "Bowel wall layer order (inside to outside): mucosa -> submucosa -> muscularis propria -> serosa. This is the basis for T-staging depth of invasion.", "formula": "", "id": 553, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Treatment Planning/Calculation", "stem": "In an anal cancer case, an electron boost will be required for the superficial inguinal nodes determined to be approximately 5 cm deep from the anterior surface. The appropriate electron energy beam would be:", "choices": ["5 MeV", "9 MeV", "15 MeV", "30 MeV"], "correct": 2, "expl": ["Incorrect — 5 MeV would only reach a much shallower depth (~1.7 cm to 80% line).", "Incorrect — 9 MeV would only reach roughly 3 cm to the 80% dose line, insufficient for a 5 cm depth.", "Correct — using the rule Energy/3 = approx depth of 80% dose line, 15 MeV/3 = 5 cm matches the required depth.", "Incorrect — 30 MeV would overshoot, delivering unnecessary dose well beyond the 5 cm target depth."], "concept": "Rule of thumb for electron beam energy selection: depth of 80% isodose line (cm) is approximately Energy(MeV)/3.", "formula": "Energy(MeV) approx = 3 x depth to 80% line (cm)", "id": 554, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Patient Positioning", "stem": "Which patient position helps reduce the volume of bowel in the pelvis?", "choices": ["Supine", "Prone", "Lateral", "Lithotomy"], "correct": 1, "expl": ["Incorrect — supine positioning does not use gravity to displace bowel out of the pelvis.", "Correct — prone positioning (often with a belly board) uses gravity to displace small bowel out of the pelvic treatment field.", "Incorrect — lateral positioning is not standard practice for reducing pelvic bowel volume.", "Incorrect — lithotomy positioning is not standard practice for reducing pelvic bowel volume in external beam RT."], "concept": "Prone positioning with a belly board allows gravity to pull small bowel anteriorly/superiorly out of the pelvic radiation field.", "formula": "", "id": 555, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Treatment Planning", "stem": "To avoid exceeding the dose limits to the kidneys, the ____ technique is often employed when treating the pancreas.", "choices": ["Three field", "Four field", "Posterior oblique", "Wedged pair"], "correct": 0, "expl": ["Correct — a three-field technique is often used for pancreatic treatment to help limit dose to the bilateral kidneys.", "Incorrect — four-field is not the classic technique specifically cited for pancreatic kidney sparing here.", "Incorrect — a simple posterior oblique alone is not the standard described technique.", "Incorrect — wedged pair is not the standard described technique for pancreatic kidney sparing."], "concept": "Multi-field pancreatic techniques are designed to spare the bilateral kidneys, which lie adjacent to the pancreas and have defined dose tolerance limits.", "formula": "", "id": 556, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/GI", "stem": "Which histologic type of small bowel cancer has the best prognosis?", "choices": ["Adenocarcinoma", "Sarcoma", "Lymphoma", "Carcinoid"], "correct": 3, "expl": ["Incorrect — adenocarcinoma of the small bowel carries a less favorable prognosis than carcinoid.", "Incorrect — sarcoma of the small bowel carries a less favorable prognosis than carcinoid.", "Incorrect — lymphoma prognosis is variable but generally not as favorable overall as carcinoid.", "Correct — carcinoid tumors are slow-growing with high survival rates, giving them the best prognosis among small bowel cancer histologies."], "concept": "Carcinoid tumors are indolent neuroendocrine tumors, generally associated with better long-term survival than other small bowel malignancies.", "formula": "", "id": 557, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Staging", "stem": "MAC stage A for colorectal cancer correlates to the TNM system stage ____.", "choices": ["0", "1", "2", "3"], "correct": 0, "expl": ["Correct — Modified Astler-Coller (MAC) stage A corresponds to TNM stage 0 (in situ/limited to mucosa).", "Incorrect — MAC stage A corresponds to TNM stage 0, not stage 1.", "Incorrect — MAC stage A corresponds to TNM stage 0, not stage 2.", "Incorrect — MAC stage A corresponds to TNM stage 0, not stage 3."], "concept": "Correlating older staging systems (Dukes/MAC) with TNM staging is a common tested comparison; MAC A is approximately TNM stage 0.", "formula": "", "id": 558, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Anatomy", "stem": "The highest portion of the normal adult stomach, sitting just below the left diaphragm, is the:", "choices": ["Pylorus", "Cardiac orifice", "Fundus", "Greater curvature"], "correct": 2, "expl": ["Incorrect — the pylorus is the most distal (inferior) portion of the stomach, near the duodenum.", "Incorrect — the cardiac orifice is the entry point from the esophagus, not the highest dome-shaped portion.", "Correct — the fundus is the dome-shaped, superior-most portion of the stomach, positioned just below the left diaphragm.", "Incorrect — the greater curvature is the long outer lateral border, not the highest point."], "concept": "Stomach anatomy from superior to inferior: fundus (dome under left diaphragm) -> body -> antrum -> pylorus.", "formula": "", "id": 559, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Anatomy", "stem": "The biliary ducts are principally concerned with the transport of bile and digestive enzymes into the:", "choices": ["Colon", "Stomach", "Small intestine", "Lymphatic system"], "correct": 2, "expl": ["Incorrect — bile is not delivered to the colon directly by the biliary ducts.", "Incorrect — bile is not delivered to the stomach.", "Correct — the biliary ducts transport bile (and pancreatic enzymes via the common bile duct/ampulla) into the small intestine (duodenum).", "Incorrect — the biliary system is a digestive drainage pathway, not a lymphatic pathway."], "concept": "Bile flows from the liver/gallbladder through the common bile duct, joining the pancreatic duct at the ampulla of Vater, into the duodenum.", "formula": "", "id": 560, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Anatomy", "stem": "The gallbladder is normally found attached to the ventral surface of the:", "choices": ["Right lobe of the liver", "Left lobe of the liver", "Spleen", "Duodenum"], "correct": 0, "expl": ["Correct — the gallbladder is normally attached to the ventral (undersurface) of the right lobe of the liver.", "Incorrect — the gallbladder is associated with the right, not left, hepatic lobe.", "Incorrect — the gallbladder is not attached to the spleen.", "Incorrect — the gallbladder is anatomically near, but not attached to, the duodenum; its ductal system connects them functionally."], "concept": "The gallbladder sits in a fossa on the undersurface of the liver's right lobe, storing and concentrating bile produced by the liver.", "formula": "", "id": 561, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Physiology", "stem": "The release of bile by the gallbladder is triggered by the presence of ____ in the stomach/duodenum. (1) Carbohydrates (2) Proteins (3) Fats", "choices": ["1 only", "2 only", "3 only", "2 and 3"], "correct": 2, "expl": ["Incorrect — carbohydrates are not the primary trigger for gallbladder contraction.", "Incorrect — protein alone is not the classic primary trigger described here.", "Correct — fat entering the duodenum stimulates cholecystokinin (CCK) release, triggering gallbladder contraction and bile release.", "Incorrect — fat, not protein, is the classic primary stimulus for CCK-mediated bile release."], "concept": "Dietary fat in the duodenum triggers CCK release, which stimulates gallbladder contraction and bile secretion into the small intestine.", "formula": "", "id": 562, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Anatomy", "stem": "The ascending and transverse colon join at an area under the right lobe of the liver called the:", "choices": ["Splenic flexure", "Hepatic flexure", "Gastric flexure", "Duodenal flexure"], "correct": 1, "expl": ["Incorrect — the splenic flexure is on the left side, at the transverse-descending junction.", "Correct — the hepatic flexure, located under the right lobe of the liver, is the junction of the ascending and transverse colon.", "Incorrect — 'gastric flexure' is not standard anatomic terminology for a colon junction.", "Incorrect — 'duodenal flexure' is not standard terminology for this colon junction (though the duodenum has its own flexures)."], "concept": "Hepatic flexure (right, under liver) connects ascending to transverse colon; splenic flexure (left, under spleen) connects transverse to descending colon.", "formula": "", "id": 563, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Radiobiology/Toxicity", "stem": "A severe complication associated with excessive irradiation of the liver is:", "choices": ["Thrombocytopenia", "Cholelithiasis", "Acute hepatitis", "Diabetes"], "correct": 2, "expl": ["Incorrect — thrombocytopenia reflects bone marrow suppression, not a direct hepatic radiation complication per se.", "Incorrect — cholelithiasis (gallstones) is not a classic radiation-induced liver complication.", "Correct — radiation-induced liver disease can present with a syndrome resembling acute hepatitis (veno-occlusive disease), a serious dose-limiting complication.", "Incorrect — diabetes is not a typical direct complication of hepatic irradiation."], "concept": "Radiation-induced liver disease (veno-occlusive disease) can mimic acute hepatitis and is a key dose-limiting toxicity for liver irradiation.", "formula": "", "id": 564, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology", "stem": "A common site for metastatic spread from the liver is: (1) Stomach (2) Lung (3) Brain", "choices": ["1, 2", "1, 3", "2, 3", "1, 2, and 3"], "correct": 2, "expl": ["Incorrect — the stomach is not a classic common site for hepatic metastatic spread.", "Incorrect — the stomach is not a classic common site for hepatic metastatic spread.", "Correct — lung and brain are recognized common sites for distant metastatic spread from primary liver cancer.", "Incorrect — stomach is not typically included among the classic common metastatic sites from the liver."], "concept": "Hepatocellular carcinoma classically spreads hematogenously to the lungs, and less commonly to bone and brain.", "formula": "", "id": 565, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/Pancreas", "stem": "The most common type of tumor found in the pancreas is:", "choices": ["Sarcomas", "Leiomyomas", "Squamous cell carcinoma", "Adenocarcinoma"], "correct": 3, "expl": ["Incorrect — sarcomas of the pancreas are rare.", "Incorrect — leiomyomas are rare, benign smooth muscle tumors, not the most common pancreatic malignancy.", "Incorrect — squamous cell carcinoma of the pancreas is rare.", "Correct — adenocarcinoma (specifically ductal adenocarcinoma) is the most common pancreatic tumor type."], "concept": "The overwhelming majority of pancreatic cancers are ductal adenocarcinomas, arising from the exocrine pancreatic ducts.", "formula": "", "id": 566, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/Interventional", "stem": "Chemoembolization is:", "choices": ["Systemic administration of chemotherapy with one bolus injection", "Systemic administration of chemotherapy using the enteral route", "Local administration of chemotherapy using the proximal venous axis (arterial delivery with embolization)", "Local administration of chemotherapy using the transdermal route"], "correct": 2, "expl": ["Incorrect — chemoembolization is a local, not systemic, technique.", "Incorrect — chemoembolization does not use the enteral (oral/GI) route.", "Correct — chemoembolization (TACE) delivers chemotherapy locally via the arterial supply to a tumor (e.g., hepatic artery), combined with embolic material to restrict blood flow and concentrate drug exposure.", "Incorrect — chemoembolization does not use a transdermal delivery route."], "concept": "Transarterial chemoembolization (TACE) targets liver tumors by directly delivering chemotherapy through the arterial supply while embolizing the vessel, maximizing local drug concentration and minimizing systemic exposure.", "formula": "", "id": 567, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/Liver", "stem": "Hepatocellular carcinoma is increasing in incidence in the US due to the rise of:", "choices": ["Epstein-Barr virus", "Hepatitis C", "Cholelithiasis", "Diabetes"], "correct": 1, "expl": ["Incorrect — EBV is linked to nasopharyngeal cancer and lymphomas, not the primary driver of rising HCC incidence.", "Correct — rising hepatitis C infection rates are a major driver of increasing hepatocellular carcinoma incidence in the US.", "Incorrect — cholelithiasis (gallstones) is not a primary driver of HCC incidence trends.", "Incorrect — while metabolic disease contributes to liver disease broadly, hepatitis C is the classic tested driver of rising HCC incidence."], "concept": "Chronic hepatitis C infection leading to cirrhosis is a major, well-documented risk factor behind the rise in hepatocellular carcinoma cases.", "formula": "", "id": 568, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Surgery", "stem": "A pancreaticoduodenectomy is also known as:", "choices": ["Whipple procedure", "Halsted technique", "Stanford technique", "Endoscopy biopsy"], "correct": 0, "expl": ["Correct — pancreaticoduodenectomy is commonly known as the Whipple procedure.", "Incorrect — the Halsted technique refers to a radical mastectomy approach, unrelated to pancreatic surgery.", "Incorrect — 'Stanford technique' is not standard terminology for pancreaticoduodenectomy.", "Incorrect — endoscopy biopsy is a diagnostic, not surgical resection, procedure."], "concept": "The Whipple procedure (pancreaticoduodenectomy) removes the head of the pancreas, duodenum, gallbladder, and portion of the bile duct/stomach for resectable pancreatic head tumors.", "formula": "", "id": 569, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/Pancreas", "stem": "The best chance for cure for pancreatic carcinoma is:", "choices": ["Intraoperative radiation", "Local radiation", "Surgery", "Chemoembolization"], "correct": 2, "expl": ["Incorrect — intraoperative radiation is an adjunct, not the primary curative modality.", "Incorrect — local radiation alone is not curative for resectable pancreatic cancer.", "Correct — complete surgical resection offers the best chance for cure in pancreatic carcinoma.", "Incorrect — chemoembolization is a palliative/liver-directed technique, not a curative option for pancreatic carcinoma."], "concept": "Surgical resection (when feasible) remains the only potentially curative treatment for pancreatic adenocarcinoma; most patients unfortunately present with unresectable disease.", "formula": "", "id": 570, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/Interventional", "stem": "TACE is also known as:", "choices": ["Intraoperative radiation", "Local radiation", "Surgery", "Chemoembolization"], "correct": 3, "expl": ["Incorrect — intraoperative radiation is a distinct radiotherapy technique.", "Incorrect — local radiation is a distinct radiotherapy technique.", "Incorrect — surgery is a distinct treatment modality.", "Correct — TACE stands for TransArterial ChemoEmbolization."], "concept": "TACE (transarterial chemoembolization) is a liver-directed interventional radiology technique combining local chemotherapy delivery with arterial embolization.", "formula": "", "id": 571, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Breast Oncology", "stem": "Distant metastasis from breast cancer can occur via: (1) Lymph drainage (2) Blood (3) Batson plexus", "choices": ["1, 2", "1, 3", "2, 3", "1, 2, and 3"], "correct": 3, "expl": ["Incorrect — Batson's venous plexus is also a recognized metastatic route.", "Incorrect — hematogenous (blood) spread is also a recognized metastatic route.", "Incorrect — lymphatic spread is also a recognized metastatic route.", "Correct — breast cancer can spread via lymphatic drainage, hematogenous (blood) spread, and the valveless Batson venous plexus (explaining spinal metastasis patterns)."], "concept": "Batson's plexus, a valveless venous network along the spine, provides a direct route for breast (and prostate) cancer cells to reach vertebral bone without passing through the lungs/liver first.", "formula": "", "id": 572, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Breast Oncology", "stem": "The minimum size for a palpable breast lump is:", "choices": ["0.5 cm", "1.0 cm", "1.5 cm", "2.0 cm"], "correct": 1, "expl": ["Incorrect — 0.5 cm is generally below the threshold typically detectable by palpation.", "Correct — approximately 1.0 cm is considered the minimum size for a breast lump to be reliably palpable.", "Incorrect — 1.5 cm overstates the minimum palpable threshold.", "Incorrect — 2.0 cm overstates the minimum palpable threshold."], "concept": "Mammography can often detect lesions smaller than the approximately 1 cm threshold typically needed for reliable manual palpation.", "formula": "", "id": 573, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Breast Treatment", "stem": "The Posterior Axillary Boost (PAB) field is intended to irradiate:", "choices": ["Level 1 Axillary nodes", "Level 2 Axillary nodes", "Level 3 Axillary nodes", "Supraclavicular nodes"], "correct": 2, "expl": ["Incorrect — Level 1 axillary nodes are typically covered by the standard tangential/axillary fields, not specifically the PAB.", "Incorrect — Level 2 nodes are also generally covered by standard fields.", "Correct — the Posterior Axillary Boost specifically supplements dose to Level 3 (apical) axillary nodes, which may be underdosed by standard anterior fields.", "Incorrect — supraclavicular nodes are covered by a separate supraclavicular field, not the PAB."], "concept": "The PAB field boosts the apex of the axilla (Level 3 nodes), an area that can receive inadequate dose from standard tangential and anterior supraclavicular fields alone.", "formula": "", "id": 574, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Breast Anatomy", "stem": "Lymphatic drainage to the breast is primarily to the: (1) Axillary nodes (2) Supraclavicular nodes (3) Internal mammary nodes", "choices": ["1, 2", "1, 3", "2, 3", "1, 2, and 3"], "correct": 3, "expl": ["Incorrect — internal mammary nodes are also a primary drainage basin.", "Incorrect — supraclavicular nodes are also a recognized (secondary) drainage pathway.", "Incorrect — axillary nodes are the primary (most common) drainage basin.", "Correct — breast lymphatic drainage occurs primarily to axillary nodes, with additional drainage to internal mammary and supraclavicular nodes."], "concept": "While axillary nodes receive the majority of breast lymphatic drainage, internal mammary and supraclavicular nodes are also clinically relevant drainage basins.", "formula": "", "id": 575, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Breast Oncology/Systemic Therapy", "stem": "For estrogen receptor positive cases, an anti-estrogen may be used to maintain remission known as:", "choices": ["Taxol", "Tamoxifen", "Megace", "Prednisone"], "correct": 1, "expl": ["Incorrect — Taxol (paclitaxel) is a chemotherapy agent, not an anti-estrogen.", "Correct — tamoxifen is a selective estrogen receptor modulator used as anti-estrogen therapy in ER-positive breast cancer.", "Incorrect — Megace (megestrol acetate) is a progestin, not the classic anti-estrogen answer here.", "Incorrect — prednisone is a corticosteroid, not an anti-estrogen therapy."], "concept": "Tamoxifen blocks estrogen receptor signaling in breast tissue, reducing recurrence risk in ER-positive breast cancer.", "formula": "", "id": 576, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Breast Oncology", "stem": "The most common symptom of breast cancer is:", "choices": ["Clear nipple discharge", "Dimpling of the skin", "Painless lump", "Inverted nipple"], "correct": 2, "expl": ["Incorrect — clear nipple discharge is a less common and often benign finding.", "Incorrect — skin dimpling is a classic but less common sign compared to a lump.", "Correct — a painless lump is the most common presenting symptom of breast cancer.", "Incorrect — nipple inversion is a less common, more advanced sign than a simple lump."], "concept": "Most breast cancers first present as a painless palpable mass, discovered by self-exam, clinical exam, or screening mammography.", "formula": "", "id": 577, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Breast Oncology", "stem": "The most common histologic type of breast cancer is:", "choices": ["Lobular in situ", "Paget disease", "Infiltrating ductal", "Medullary"], "correct": 2, "expl": ["Incorrect — lobular carcinoma in situ is a risk marker, not the most common invasive histology.", "Incorrect — Paget disease of the breast is an uncommon presentation.", "Correct — infiltrating (invasive) ductal carcinoma is the most common histologic type of breast cancer.", "Incorrect — medullary carcinoma is an uncommon breast cancer subtype."], "concept": "Invasive ductal carcinoma accounts for the majority of invasive breast cancer diagnoses.", "formula": "", "id": 578, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Breast Treatment", "stem": "The total radiation dose received by the lumpectomy bed in standard whole breast irradiation followed by lumpectomy site boost is:", "choices": ["40-60 Gy", "50-60 Gy", "60-70 Gy", "70-80 Gy"], "correct": 2, "expl": ["Incorrect — this underestimates the combined whole-breast-plus-boost total.", "Incorrect — this range describes whole breast dose alone, not including the boost.", "Correct — combined whole breast irradiation (approximately 45-50 Gy) plus a lumpectomy bed boost (approximately 10-20 Gy) totals approximately 60-70 Gy to the tumor bed.", "Incorrect — this overstates the typical combined total dose to the lumpectomy bed."], "concept": "Standard breast conservation therapy delivers whole breast dose followed by an additional boost specifically to the lumpectomy cavity to reduce local recurrence risk.", "formula": "", "id": 579, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Breast Treatment", "stem": "When the supraclavicular fossa is treated along with opposing tangents, the supraclavicular field is best treated using:", "choices": ["AP/PA ports", "Wedged pair", "Rotational beam", "Half field (asymmetric collimator) technique"], "correct": 3, "expl": ["Incorrect — simple AP/PA ports do not resolve field junction divergence issues with the adjacent tangents.", "Incorrect — a wedged pair does not address the specific junction-matching need with tangential fields.", "Incorrect — rotational beam techniques are not standard for supraclavicular field matching.", "Correct — the half-field (asymmetric jaw/independent collimator) technique allows the supraclavicular field to be matched without divergence overlap into the adjacent tangential fields."], "concept": "Half-beam block/asymmetric collimation techniques eliminate beam divergence at the junction between adjacent fields (e.g., supraclavicular and tangent fields), avoiding hot or cold spots.", "formula": "", "id": 580, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Breast Radiobiology/Toxicity", "stem": "The acceptable amount of lung tissue included in tangential breast fields is 2.0 cm in order to decrease the chance of latent:", "choices": ["Pneumonia", "Lung fibrosis", "Pleural effusion", "Atelectasis"], "correct": 1, "expl": ["Incorrect — pneumonia is an infectious process, not the classic late radiation toxicity being minimized.", "Correct — limiting lung tissue included in tangential fields (commonly no more than about 2 cm central lung distance) helps minimize the risk of late radiation-induced lung fibrosis.", "Incorrect — pleural effusion is not the primary late toxicity being minimized by this parameter.", "Incorrect — atelectasis is not the primary late toxicity being minimized by this parameter."], "concept": "Central lung distance (CLD) is a key breast tangent planning parameter that limits lung volume in the field to reduce the risk of late radiation fibrosis/pneumonitis.", "formula": "", "id": 581, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Treatment Planning/Calculation", "stem": "An en face electron boost to the lumpectomy bed is accidentally treated at 105 cm SSD instead of 100 cm SSD. The error in dose delivered is about:", "choices": ["5% overdose", "5% underdose", "10% overdose", "10% underdose"], "correct": 3, "expl": ["Incorrect — the error direction and approximate magnitude are both off.", "Incorrect — the magnitude of error at this distance discrepancy is closer to 10%, not 5%.", "Incorrect — increasing distance decreases dose (underdose), not overdose.", "Correct — using the inverse square law, increasing SSD from 100 to 105 cm decreases dose by roughly 10% at the intended depth for electron beams (a rule of thumb estimates about 2% dose change per cm of SSD error for electrons)."], "concept": "Electron beam dosimetry is particularly sensitive to SSD changes; a small increase in treatment distance produces a proportionally larger dose reduction than for photon beams.", "formula": "Approx. % dose change is about 2% x delta-SSD(cm) for electron beams", "id": 582, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Staging", "stem": "Ductal carcinoma in situ is classified as:", "choices": ["Stage 0", "Stage 1", "Stage 2", "Stage 3"], "correct": 0, "expl": ["Correct — ductal carcinoma in situ (DCIS), being non-invasive, is classified as Stage 0.", "Incorrect — Stage 1 describes small invasive cancers, not in situ disease.", "Incorrect — Stage 2 describes larger or node-positive invasive disease, not in situ disease.", "Incorrect — Stage 3 describes locally advanced invasive disease, not in situ disease."], "concept": "Stage 0 is reserved for carcinoma in situ (non-invasive disease that has not breached the basement membrane).", "formula": "", "id": 583, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Staging", "stem": "A breast cancer classified as T3 N1 M1 with metastasis to the supraclavicular nodes would be grouped as:", "choices": ["Stage 0", "Stage 1", "Stage 2", "Stage 3", "Stage 4"], "correct": 4, "expl": ["Incorrect — Stage 0 describes in situ disease only.", "Incorrect — Stage 1 describes small, node-negative disease.", "Incorrect — Stage 2 describes moderate-size or limited nodal disease without distant metastasis.", "Incorrect — while supraclavicular node involvement alone can upstage disease to Stage 3, the presence of M1 (distant metastasis) automatically makes this Stage 4.", "Correct — the presence of M1 (distant metastatic) disease automatically classifies the cancer as Stage 4, regardless of T/N status."], "concept": "Any M1 (distant metastasis) finding automatically classifies breast cancer as Stage 4, overriding T and N categories.", "formula": "", "id": 584, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Diagnostics", "stem": "A sentinel lymph node biopsy involves injection of a blue dye and radioactive:", "choices": ["Iridium-192", "Technetium-99m", "Strontium-89", "Samarium-153"], "correct": 1, "expl": ["Incorrect — Iridium-192 is used in brachytherapy, not sentinel node mapping.", "Correct — technetium-99m sulfur colloid, combined with blue dye, is the standard radiotracer used for sentinel lymph node mapping.", "Incorrect — Strontium-89 is used for bone metastasis pain palliation, not sentinel node mapping.", "Incorrect — Samarium-153 is used for bone pain palliation, not sentinel node mapping."], "concept": "Technetium-99m sulfur colloid combined with isosulfan/methylene blue dye is the standard dual-tracer technique for sentinel lymph node identification.", "formula": "", "id": 585, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Treatment Planning/Calculation", "stem": "The hinge angle between two half-beam tangential ports is 180 degrees. The medial tangent gantry angle is 310 degrees. What is the gantry angle for the lateral tangent?", "choices": ["230 degrees", "140 degrees", "130 degrees", "50 degrees"], "correct": 2, "expl": ["Incorrect — this does not correctly apply the 180-degree opposition relationship.", "Incorrect — this does not correctly apply the 180-degree opposition relationship.", "Correct — with a 180-degree hinge angle (directly opposed tangents), the lateral tangent angle equals the medial angle minus 180 degrees: 310 minus 180 = 130 degrees.", "Incorrect — this does not correctly apply the 180-degree opposition relationship."], "concept": "For a 180-degree hinge angle (opposed tangential fields), the two gantry angles differ by exactly 180 degrees.", "formula": "Lateral tangent angle = Medial tangent angle - 180 degrees (mod 360)", "id": 586, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Gynecologic Oncology", "stem": "Lymphatic spread for vulva cancer in order from first site of spread to last is:", "choices": ["Deep femoral nodes, pelvic nodes, superficial inguinal nodes", "Superficial inguinal nodes, pelvic nodes, deep femoral nodes", "Pelvic nodes, deep femoral nodes, superficial inguinal nodes", "Superficial inguinal nodes, deep femoral nodes, pelvic nodes"], "correct": 3, "expl": ["Incorrect — this reverses the correct order; superficial inguinal nodes are the first site of spread.", "Incorrect — deep femoral nodes are involved before pelvic nodes, not after.", "Incorrect — this does not reflect the correct progressive order of spread.", "Correct — vulvar cancer spreads in an orderly progression from superficial inguinal nodes, to deep femoral nodes, to pelvic nodes."], "concept": "Vulvar cancer lymphatic spread follows a predictable stepwise pattern: superficial inguinal, then deep femoral, then pelvic nodes.", "formula": "", "id": 587, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Gynecologic Oncology", "stem": "Lymphatic spread for cervix cancer in order from first site of spread to last is:", "choices": ["Parametrial nodes, pelvic nodes, supraclavicular nodes, common iliac nodes, periaortic nodes", "Parametrial nodes, pelvic nodes, common iliac nodes, periaortic nodes, supraclavicular nodes", "Supraclavicular, deep femoral nodes, superficial inguinal nodes, pelvic nodes, parametrial nodes", "Common iliac nodes, pelvic nodes, supraclavicular nodes, common iliac nodes, parametrial nodes"], "correct": 1, "expl": ["Incorrect — supraclavicular nodes are the last, not an intermediate, station in this progression.", "Correct — cervix cancer spreads in order: parametrial, then pelvic, then common iliac, then periaortic, then supraclavicular nodes.", "Incorrect — this order does not follow the correct progressive drainage pattern for cervix cancer.", "Incorrect — this sequence is internally inconsistent and does not reflect the correct order."], "concept": "Cervical cancer lymphatic spread follows an orderly progression: parametrial to pelvic (obturator/iliac) to common iliac to periaortic to supraclavicular nodes.", "formula": "", "id": 588, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Gynecologic Treatment", "stem": "Bladder and rectal doses are very important to gynecologic radiation therapy planning. The point tolerance for these organs is:", "choices": ["2000 cGy", "3500 cGy", "5000 cGy", "7500 cGy"], "correct": 3, "expl": ["Incorrect — this understates the standard point dose tolerance for bladder/rectum in gynecologic brachytherapy planning.", "Incorrect — this understates the standard point dose tolerance.", "Incorrect — this understates the standard point dose tolerance.", "Correct — the classic point dose tolerance for bladder and rectum in combined EBRT/brachytherapy gynecologic planning is approximately 7500 cGy."], "concept": "Bladder and rectal point doses are carefully tracked throughout combined external beam and brachytherapy gynecologic treatment to avoid exceeding tolerance.", "formula": "", "id": 589, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Gynecologic Oncology", "stem": "A recent study has warranted research of endometrial cancer risk in women who take which of the following?", "choices": ["Cisplatin", "Methotrexate", "Tamoxifen", "Doxorubicin"], "correct": 2, "expl": ["Incorrect — cisplatin is a chemotherapy agent, not linked to increased endometrial cancer risk.", "Incorrect — methotrexate is not linked to increased endometrial cancer risk.", "Correct — tamoxifen use has been associated with an increased risk of endometrial cancer due to its partial estrogen agonist effect on the endometrium.", "Incorrect — doxorubicin is not the agent classically linked to endometrial cancer risk."], "concept": "Tamoxifen's estrogen-agonist activity on the endometrium (while antagonist in breast tissue) explains its association with increased endometrial cancer risk.", "formula": "", "id": 590, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Gynecologic Anatomy", "stem": "The outermost portion of the gynecologic tract is the:", "choices": ["Vagina", "Vulva", "Cervix", "Ovary"], "correct": 1, "expl": ["Incorrect — the vagina is internal, proximal to the vulva.", "Correct — the vulva comprises the external female genitalia, the outermost portion of the gynecologic tract.", "Incorrect — the cervix is an internal structure, the lower portion of the uterus.", "Incorrect — the ovaries are internal pelvic organs, not the outermost structure."], "concept": "The vulva (external genitalia) is the outermost gynecologic structure; internal structures proceed vagina, then cervix, then uterus, then fallopian tubes/ovaries.", "formula": "", "id": 591, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Gynecologic Anatomy", "stem": "The connective tissue immediately lateral to the uterine cervix is the:", "choices": ["Parametrium", "Parasagittal", "Myometrium", "Perineum"], "correct": 0, "expl": ["Correct — the parametrium is the connective tissue immediately lateral to the cervix, a key structure in cervical cancer spread and staging.", "Incorrect — 'parasagittal' is a directional/plane term, not an anatomic tissue structure.", "Incorrect — the myometrium is the muscular wall of the uterus itself, not the tissue lateral to the cervix.", "Incorrect — the perineum is the external region between the anus and vulva/scrotum, unrelated to the cervix."], "concept": "Parametrial involvement is a critical factor in FIGO staging of cervical cancer, since it reflects local extension beyond the cervix.", "formula": "", "id": 592, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Gynecologic Oncology", "stem": "Which of the following cancers, even at an early stage, will often involve metastatic spread throughout the abdominal cavity?", "choices": ["Endometrium", "Cervix", "Ovarian", "Vagina"], "correct": 2, "expl": ["Incorrect — endometrial cancer does not typically show widespread early intraperitoneal spread.", "Incorrect — cervical cancer more typically spreads locally/lymphatically before distant intraperitoneal spread.", "Correct — ovarian cancer is notorious for early, widespread intraperitoneal dissemination throughout the abdominal cavity.", "Incorrect — vaginal cancer more typically spreads locally/lymphatically rather than diffusely intraperitoneally at early stages."], "concept": "Ovarian cancer's tendency for early transcoelomic (peritoneal surface) spread explains its poor prognosis despite sometimes vague early symptoms.", "formula": "", "id": 593, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Gynecologic Oncology", "stem": "A patient having abdominal pain and distention and/or nonspecific GI symptoms (nausea, heartburn) could be symptomatic of which cancer?", "choices": ["Endometrium", "Cervix", "Ovarian", "Vagina"], "correct": 2, "expl": ["Incorrect — endometrial cancer more classically presents with abnormal uterine bleeding.", "Incorrect — cervical cancer more classically presents with abnormal vaginal bleeding/discharge.", "Correct — vague abdominal bloating, distention, and GI-type symptoms are classic subtle presenting symptoms of ovarian cancer.", "Incorrect — vaginal cancer more classically presents with vaginal bleeding or a visible/palpable lesion."], "concept": "Ovarian cancer's nonspecific GI-type symptoms often lead to delayed diagnosis, since patients and clinicians may attribute them to benign GI causes.", "formula": "", "id": 594, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Gynecologic Oncology", "stem": "Which of the following preoperative tests might be used in detection of ovarian cancer?", "choices": ["PSA", "BRCA1", "BRCA2", "Ca-125"], "correct": 3, "expl": ["Incorrect — PSA is a prostate-specific marker, not used for ovarian cancer detection.", "Incorrect — BRCA1 is a genetic risk marker, not a preoperative tumor detection/monitoring test.", "Incorrect — BRCA2 is a genetic risk marker, not a preoperative tumor detection/monitoring test.", "Correct — Ca-125 is the standard tumor marker used to help evaluate and monitor ovarian cancer."], "concept": "Ca-125 is a widely used (though imperfect) tumor marker for ovarian cancer detection, monitoring, and recurrence surveillance.", "formula": "", "id": 595, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Gynecologic Oncology", "stem": "Cervical cancer is more prevalent than any other gynecologic cancer among younger women, mainly stemming from:", "choices": ["Intraepithelial neoplasia", "Invasive cervical cancer directly", "Atrophic dysplasia", "Low estrogen"], "correct": 0, "expl": ["Correct — cervical intraepithelial neoplasia (CIN), driven largely by HPV infection, is the precursor lesion progressing to invasive cervical cancer in younger women.", "Incorrect — cervical cancer typically develops through a recognized precursor (CIN) stage rather than arising directly as invasive disease.", "Incorrect — atrophic dysplasia is more associated with older, postmenopausal patients, not the younger population described.", "Incorrect — low estrogen states are not the classic driver of cervical cancer in younger women; HPV-driven neoplasia is."], "concept": "HPV-driven cervical intraepithelial neoplasia (CIN) is the recognized precursor pathway to invasive cervical cancer, particularly relevant in younger, sexually active populations.", "formula": "", "id": 596, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Gynecologic Anatomy", "stem": "The cervix often protrudes into the vagina, producing lateral spaces in the vaginal apex called:", "choices": ["Cervical os", "Fornices", "Ovaries", "Uterus"], "correct": 1, "expl": ["Incorrect — the cervical os is the opening of the cervical canal, not the surrounding vaginal spaces.", "Correct — the fornices are the recesses formed in the vaginal apex around the protruding cervix.", "Incorrect — the ovaries are separate pelvic organs, not vaginal apex spaces.", "Incorrect — the uterus is a separate organ, not the vaginal apex recess."], "concept": "The vaginal fornices (anterior, posterior, and lateral) are clinically important landmarks used for gynecologic exam and brachytherapy applicator placement.", "formula": "", "id": 597, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Gynecologic Oncology", "stem": "With vaginal and cervical cancers, there is an increased risk of clear cell adenocarcinoma and epithelial abnormalities in women whose mothers (during pregnancy) used which of the following drugs?", "choices": ["Dihydrotestosterone (DHT)", "Dysmenorrheal medication (DMH)", "Diethylstilbestrol (DES)", "Deoxyribonucleic acid (DNA)"], "correct": 2, "expl": ["Incorrect — DHT is not the causative agent linked to this in-utero exposure risk.", "Incorrect — 'DMH' is not a recognized drug linked to this risk; this is a distractor term.", "Correct — in-utero exposure to diethylstilbestrol (DES), a synthetic estrogen once used to prevent miscarriage, is linked to increased risk of clear cell adenocarcinoma of the vagina/cervix in daughters.", "Incorrect — DNA is a molecule, not a medication; this is a nonsensical distractor."], "concept": "DES exposure in utero (given to pregnant women mid-20th century) is a classic, well-documented cause of clear cell adenocarcinoma of the vagina/cervix in daughters.", "formula": "", "id": 598, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Gynecologic Oncology", "stem": "Diabetes, hypertension, overweight status, and increased use of estrogen (or estrogen-to-progesterone ratio) relate to which of the following cancers?", "choices": ["Cervical", "Endometrium", "Ovarian", "Vaginal"], "correct": 1, "expl": ["Incorrect — cervical cancer's classic risk factors are HPV-related, not this metabolic/hormonal cluster.", "Correct — diabetes, hypertension, obesity, and unopposed estrogen exposure are classic risk factors for endometrial cancer.", "Incorrect — ovarian cancer risk factors more classically include BRCA mutation, family history, and nulliparity.", "Incorrect — vaginal cancer's classic risk factors do not center on this metabolic/hormonal cluster."], "concept": "Unopposed estrogen exposure (from obesity, anovulation, or exogenous sources) combined with metabolic syndrome features is a classic endometrial cancer risk profile.", "formula": "", "id": 599, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Treatment Planning", "stem": "When treating ovarian cancer with radiation, often the abdominal cavity is involved with disease. What is the tolerance dose to the kidneys?", "choices": ["20 Gy", "30 Gy", "40 Gy", "50 Gy"], "correct": 0, "expl": ["Correct — the whole-kidney tolerance dose is approximately 20 Gy, an important limiting factor in whole abdominal irradiation for ovarian cancer.", "Incorrect — this exceeds the standard whole-kidney tolerance.", "Incorrect — this significantly exceeds the standard whole-kidney tolerance.", "Incorrect — this significantly exceeds the standard whole-kidney tolerance."], "concept": "Kidney dose tolerance is a key limiting factor in historical whole-abdominal irradiation techniques for ovarian cancer, often requiring kidney blocking.", "formula": "", "id": 600, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Patient Care/Side Effects", "stem": "When treating pelvic tumors with a high dose of radiation, a major side effect is diarrhea due to the small bowel in the field, usually occurring in the second or third week of treatment. Which of the following would be prescribed to alleviate the problem?", "choices": ["Sucralfate (Carafate)", "Diphenoxylate (Lomotil)", "Ibuprofen (Motrin)", "Prochlorperazine (Compazine)"], "correct": 1, "expl": ["Incorrect — sucralfate is used for mucosal/GI ulcer protection, not specifically for managing radiation-induced diarrhea.", "Correct — diphenoxylate (Lomotil) is an antidiarrheal medication commonly prescribed to manage radiation-induced diarrhea from pelvic treatment.", "Incorrect — ibuprofen is an anti-inflammatory/analgesic, not an antidiarrheal.", "Incorrect — prochlorperazine is an antiemetic, used for nausea, not diarrhea."], "concept": "Antidiarrheal agents like diphenoxylate/loperamide are first-line symptomatic management for radiation enteritis-related diarrhea during pelvic treatment.", "formula": "", "id": 601, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Radioisotopes", "stem": "Which of the following isotopes may be used in the treatment of ovarian cancer?", "choices": ["Iodine-131", "Iridium-192", "Cobalt-60", "Phosphorous-32"], "correct": 3, "expl": ["Incorrect — Iodine-131 is used for thyroid disease, not ovarian cancer.", "Incorrect — Iridium-192 is used for interstitial/intracavitary brachytherapy of other sites, not classically for ovarian cancer.", "Incorrect — Cobalt-60 is used for external beam teletherapy units, not intraperitoneal ovarian cancer treatment.", "Correct — Phosphorus-32, a beta emitter, has historically been instilled intraperitoneally to treat ovarian cancer with peritoneal spread."], "concept": "Intraperitoneal P-32 was a historical treatment approach for ovarian cancer with microscopic peritoneal disease, exploiting its beta-emission for superficial peritoneal surface treatment.", "formula": "", "id": 602, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Gynecologic Oncology", "stem": "Ovarian cancer is the most deadly of all female cancers because: (1) Few symptoms (2) Widely disseminated (3) Usually found in one ovary", "choices": ["1 and 2", "1 and 3", "2 and 3", "1, 2, and 3"], "correct": 0, "expl": ["Correct — ovarian cancer's vague/absent early symptoms and tendency for widespread (transcoelomic) dissemination by diagnosis are key reasons for its high mortality.", "Incorrect — 'usually found in one ovary' does not describe why it is deadly; in fact disease often spreads well beyond a single ovary by diagnosis.", "Incorrect — 'usually found in one ovary' does not describe a reason for high mortality.", "Incorrect — being confined to one ovary is not accurate to the typical presentation nor a reason for lethality."], "concept": "Ovarian cancer's poor prognosis largely reflects late diagnosis (due to nonspecific symptoms) after disease has already spread widely within the peritoneal cavity.", "formula": "", "id": 603, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Gynecologic Oncology", "stem": "In a patient with cervix cancer with periaortic nodal involvement, there is a 35% increase in risk for spread to the:", "choices": ["Vulva area", "Supraclavicular area", "Lung", "Brain"], "correct": 1, "expl": ["Incorrect — vulvar spread is not the classically cited next step after periaortic nodal involvement.", "Correct — periaortic nodal involvement in cervical cancer significantly increases the risk of subsequent spread to the supraclavicular nodes, following the sequential lymphatic drainage pathway.", "Incorrect — lung is a distant hematogenous site, not the classically cited next lymphatic step.", "Incorrect — brain is a distant hematogenous site, not the classically cited next lymphatic step."], "concept": "Cervical cancer's stepwise lymphatic progression means periaortic node involvement substantially raises the risk of further spread to supraclavicular nodes.", "formula": "", "id": 604, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Gynecologic Treatment", "stem": "For carcinoma in situ and stage 1 well-differentiated cancer, the entire vagina may be treated with low-dose brachytherapy using a vaginal cylinder with cesium-137 to a dose of:", "choices": ["1500 cGy", "2500 cGy", "4500 cGy", "6000 cGy"], "correct": 3, "expl": ["Incorrect — this underdoses the standard whole-vagina low-dose brachytherapy prescription.", "Incorrect — this underdoses the standard whole-vagina low-dose brachytherapy prescription.", "Incorrect — this underdoses the standard whole-vagina low-dose brachytherapy prescription.", "Correct — approximately 6000 cGy is a standard dose for whole-vagina low-dose-rate cylinder brachytherapy in early-stage disease."], "concept": "Vaginal cylinder brachytherapy doses are calibrated to treat the vaginal mucosa/submucosa to a defined depth, with whole-vagina treatment for early, well-differentiated disease commonly totaling around 60 Gy.", "formula": "", "id": 605, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Patient Care/Side Effects", "stem": "Upon completion of a radiotherapy course for cervix cancer, a patient experiences abdominal distention and hyperactive bowel sounds. This could indicate:", "choices": ["Gastritis", "Bowel obstruction", "Chronic cystitis", "Proctosigmoiditis"], "correct": 1, "expl": ["Incorrect — gastritis does not classically present with distention and hyperactive bowel sounds in this context.", "Correct — abdominal distention with hyperactive bowel sounds is a classic presentation of bowel obstruction, a recognized late complication of pelvic radiation.", "Incorrect — chronic cystitis presents with urinary symptoms, not abdominal distention/hyperactive bowel sounds.", "Incorrect — proctosigmoiditis presents with rectal symptoms (tenesmus, bleeding), not primarily distention with hyperactive bowel sounds."], "concept": "Radiation-induced bowel obstruction (from strictures/adhesions) can present with abdominal distention, pain, and hyperactive (or eventually absent) bowel sounds, requiring prompt evaluation.", "formula": "", "id": 606, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Gynecologic Anatomy", "stem": "The most radiotolerant structure of the gynecologic organs is the:", "choices": ["Uterine canal", "Cervix", "Ovary", "Bladder"], "correct": 0, "expl": ["Correct — the uterine canal (endometrial cavity/myometrium) is considered the most radiotolerant of the gynecologic structures, tolerating very high brachytherapy doses.", "Incorrect — the cervix, while relatively tolerant, is not considered as tolerant as the uterine canal.", "Incorrect — the ovary is highly radiosensitive, not tolerant.", "Incorrect — the bladder is a dose-limiting, relatively radiosensitive structure, not the most tolerant."], "concept": "The uterus/endometrial cavity can tolerate extremely high brachytherapy doses (well beyond typical normal tissue tolerances), reflecting its unique radioresistance.", "formula": "", "id": 607, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Patient Care", "stem": "Which of the following would be recommended for a patient having pelvic treatment concurrently with chemotherapy? (1) Rest (2) Reassurance (3) Antidepressants", "choices": ["1 and 2", "1 and 3", "2 and 3", "1, 2, and 3"], "correct": 3, "expl": ["Incorrect — antidepressants may also be appropriate as part of comprehensive psychosocial support.", "Incorrect — reassurance is also an appropriate, near-universal supportive measure.", "Incorrect — rest is also an appropriate, near-universal supportive measure.", "Correct — rest, reassurance, and (when clinically indicated) antidepressant support are all reasonable components of holistic supportive care during concurrent chemoradiation."], "concept": "Supportive care during concurrent chemoradiation addresses physical fatigue (rest), emotional needs (reassurance), and, when appropriate, mood/psychiatric symptoms (antidepressants).", "formula": "", "id": 608, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Gynecologic Oncology", "stem": "Inguinal nodes would most likely be treated when cancer occurs in which area?", "choices": ["Cervix", "Ovary", "Vagina", "Endometrium"], "correct": 2, "expl": ["Incorrect — cervical cancer nodal spread is primarily to pelvic (not inguinal) nodes unless the distal vagina/vulva is involved.", "Incorrect — ovarian cancer nodal spread is primarily to pelvic/periaortic nodes, not inguinal.", "Correct — vaginal cancer, particularly of the distal (lower) third, drains to the inguinal lymph nodes.", "Incorrect — endometrial cancer nodal spread is primarily to pelvic/periaortic nodes, not inguinal."], "concept": "Distal vaginal (and vulvar) cancers drain to inguinal nodes because these structures share embryologic/lymphatic origin with the external genitalia/lower limb region.", "formula": "", "id": 609, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "GU Oncology", "stem": "Metastasis from prostate cancer can spread via: (1) Lymph nodes (2) Blood (3) Nerve chains", "choices": ["1 and 2", "1 and 3", "2 and 3", "1, 2, and 3"], "correct": 3, "expl": ["Incorrect — nerve chain (perineural) spread is also a recognized route for prostate cancer.", "Incorrect — hematogenous (blood) spread is also a recognized route for prostate cancer.", "Incorrect — lymphatic spread is also a recognized route for prostate cancer.", "Correct — prostate cancer can spread via lymphatic drainage, hematogenous dissemination (notably to bone), and perineural invasion along nerve chains."], "concept": "Prostate cancer's spread patterns include lymphatic (pelvic nodes), hematogenous (bone metastasis via Batson plexus), and perineural invasion.", "formula": "", "id": 610, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "GU Oncology", "stem": "True or false: Prostate cancer is generally chemoresponsive.", "choices": ["True", "False", "True, but only in metastatic disease", "True, but only for small cell histology"], "correct": 1, "expl": ["Incorrect — conventional prostate adenocarcinoma is not classically considered highly chemoresponsive.", "Correct — the statement is false; standard prostate adenocarcinoma is relatively chemoresistant, with hormone therapy playing a more central systemic role than chemotherapy for much of its course.", "Incorrect — even in metastatic castration-resistant disease, prostate cancer's chemoresponsiveness is more modest compared to many other malignancies.", "Incorrect — small cell/neuroendocrine prostate cancer is a rare, more chemoresponsive variant, but is not representative of typical prostate adenocarcinoma."], "concept": "Standard prostate adenocarcinoma relies heavily on androgen deprivation (hormonal) therapy rather than chemotherapy, reflecting its relative chemoresistance compared to many solid tumors.", "formula": "", "id": 611, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Treatment Planning", "stem": "A full bladder for prostate treatment helps to: (1) Increase bladder dose (2) Decrease bladder dose (3) Decrease small bowel in the AP field (4) Decrease small bowel in the lateral field", "choices": ["1 and 2", "1 and 3", "2 and 3", "2 and 4", "1, 3, and 4"], "correct": 3, "expl": ["Incorrect — a full bladder decreases, not increases, bladder dose by displacing bladder wall away from the treatment volume.", "Incorrect — while a full bladder does decrease bladder dose, its main bowel benefit is described for the lateral field configuration in the classic answer.", "Incorrect — while a full bladder does decrease bladder dose, its main bowel benefit is described for the lateral field configuration in the classic answer.", "Correct — a full bladder helps decrease bladder dose (by pushing the bladder dome superiorly, out of the higher-dose region) and decreases small bowel volume in the lateral field by displacing bowel superiorly/posteriorly.", "Incorrect — a full bladder decreases, not increases, bladder dose."], "concept": "A full bladder displaces the bladder dome and small bowel loops out of the prostate treatment volume, reducing both bladder and small bowel dose, particularly evident on lateral fields.", "formula": "", "id": 612, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "GU Oncology", "stem": "The etiology of testicular cancer includes all of the following EXCEPT:", "choices": ["Cryptorchidism", "Klinefelter syndrome", "Bowen's disease", "Mumps orchitis"], "correct": 2, "expl": ["Incorrect — cryptorchidism is a well-established risk factor for testicular cancer.", "Incorrect — Klinefelter syndrome is a recognized risk factor for testicular cancer (particularly mediastinal germ cell tumors).", "Correct — Bowen's disease (squamous cell carcinoma in situ of the skin, often on the penis) is not a recognized etiologic factor for testicular cancer.", "Incorrect — mumps orchitis is a recognized risk factor associated with testicular atrophy and increased testicular cancer risk."], "concept": "Recognized testicular cancer risk factors include cryptorchidism, Klinefelter syndrome, prior contralateral testicular cancer, and mumps orchitis; Bowen's disease is unrelated.", "formula": "", "id": 613, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "GU Oncology", "stem": "Signs and symptoms of testicular cancer include: (1) Painless testicular mass (2) Infertility (3) Gynecomastia (4) Back pain", "choices": ["1 and 2", "1 and 3", "2 and 3", "2 and 4", "1, 3, and 4", "1, 2, 3, and 4"], "correct": 5, "expl": ["Incorrect — infertility, gynecomastia, and back pain are also recognized presentations.", "Incorrect — infertility and back pain are also recognized presentations.", "Incorrect — a painless mass and back pain are also recognized presentations.", "Incorrect — a painless mass and gynecomastia are also recognized presentations.", "Incorrect — infertility is also a recognized presentation.", "Correct — testicular cancer can present with a painless testicular mass, infertility, gynecomastia (from hCG-secreting tumors), and back pain (from retroperitoneal nodal metastasis)."], "concept": "Testicular cancer's presentations range from a local painless mass to systemic hormonal effects (gynecomastia from hCG) to symptoms of retroperitoneal nodal spread (back pain).", "formula": "", "id": 614, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "GU Oncology", "stem": "Spread of testicular cancer flows in an orderly fashion. Put the following in the correct order from first to last: (1) Common iliac (2) External/Internal iliac (3) Renal hilar (4) Paracaval (5) Para-aortic", "choices": ["5, 4, 3, 2, 1", "3, 2, 1, 5, 4", "2, 1, 5, 4, 3", "1, 3, 4, 2, 5"], "correct": 2, "expl": ["Incorrect — this does not match the correct progressive drainage order beginning at the external/internal iliac nodes.", "Incorrect — this does not match the correct progressive drainage order.", "Correct — testicular cancer spreads in the order: external/internal iliac, then common iliac, then para-aortic, then paracaval, then renal hilar nodes (femoral/inguinal nodes are rarely involved).", "Incorrect — this does not match the correct progressive drainage order."], "concept": "Testicular cancer follows the gonadal vessels' lymphatic drainage pathway, ultimately reaching the renal hilar nodes; femoral/inguinal nodes are classically spared unless scrotal violation has occurred.", "formula": "", "id": 615, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "GU Oncology", "stem": "The histology of penile cancer includes all of the following EXCEPT:", "choices": ["Melanoma", "Queyrat disease", "Bowen's disease", "Mumps orchitis"], "correct": 3, "expl": ["Incorrect — melanoma is a recognized (though less common) penile cancer histology/precursor consideration.", "Incorrect — erythroplasia of Queyrat is a recognized penile carcinoma in situ variant.", "Incorrect — Bowen's disease is a recognized penile carcinoma in situ variant.", "Correct — mumps orchitis is a testicular condition unrelated to penile cancer histology."], "concept": "Penile carcinoma in situ variants include Bowen's disease and erythroplasia of Queyrat; mumps orchitis is unrelated, being a testicular inflammatory condition.", "formula": "", "id": 616, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "GU Oncology", "stem": "Metastatic spread of penile cancer deposits in the _____ nodes.", "choices": ["Regional nodes", "Para-aortic nodes", "Internal iliac nodes", "Inguinal nodes"], "correct": 3, "expl": ["Incorrect — 'regional nodes' is too vague/generic compared to the specific classic answer.", "Incorrect — para-aortic nodes are not the first classic site of penile cancer nodal spread.", "Incorrect — internal iliac nodes are not the first classic site of penile cancer nodal spread.", "Correct — penile cancer classically spreads first to the inguinal lymph nodes."], "concept": "Like vulvar cancer, penile cancer (arising from external genitalia) drains first to the inguinal lymph nodes.", "formula": "", "id": 617, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Staging", "stem": "Penile cancer uses which of the following staging systems?", "choices": ["Modified Astler-Coller", "FIGO", "Jackson", "Moh's"], "correct": 2, "expl": ["Incorrect — Modified Astler-Coller staging is used for colorectal cancer, not penile cancer.", "Incorrect — FIGO staging is used for gynecologic cancers, not penile cancer.", "Correct — the Jackson staging system is classically used for penile cancer.", "Incorrect — Moh's refers to a surgical technique (Mohs micrographic surgery), not a staging system."], "concept": "Match staging systems to disease: Jackson (penile), FIGO (gynecologic), MAC/Dukes (colorectal), AJCC/TNM (most other solid tumors).", "formula": "", "id": 618, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "GU Oncology", "stem": "The most common cancer of germinal origin of the testis is:", "choices": ["Teratocarcinoma", "Seminoma", "Choriocarcinoma", "Embryonal carcinoma"], "correct": 1, "expl": ["Incorrect — teratocarcinoma is a less common germ cell tumor subtype.", "Correct — seminoma is the most common germ cell tumor of the testis.", "Incorrect — choriocarcinoma is a rare, aggressive germ cell tumor subtype.", "Incorrect — embryonal carcinoma is a less common germ cell tumor subtype than seminoma."], "concept": "Seminoma is the single most common histologic subtype among testicular germ cell tumors, generally carrying a favorable prognosis and high radiosensitivity.", "formula": "", "id": 619, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "GU Oncology", "stem": "Testicular cancer is most frequently diagnosed in men aged:", "choices": ["60-65", "15-35", "40-50", "70-80"], "correct": 1, "expl": ["Incorrect — this age range is atypical for peak testicular cancer incidence.", "Correct — testicular cancer classically peaks in incidence among men aged 15-35 years.", "Incorrect — this age range is atypical for peak testicular cancer incidence.", "Incorrect — testicular cancer is uncommon in this older age range."], "concept": "Testicular cancer is notably a cancer of younger men, peaking in the 15-35 age range, unlike most other solid tumors that peak later in life.", "formula": "", "id": 620, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Diagnostics", "stem": "A serum blood marker used in determining extent of testicular cancer is:", "choices": ["AFP", "CA 19-9", "CEA", "BRCA 1"], "correct": 0, "expl": ["Correct — alpha-fetoprotein (AFP), along with beta-hCG and LDH, is a standard tumor marker used in testicular cancer diagnosis, staging, and monitoring.", "Incorrect — CA 19-9 is associated with pancreatic cancer, not testicular cancer.", "Incorrect — CEA is associated with colorectal cancer, not testicular cancer.", "Incorrect — BRCA1 is a genetic risk marker, not a testicular cancer serum tumor marker."], "concept": "Testicular cancer tumor markers (AFP, beta-hCG, LDH) are essential for diagnosis, staging, and monitoring treatment response.", "formula": "", "id": 621, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Anatomy", "stem": "The prostate gland lies ___ to the bladder and ____ to the rectum.", "choices": ["Inferior/superior", "Superior/inferior", "Inferior/anterior", "Superior/posterior"], "correct": 2, "expl": ["Incorrect — this reverses the correct relationship to the bladder.", "Incorrect — this does not match the correct relationship to the rectum.", "Correct — the prostate lies inferior to the bladder and anterior to the rectum.", "Incorrect — this does not match the correct relationships."], "concept": "The prostate sits just below the bladder neck and directly anterior to the rectum, allowing for digital rectal examination.", "formula": "", "id": 622, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Anatomy", "stem": "The seminal vesicles lie ____ to the prostate and ____ to the rectum.", "choices": ["Inferior/superior", "Superior/anterior", "Inferior/anterior", "Superior/posterior"], "correct": 1, "expl": ["Incorrect — this reverses the correct relationship to the prostate.", "Correct — the seminal vesicles lie superior to the prostate and anterior to the rectum.", "Incorrect — this does not correctly describe the relationship to the prostate.", "Incorrect — this does not correctly describe the relationship to the rectum."], "concept": "The seminal vesicles sit just above and posterior to the bladder base, superior to the prostate, and anterior to the rectum.", "formula": "", "id": 623, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "GU Oncology", "stem": "Of the following, which would require the lowest dose to control disease?", "choices": ["Prostate", "Testis", "Penis", "Breast"], "correct": 1, "expl": ["Incorrect — prostate adenocarcinoma generally requires a higher definitive dose than seminoma.", "Correct — testicular seminoma is highly radiosensitive, requiring a comparatively low dose for disease control (adjuvant nodal doses commonly in the 20-25 Gy range).", "Incorrect — penile cancer generally requires a higher definitive dose than seminoma.", "Incorrect — breast cancer generally requires a higher definitive dose than seminoma."], "concept": "Seminoma's exquisite radiosensitivity allows disease control with comparatively low doses relative to most other solid tumor sites.", "formula": "", "id": 624, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "GU Treatment", "stem": "When irradiating seminoma stages I, IA, IB, the following nodes should be included: (1) Para-aortic (2) Ipsilateral iliac (3) Mediastinal (4) Scalene", "choices": ["1 and 2", "3 and 4", "1, 2, and 3", "1, 2, 3, and 4"], "correct": 0, "expl": ["Correct — early-stage seminoma nodal irradiation classically targets the para-aortic and ipsilateral pelvic (iliac) nodal chains (the 'dog-leg' field).", "Incorrect — mediastinal and scalene nodes are not included for early-stage seminoma treatment.", "Incorrect — mediastinal nodes are not part of standard early-stage seminoma nodal fields.", "Incorrect — mediastinal and scalene nodes are not included for early-stage seminoma treatment."], "concept": "Early-stage seminoma adjuvant radiotherapy (when used) classically covers the para-aortic and ipsilateral pelvic nodes, following the testicular lymphatic drainage pathway.", "formula": "", "id": 625, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "GU Oncology", "stem": "The most common histologic type found in prostate cancer is:", "choices": ["Adenocarcinoma", "Squamous cell carcinoma", "Clear cell", "Transitional cell"], "correct": 0, "expl": ["Correct — adenocarcinoma is by far the most common histologic type of prostate cancer.", "Incorrect — squamous cell carcinoma of the prostate is rare.", "Incorrect — clear cell carcinoma is not a typical prostate histology (more associated with kidney/endometrium).",
