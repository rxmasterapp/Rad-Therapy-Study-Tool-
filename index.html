g several appropriate options, not the only correct approach."], "concept": "Recognizing indications for and methods of mid-treatment replanning/recontouring (adaptive radiation therapy) is important when significant anatomic changes occur during a treatment course.", "formula": "", "id": 450, "catKey": "P4"}, {"cat": "Treatments", "sub": "Machine Set-Up", "stem": "The gantry of a modern isocentric linear accelerator rotates around a horizontal axis. In a standard treatment room setup, this rotational axis is generally oriented:", "choices": ["Always vertical, regardless of couch orientation", "Perpendicular to the long axis of the treatment couch", "Determined solely by the collimator angle, not the couch", "Parallel to the long axis of the treatment couch"], "correct": 1, "expl": ["The gantry axis is horizontal, not vertical; it is the plane of gantry rotation that sweeps vertically around this horizontal axis.", "Correct — in a standard isocentric linac setup, the gantry's horizontal rotational axis is generally oriented perpendicular to the long axis of the treatment couch (which typically runs head-to-foot), allowing the gantry to sweep through a vertical plane crossing the patient at the isocenter.", "The gantry's rotational axis is a fixed mechanical/geometric relationship to the couch, not determined by the collimator angle, which is an independent rotational parameter.", "The rotational axis is generally perpendicular, not parallel, to the couch's long axis in a standard treatment room configuration."], "concept": "Understanding the geometric relationship between the gantry's rotational axis and the couch orientation supports comprehension of how isocentric treatment delivery geometry works in practice.", "formula": "", "id": 451, "catKey": "P4"}, {"cat": "Treatments", "sub": "Treatment Accessories", "stem": "Trimmer bars (auxiliary shielding attachments) affixed to a treatment unit's collimators are generally used to help reduce which beam characteristic(s)?", "choices": ["All of the above — penumbra, symmetry, and flatness can each be favorably influenced by properly designed trimmer bars", "Beam symmetry deviations", "Penumbra (the region of rapid dose falloff at the field edge)", "Beam flatness deviations"], "correct": 0, "expl": ["Correct — properly designed and positioned trimmer bars can favorably influence multiple beam characteristics, including reducing penumbra width and helping maintain beam symmetry and flatness at the field edge.", "Symmetry is one of several beam characteristics favorably influenced by trimmer bars, not the sole effect.", "Penumbra reduction is one of several beam characteristics favorably influenced by trimmer bars, not the sole effect.", "Flatness is one of several beam characteristics favorably influenced by trimmer bars, not the sole effect."], "concept": "Auxiliary collimation devices like trimmer bars serve multiple simultaneous beam-shaping purposes, contributing to overall field quality at the treatment field edge.", "formula": "", "id": 452, "catKey": "P4"}, {"cat": "Treatments", "sub": "Verification/Application", "stem": "The primary purpose of skin tattoos placed after simulation is to indicate:", "choices": ["The precise location of the tumor itself", "The location/reference points for the treatment fields, supporting reproducible daily setup", "The exact midline distance between two separate treatment fields", "The location of nearby critical organs relative to the fields"], "correct": 1, "expl": ["Tattoos mark external reference points, not the tumor's precise internal location, which is not directly visible externally.", "Correct — tattoos serve as permanent external reference marks indicating the treatment field reference points established at simulation, enabling accurate, reproducible daily setup and alignment using the room lasers.", "While tattoos may sometimes relate to field separation in certain multi-field setups, their primary general purpose is marking treatment field reference points for reproducible setup, not specifically indicating inter-field distance.", "Tattoos mark treatment field reference points, not specifically the internal location of critical organs."], "concept": "Understanding the primary reproducibility purpose of simulation tattoos reinforces their central role in safe, accurate daily treatment delivery throughout a course of therapy.", "formula": "", "id": 453, "catKey": "P4"}, {"cat": "Need-to-Know Review", "sub": "Radiation Safety", "stem": "What is the maximum allowed cumulative occupational exposure to a 30-year-old radiation therapist?", "choices": ["10 rem", "20 rem", "30 rem", "45 rem"], "correct": 2, "expl": ["Incorrect — this understates the cumulative limit using the standard formula.", "Incorrect — 20 rem would correspond to age 20, not 30.", "Correct — cumulative lifetime effective dose limit = 1 rem × age, so 1 × 30 = 30 rem.", "Incorrect — this overstates the cumulative limit for a 30-year-old."], "concept": "NCRP cumulative occupational dose limit uses the rule: Cumulative dose (rem) = 1 rem × age (years).", "formula": "Cumulative limit (rem) = 1 × age", "id": 454, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Equipment/Beam Physics", "stem": "Flattening filters in a linear accelerator are used to:", "choices": ["Decrease beam intensity along the central axis (CAX)", "Increase beam intensity along the CAX", "Filter out all scattered photons", "Convert the photon beam into an electron beam"], "correct": 0, "expl": ["Correct — the flattening filter preferentially attenuates the forward-peaked central beam more than the edges, producing a flat, uniform profile.", "Incorrect — this is the opposite of the filter's effect on the CAX.", "Incorrect — the flattening filter shapes the primary beam profile; it does not remove all scatter.", "Incorrect — electron mode uses a scattering foil, not the photon flattening filter."], "concept": "The forward-peaked bremsstrahlung beam is flattened by preferentially attenuating the CAX more than the periphery.", "formula": "", "id": 455, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Radiation Safety", "stem": "A ring badge worn by a physicist handling radioactive sources is a type of:", "choices": ["Film badge", "TLD", "Geiger-Müller detector", "Pocket ionization chamber"], "correct": 1, "expl": ["Incorrect — film badges are typically worn on the torso, not as extremity monitors.", "Correct — thermoluminescent dosimeters (TLDs) are commonly used as ring badges for extremity monitoring during source handling.", "Incorrect — a GM detector is a survey instrument, not a personnel extremity dosimeter.", "Incorrect — pocket ionization chambers are worn on the torso for real-time whole-body dose, not extremities."], "concept": "TLD ring badges monitor extremity dose for staff whose hands are close to radioactive sources (e.g., brachytherapy loading).", "formula": "", "id": 456, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Radiation Safety", "stem": "What is the maximum annual dose permitted to the lens of the eye for someone who does NOT work in radiation oncology or radiology?", "choices": ["0.5 rem (5 mSv)", "1.5 rem (15 mSv)", "5 rem (50 mSv)", "15 rem (150 mSv)"], "correct": 1, "expl": ["Incorrect — this is too low for the stated limit.", "Correct — the annual lens-of-eye dose limit for non-radiation workers is 1.5 rem (15 mSv).", "Incorrect — 5 rem is closer to the general occupational whole-body limit for radiation workers, not the non-radiation-worker eye limit.", "Incorrect — this greatly overstates the limit."], "concept": "Occupational and public dose limits differ; the lens-of-eye limit for a non-radiation worker is set separately and lower than for occupationally exposed radiation staff.", "formula": "", "id": 457, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Equipment/Beam Physics", "stem": "The gantry angle indicator on a linear accelerator has a tolerance of within how many degrees?", "choices": ["0.5 degree", "1 degree", "2 degrees", "5 degrees"], "correct": 1, "expl": ["Incorrect — this is tighter than the standard tolerance.", "Correct — gantry angle indicator tolerance is typically within 1 degree.", "Incorrect — this exceeds the standard tolerance.", "Incorrect — this far exceeds acceptable tolerance for gantry angle."], "concept": "Mechanical/positional QA tolerances (gantry angle, collimator angle, etc.) are tightly specified, commonly ±1°.", "formula": "", "id": 458, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Oncology/Anatomy", "stem": "Which of the following is NOT a common site for lung cancer metastasis?", "choices": ["Brain", "Bone", "Pancreas", "Liver"], "correct": 2, "expl": ["Incorrect — brain is a classic site of lung cancer metastasis (mnemonic BBLLAK).", "Incorrect — bone is a classic site of lung cancer metastasis.", "Correct — the pancreas is not one of the classic common metastatic sites for lung cancer (mnemonic BBLLAK: Bone, Brain, Liver, Lymph nodes, Adrenal, Kidney).", "Incorrect — liver is a classic site of lung cancer metastasis."], "concept": "Mnemonic BBLLAK: Bone, Brain, Liver, Lymph nodes, Adrenal glands, Kidney are the classic distant metastatic sites for lung cancer.", "formula": "", "id": 459, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Anatomy", "stem": "The largest gland in the human body is the:", "choices": ["Thyroid", "Pancreas", "Liver", "Parotid"], "correct": 2, "expl": ["Incorrect — the thyroid is a much smaller endocrine gland.", "Incorrect — the pancreas is smaller than the liver.", "Correct — the liver is the largest gland in the human body.", "Incorrect — the parotid is one of the salivary glands, far smaller than the liver."], "concept": "The liver, in addition to its many metabolic functions, is classified as the body's largest gland.", "formula": "", "id": 460, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Anatomy", "stem": "In relation to the glottis, the false vocal cords are located:", "choices": ["Superior", "Inferior", "Anterior", "Posterior"], "correct": 0, "expl": ["Correct — the false vocal cords (vestibular folds) lie superior to the true vocal cords/glottis.", "Incorrect — structures inferior to the glottis include the subglottis/trachea, not the false cords.", "Incorrect — this does not describe the false cords' relationship to the glottis.", "Incorrect — this does not describe the false cords' relationship to the glottis."], "concept": "Laryngeal anatomy from superior to inferior: supraglottis (including false vocal cords) → glottis (true vocal cords) → subglottis.", "formula": "", "id": 461, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Physics/Imaging", "stem": "Which type of photon interaction is most likely to occur during kV imaging?", "choices": ["Compton scattering", "Photoelectric effect", "Pair production", "Coherent scattering"], "correct": 1, "expl": ["Incorrect — Compton dominates at megavoltage therapeutic energies, not kV imaging.", "Correct — the photoelectric effect predominates at low (kV/diagnostic) photon energies, especially in higher-Z tissues like bone.", "Incorrect — pair production requires energies above 1.02 MeV, far above kV imaging range.", "Incorrect — coherent scattering is a minor interaction with negligible probability compared to photoelectric at kV energies."], "concept": "Photoelectric effect dominates at low energy/high-Z (kV imaging, contrast, bone); Compton dominates at MV therapy energies.", "formula": "", "id": 462, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Calculations", "stem": "The patient is positioned supine, head first. The AP SSD is 88 cm. Calculate the new SSD after performing a 2 cm posterior iso shift.", "choices": ["84 cm", "86 cm", "88 cm", "90 cm"], "correct": 1, "expl": ["Incorrect — this would be a 4 cm shift, not 2 cm.", "Correct — shifting the isocenter 2 cm posterior for an AP field moves the surface 2 cm closer to the source: 88 − 2 = 86 cm.", "Incorrect — this ignores the shift entirely.", "Incorrect — a posterior shift for an AP beam decreases, not increases, the AP SSD."], "concept": "A posterior isocenter shift decreases the AP SSD (patient surface moves closer to the AP source) by the shift distance.", "formula": "New SSD = Original SSD − shift distance (for a shift toward the beam source)", "id": 463, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Physics/Beam Data", "stem": "Backscatter has a direct relationship with:", "choices": ["SSD", "Field size", "Beam energy alone", "Collimator angle"], "correct": 1, "expl": ["Incorrect — backscatter factor is essentially independent of SSD.", "Correct — backscatter factor increases with field size; it is used mainly for low-energy (orthovoltage) beams and depends on beam energy and field size, independent of SSD.", "Incorrect — backscatter depends on both energy and field size, not energy alone.", "Incorrect — collimator angle does not determine backscatter factor."], "concept": "Backscatter factor (used chiefly for low-energy/orthovoltage beams) depends on field size and beam energy, and is independent of SSD.", "formula": "", "id": 464, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Physics/Imaging", "stem": "The photon interaction most likely to occur with bony anatomy during CT simulation is:", "choices": ["Compton scattering", "Photoelectric effect", "Pair production", "Rayleigh scattering"], "correct": 1, "expl": ["Incorrect — Compton is less dependent on atomic number and dominates at higher (MV) energies.", "Correct — the photoelectric effect has strong Z³ dependence, making it dominant in high-Z tissue like bone at CT (kV) energies.", "Incorrect — pair production requires >1.02 MeV, well above CT energies.", "Incorrect — Rayleigh/coherent scattering is a minor contributor with no energy transfer."], "concept": "High atomic number tissue (bone) strongly favors the photoelectric effect at diagnostic/kV imaging energies.", "formula": "", "id": 465, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Radiation Safety/Units", "stem": "A unit of exposure in air is the:", "choices": ["Gray", "Sievert", "Roentgen", "Becquerel"], "correct": 2, "expl": ["Incorrect — Gray is the SI unit of absorbed dose, not exposure.", "Incorrect — Sievert is the SI unit of dose equivalent/effective dose.", "Correct — the Roentgen is the traditional unit of exposure, measuring ionization produced in air.", "Incorrect — Becquerel is the SI unit of radioactivity (decays per second)."], "concept": "Roentgen (R) = ionization in air (exposure); distinct from Gray (absorbed dose) and Sievert (dose equivalent).", "formula": "", "id": 466, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Physics/Electrons", "stem": "The useful range in tissue of a 10 MeV electron beam is:", "choices": ["2.5 cm", "5 cm", "10 cm", "20 cm"], "correct": 1, "expl": ["Incorrect — this underestimates the useful range.", "Correct — a commonly used rule of thumb is useful (therapeutic) range ≈ E/2, so 10/2 = 5 cm.", "Incorrect — this describes roughly the practical/maximum range (≈E), not the useful therapeutic range.", "Incorrect — this greatly overstates the useful range."], "concept": "Rule of thumb for electron beams: useful therapeutic depth (≈90% dose) ≈ Energy(MeV)/3–4, practical/useful range often approximated as E/2.", "formula": "Useful range (cm) ≈ E(MeV)/2", "id": 467, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Radiation Safety", "stem": "What is the annual dose limit to the general public for continuous/frequent exposure?", "choices": ["0.01 rem (0.1 mSv)", "0.1 rem (1 mSv)", "0.5 rem (5 mSv)", "5 rem (50 mSv)"], "correct": 1, "expl": ["Incorrect — this is too low for the stated public limit.", "Correct — the annual public dose limit for continuous/frequent exposure is 0.1 rem (1 mSv).", "Incorrect — 0.5 rem is closer to the occasional/infrequent public exposure limit, not the continuous one.", "Incorrect — 5 rem is the general occupational, not public, annual limit."], "concept": "Public dose limits (0.1 rem/1 mSv continuous; 0.5 rem/5 mSv infrequent) are set well below occupational limits (5 rem/50 mSv).", "formula": "", "id": 468, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Radiation Safety", "stem": "When calculating shielding for the linear accelerator area control room (directly monitored by the radiation safety officer), exposure should be limited to:", "choices": ["0.1 mSv/week (0.01 rem/week)", "1 mSv/week (0.1 rem/week)", "5 mSv/week (0.5 rem/week)", "50 mSv/week (5 rem/week)"], "correct": 1, "expl": ["Incorrect — this is lower than the standard control-area design limit.", "Correct — the control/console area, being an occupationally monitored controlled area, is typically designed to 0.1 rem/week (1 mSv/week).", "Incorrect — this exceeds the standard weekly design limit for this area.", "Incorrect — this vastly exceeds any reasonable weekly shielding design goal."], "concept": "Controlled/occupational areas (like the console) use a weekly design goal consistent with the annual occupational limit spread over working weeks.", "formula": "", "id": 469, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Ergonomics", "stem": "For proper body mechanics, the center of gravity is located at the ____ when standing.", "choices": ["Chest", "Pelvis", "Shoulders", "Head"], "correct": 1, "expl": ["Incorrect — the chest is above the body's center of gravity.", "Correct — the pelvis (roughly at the level of the sacrum/S2) is the body's center of gravity when standing.", "Incorrect — the shoulders are well above the center of gravity.", "Incorrect — the head is the highest point, far above center of gravity."], "concept": "Proper lifting/body mechanics principles are built around keeping the load close to the body's center of gravity, located near the pelvis.", "formula": "", "id": 470, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Anatomy/Oncology", "stem": "All of the following would be considered regional lymph nodes to the rectum EXCEPT:", "choices": ["Perirectal nodes", "Internal iliac nodes", "Presacral nodes", "Azygos node"], "correct": 3, "expl": ["Incorrect — perirectal nodes are a classic regional drainage site for the rectum.", "Incorrect — internal iliac nodes are a recognized regional drainage basin for the rectum.", "Incorrect — presacral nodes are a recognized regional drainage site for the rectum.", "Correct — the azygos node is part of the thoracic venous/lymphatic system, not a regional lymph node basin for the rectum."], "concept": "Rectal regional nodes include perirectal, presacral, and internal iliac chains; azygos nodes are unrelated (thoracic).", "formula": "", "id": 471, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Oncology", "stem": "Tumors in the esophagus typically have a histology of:", "choices": ["Squamous cell carcinoma or adenocarcinoma", "Small cell carcinoma only", "Sarcoma only", "Lymphoma only"], "correct": 0, "expl": ["Correct — esophageal cancer is most often squamous cell carcinoma (upper/mid esophagus) or adenocarcinoma (lower esophagus, often Barrett's-related).", "Incorrect — small cell carcinoma is a rare esophageal histology, not the typical one.", "Incorrect — sarcoma is a rare esophageal malignancy.", "Incorrect — lymphoma is an uncommon primary esophageal malignancy."], "concept": "Esophageal cancer histology varies by location: squamous cell carcinoma is more common proximally, adenocarcinoma more common distally.", "formula": "", "id": 472, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Equipment/Beam Geometry", "stem": "With the collimator at 0 degrees, the Y jaws represent the field dimension in which direction(s)?", "choices": ["Left and right (lateral)", "Superior and inferior", "Anterior and posterior", "Oblique diagonal"], "correct": 1, "expl": ["Incorrect — this describes the X jaws' typical orientation at collimator 0.", "Correct — at collimator angle 0, the Y jaws typically define the superior/inferior field borders.", "Incorrect — jaws define field edges within the beam's-eye view, not anterior/posterior depth.", "Incorrect — jaws move along orthogonal axes, not diagonally."], "concept": "By convention (collimator 0°), X jaws set the left/right field border and Y jaws set the superior/inferior field border.", "formula": "", "id": 473, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Treatment Planning", "stem": "To create a more homogeneous dose distribution when treating with paired fields at a hinge angle less than 180 degrees, which beam modifier should be used?", "choices": ["Bolus", "Wedge", "Compensator only", "Beam spoiler"], "correct": 1, "expl": ["Incorrect — bolus is used to increase surface dose, not correct hinge-angle dose inhomogeneity.", "Correct — a wedge tilts the isodose distribution to compensate for the oblique beam geometry created by a hinge angle less than 180°, producing more homogeneous composite dose.", "Incorrect — a compensator corrects for missing tissue/contour irregularities, not primarily hinge-angle geometry.", "Incorrect — a beam spoiler increases surface dose by degrading skin sparing, unrelated to hinge-angle homogeneity."], "concept": "Wedged-pair technique is the classic solution for achieving homogeneous dose across two angled (hinged) fields.", "formula": "", "id": 474, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Treatment Planning", "stem": "Which of the following decrease skin sparing? (1) Bolus (2) Wedge (3) Compensator (4) Beam spoiler", "choices": ["1 and 2", "1 and 4", "2 and 3", "3 and 4"], "correct": 1, "expl": ["Incorrect — wedges do not primarily function to decrease skin sparing.", "Correct — bolus and beam spoilers are specifically used to bring the dose buildup region closer to the skin surface, decreasing skin sparing.", "Incorrect — wedges and compensators modify beam shape/homogeneity, not primarily skin sparing.", "Incorrect — compensators do not primarily reduce skin sparing."], "concept": "Bolus and beam spoilers both add material/scatter near the skin surface to intentionally reduce the natural skin-sparing effect of megavoltage beams.", "formula": "", "id": 475, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Physics/Beam Data", "stem": "Aside from the collimating jaws, scatter also occurs with the:", "choices": ["Multileaf collimator only", "Flattening filter", "Ion chamber", "Bending magnet"], "correct": 1, "expl": ["Incorrect — the MLC does contribute some scatter, but the classically tested source alongside jaws is the flattening filter.", "Correct — the flattening filter is a major source of head scatter in addition to the collimating jaws.", "Incorrect — the monitor ion chamber measures beam output; it is not a primary scatter source.", "Incorrect — the bending magnet redirects the electron beam and is not a head-scatter source."], "concept": "Head scatter in MU calculations arises primarily from the flattening filter and collimating jaws (collimator scatter factor, Sc).", "formula": "", "id": 476, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Quality Assurance", "stem": "What is the minimum testing frequency for leaf position accuracy (MLC QA)?", "choices": ["Daily", "Weekly", "Monthly", "Annually"], "correct": 2, "expl": ["Incorrect — daily QA typically covers safety interlocks and basic output constancy, not detailed leaf position accuracy.", "Incorrect — weekly is more frequent than the standard minimum for this specific test.", "Correct — MLC leaf position accuracy is tested at minimum on a monthly basis.", "Incorrect — annual QA is comprehensive but leaf position accuracy is checked more frequently than once a year."], "concept": "Standard QA schedules tier tests by frequency (daily, monthly, annual), with leaf-position accuracy commonly assessed monthly.", "formula": "", "id": 477, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Physics/Electrons", "stem": "What is the dmax for a 9 MeV electron beam?", "choices": ["0.5 cm", "1.4 cm", "2.2 cm", "4.5 cm"], "correct": 2, "expl": ["Incorrect — this underestimates dmax for this energy.", "Incorrect — this underestimates dmax for a 9 MeV beam.", "Correct — for a 9 MeV electron beam, dmax is approximately 2.2 cm.", "Incorrect — this overestimates dmax for this energy."], "concept": "Electron beam dmax increases with energy; approximate values are commonly memorized per energy level for board purposes.", "formula": "", "id": 478, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Oncology", "stem": "Which of the following is NOT a phase of chronic myeloid leukemia (CML)?", "choices": ["Chronic phase", "Accelerated phase", "Blast crisis", "Latent phase"], "correct": 3, "expl": ["Incorrect — chronic phase is one of the three recognized phases of CML.", "Incorrect — accelerated phase is one of the three recognized phases of CML.", "Incorrect — blast crisis is one of the three recognized phases of CML.", "Correct — 'latent phase' is not a recognized phase of CML; the three phases are chronic, accelerated, and blast crisis."], "concept": "CML progresses through three recognized phases: chronic → accelerated → blast crisis.", "formula": "", "id": 479, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Physics", "stem": "A photon strikes an object, and scattered radiation occurs. This is due to:", "choices": ["Bremsstrahlung interaction", "Characteristic radiation", "Compton scattering", "Photodisintegration"], "correct": 2, "expl": ["Incorrect — bremsstrahlung describes electron deceleration producing x-rays, not photon scatter off an object.", "Incorrect — characteristic radiation arises from inner-shell electron transitions, not general scatter production.", "Correct — Compton scattering is the interaction responsible for producing scattered radiation when an incident photon interacts with matter and loses partial energy while changing direction.", "Incorrect — photodisintegration is a high-energy nuclear reaction, not the typical mechanism of scattered radiation in this context."], "concept": "Compton scattering is the dominant mechanism producing scattered secondary photons at therapeutic energies.", "formula": "", "id": 480, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Imaging", "stem": "Which diagnostic imaging procedures do NOT utilize ionizing radiation? (1) Ultrasound (2) Nuclear medicine (3) Radiography (4) Computed Tomography (5) Magnetic Resonance Imaging", "choices": ["1 and 5", "2 and 4", "1, 3, and 4", "2, 3, and 4"], "correct": 0, "expl": ["Correct — ultrasound (sound waves) and MRI (magnetic fields/radiofrequency) do not use ionizing radiation.", "Incorrect — nuclear medicine and CT both use ionizing radiation.", "Incorrect — radiography and CT both use ionizing radiation.", "Incorrect — nuclear medicine, radiography, and CT all use ionizing radiation."], "concept": "Ultrasound and MRI are non-ionizing imaging modalities; radiography, CT, and nuclear medicine all use ionizing radiation.", "formula": "", "id": 481, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Oncology/Screening", "stem": "Which type of test is a Pap smear considered?", "choices": ["Serology", "Cytology", "Histology", "Immunology"], "correct": 1, "expl": ["Incorrect — serology tests blood for antibodies/antigens, not cell samples.", "Correct — a Pap smear is a cytology test, examining individual exfoliated cervical cells for abnormalities.", "Incorrect — histology examines tissue architecture from a biopsy, not exfoliated cells.", "Incorrect — immunology is not the classification of a Pap smear."], "concept": "Pap smears are classified as cytologic screening tests, evaluating cellular changes rather than tissue architecture.", "formula": "", "id": 482, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Billing/Practice Standards", "stem": "A treatment with parallel-opposed (POP) fields that does NOT use MLCs or blocks should be charged as:", "choices": ["Complex treatment", "Simple treatment", "IMRT treatment", "3D-CRT treatment"], "correct": 1, "expl": ["Incorrect — complex treatment billing typically requires shaping devices like blocks or MLCs.", "Correct — simple, open, unblocked parallel-opposed fields are billed as a simple treatment.", "Incorrect — IMRT billing requires modulated, non-uniform intensity delivery, not simple POP fields.", "Incorrect — 3D-CRT billing generally involves conformal shaping (blocks/MLC), which is absent here."], "concept": "Billing complexity level for external beam treatment is generally determined by the use of shielding/shaping devices (blocks, MLC, wedges, compensators).", "formula": "", "id": 483, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Physics/Skin Dose", "stem": "Which of the following beam energies would give the highest skin dose?", "choices": ["6 MV", "10 MV", "150 kV", "250 kV"], "correct": 3, "expl": ["Incorrect — higher MV beams have greater skin sparing, giving lower skin dose than kV beams.", "Incorrect — higher MV beams have greater skin sparing, giving lower skin dose than kV beams.", "Incorrect — 150 kV gives less skin dose than 250 kV among the low-energy options given here.", "Correct — of the given options, 250 kV (orthovoltage) has the least skin sparing and thus the highest skin dose."], "concept": "Lower-energy (kV) photon beams have minimal skin sparing; skin dose decreases as beam energy increases into the megavoltage range.", "formula": "", "id": 484, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Physics/Skin Dose", "stem": "Which photon beam energy provides the LEAST skin-sparing effect?", "choices": ["6 MV", "10 MV", "150 kV", "18 MV"], "correct": 2, "expl": ["Incorrect — 6 MV has substantial skin sparing compared to kV beams.", "Incorrect — 10 MV has even greater skin sparing than 6 MV.", "Correct — 150 kV (a low, orthovoltage energy) provides the least skin-sparing effect among these options.", "Incorrect — 18 MV has the greatest skin sparing of the choices listed."], "concept": "Skin-sparing effect increases with beam energy; the lowest-energy beam listed provides the least sparing.", "formula": "", "id": 485, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Informatics", "stem": "What is used to store and share radiographic images electronically?", "choices": ["EMR", "PACS", "RIS", "HIS"], "correct": 1, "expl": ["Incorrect — an EMR is the broader electronic medical record, not specifically an image archive/communication system.", "Correct — PACS (Picture Archiving and Communication System) is used to store, retrieve, and share radiographic images electronically.", "Incorrect — RIS (Radiology Information System) manages scheduling/orders/reports, not primarily image storage.", "Incorrect — HIS (Hospital Information System) manages broader hospital administrative/clinical data, not specifically image archiving."], "concept": "PACS is the standard system specifically designed for storage, retrieval, and electronic distribution of medical images.", "formula": "", "id": 486, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Infection Control", "stem": "A patient with MRSA should be placed on which precaution?", "choices": ["Airborne", "Droplet", "Contact", "Standard only"], "correct": 2, "expl": ["Incorrect — airborne precautions are for pathogens spread by small aerosolized particles (e.g., TB, measles), not MRSA.", "Incorrect — droplet precautions are for pathogens spread by larger respiratory droplets (e.g., influenza), not typically MRSA.", "Correct — MRSA (methicillin-resistant Staphylococcus aureus) requires contact precautions due to transmission via direct/indirect contact.", "Incorrect — MRSA requires enhanced (contact) precautions beyond standard precautions alone."], "concept": "MRSA is a multidrug-resistant organism spread by contact, requiring contact precautions (gown and gloves) in addition to standard precautions.", "formula": "", "id": 487, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Physics/Sources", "stem": "Which of the following brachytherapy sources has the longest half-life?", "choices": ["Iodine-125", "Iridium-192", "Cesium-137", "Gold-198"], "correct": 2, "expl": ["Incorrect — Iodine-125 has a half-life of about 59 days, shorter than cesium-137.", "Incorrect — Iridium-192 has a half-life of about 74 days, shorter than cesium-137.", "Correct — Cesium-137 has a half-life of about 30 years, the longest among these common brachytherapy sources.", "Incorrect — Gold-198 has a half-life of about 2.7 days, far shorter than cesium-137."], "concept": "Half-life comparison of common brachytherapy isotopes: Au-198 (~2.7 days) < I-125 (~59 days) < Ir-192 (~74 days) << Cs-137 (~30 years).", "formula": "", "id": 488, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Equipment", "stem": "What provides power to the electron gun in a linear accelerator?", "choices": ["Waveguide", "Klystron/magnetron", "Modulator", "Bending magnet"], "correct": 2, "expl": ["Incorrect — the waveguide accelerates the electrons after they leave the gun; it does not power the gun itself.", "Incorrect — the klystron/magnetron generates the microwave power for the waveguide, not the electron gun directly.", "Correct — the modulator supplies the high-voltage pulses that power both the electron gun and the microwave power source.", "Incorrect — the bending magnet redirects the electron beam path; it does not power the electron gun."], "concept": "The modulator generates and delivers the high-voltage pulses required to operate the electron gun and the microwave power source (klystron/magnetron).", "formula": "", "id": 489, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Billing/Practice Standards", "stem": "Left breast tangents should be billed as:", "choices": ["Simple treatment", "Intermediate treatment", "Complex treatment", "IMRT"], "correct": 2, "expl": ["Incorrect — tangential breast fields involve shaped/wedged/multiple-field geometry beyond a simple treatment.", "Incorrect — intermediate is not the standard billing classification for tangential breast fields.", "Correct — tangential breast fields (with wedges/blocking/multiple non-coplanar-angled beams) are billed as a complex treatment.", "Incorrect — standard tangent fields are not IMRT unless specifically planned/delivered as such."], "concept": "Tangential breast fields typically require wedges or field-in-field shaping, meeting criteria for complex treatment billing.", "formula": "", "id": 490, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Equipment", "stem": "Which machine components are located within the gantry of a linear accelerator?", "choices": ["Target and ion chambers", "Electron gun and accelerator (waveguide) structure", "Multileaf collimator only", "Flattening filter only"], "correct": 1, "expl": ["Incorrect — the target and monitor ion chambers are located in the treatment head, not broadly 'the gantry' as asked here.", "Correct — the electron gun and the accelerating waveguide structure are housed within the gantry.", "Incorrect — the MLC is one head component among several, not the full answer to what's in the gantry.", "Incorrect — the flattening filter is one head component among several, not the full answer to what's in the gantry."], "concept": "The gantry houses the electron gun and accelerating waveguide (and bending magnet), which feed into the treatment head.", "formula": "", "id": 491, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Regulatory", "stem": "Which agency is responsible for regulating the manufacturing of linear accelerators?", "choices": ["Nuclear Regulatory Commission (NRC)", "Food and Drug Administration (FDA)", "Environmental Protection Agency (EPA)", "Occupational Safety and Health Administration (OSHA)"], "correct": 1, "expl": ["Incorrect — the NRC regulates radioactive materials (byproduct material), not machine-produced radiation equipment manufacturing.", "Correct — the FDA regulates the manufacturing of medical devices, including linear accelerators, since they don't use radioactive material.", "Incorrect — the EPA sets broad environmental radiation protection standards, not device manufacturing regulation.", "Incorrect — OSHA regulates workplace safety, not device manufacturing standards."], "concept": "Because linacs are machine-produced radiation devices (not radioactive material), FDA — not NRC — regulates their manufacturing.", "formula": "", "id": 492, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Treatment Planning", "stem": "Which of the following techniques could be used to reduce tumor motion?", "choices": ["DIBH, respiratory gating, and abdominal compression", "Bolus and wedges", "Multileaf collimation alone", "Increasing field size"], "correct": 0, "expl": ["Correct — deep inspiration breath hold (DIBH), respiratory gating, and abdominal compression are established motion-management techniques.", "Incorrect — bolus and wedges are dose-shaping tools, not motion-management techniques.", "Incorrect — MLC shapes the field but does not itself manage respiratory/tumor motion.", "Incorrect — increasing field size compensates for motion with a larger margin but does not reduce the motion itself."], "concept": "Motion-management strategies (DIBH, gating, abdominal compression, tracking) actively reduce or account for respiratory tumor motion.", "formula": "", "id": 493, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Anatomy/Treatment Planning", "stem": "What is the typical gantry angle used for supraclavicular fields?", "choices": ["0 degrees", "10-15 degrees", "45 degrees", "90 degrees"], "correct": 1, "expl": ["Incorrect — a straight AP (0°) field would irradiate more spinal cord/esophagus than desired.", "Correct — supraclavicular fields are typically angled 10-15 degrees off vertical (away from midline) to avoid the spinal cord/esophagus.", "Incorrect — 45 degrees is too oblique for a typical supraclavicular field setup.", "Incorrect — 90 degrees would produce a lateral, not anterior, field, inappropriate for the supraclavicular region."], "concept": "A slight (10-15°) gantry tilt for the supraclavicular field avoids excess dose to midline structures like the spinal cord and esophagus.", "formula": "", "id": 494, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Equipment", "stem": "Which machine components are located within the treatment head of a linear accelerator?", "choices": ["Electron gun and waveguide", "Target and monitor ion chambers", "Bending magnet only", "Modulator only"], "correct": 1, "expl": ["Incorrect — the electron gun and waveguide are in the gantry/stand, upstream of the treatment head.", "Correct — the target (or scattering foil), flattening filter, and monitor ion chambers are located within the treatment head.", "Incorrect — the bending magnet is located before the treatment head, redirecting the beam into it.", "Incorrect — the modulator is a separate high-voltage power supply, not located in the treatment head."], "concept": "The treatment head contains the target/scattering foil, flattening filter or scattering foils, collimation, and monitor ion chambers.", "formula": "", "id": 495, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "MRI Safety", "stem": "Which device is generally considered MR safe?", "choices": ["Ferromagnetic aneurysm clip", "Titanium (non-ferromagnetic) aneurysm clip", "Older-generation cardiac pacemaker", "Any implanted metal device"], "correct": 1, "expl": ["Incorrect — ferromagnetic clips pose a serious risk of movement/dislodgement in the MRI's magnetic field.", "Correct — titanium and other non-ferromagnetic aneurysm clips are generally considered MR safe/conditional, unlike ferromagnetic clips.", "Incorrect — older pacemakers are frequently not MR safe and require careful screening/manufacturer verification.", "Incorrect — MR safety depends entirely on the specific material and device; it cannot be generalized to 'any' implant."], "concept": "MR safety of implants depends on their specific material composition (ferromagnetic vs. non-ferromagnetic) and must always be individually verified.", "formula": "", "id": 496, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Treatment Planning", "stem": "What is the purpose of imaging studies performed before brachytherapy?", "choices": ["To bill the correct procedure code", "To identify tumor location/size, confirm correct positioning, and minimize dose to healthy tissue", "To satisfy MRI safety screening only", "To determine patient allergies"], "correct": 1, "expl": ["Incorrect — billing is administrative and not the clinical purpose of pre-brachytherapy imaging.", "Correct — pre-implant imaging identifies tumor location/size, verifies correct applicator/source positioning, and helps minimize dose to surrounding healthy tissue.", "Incorrect — MRI safety screening is a separate process from the clinical purpose of treatment-planning imaging.", "Incorrect — allergy screening is unrelated to the purpose of pre-brachytherapy imaging."], "concept": "Pre-brachytherapy imaging (CT/MRI/ultrasound) is central to accurate applicator placement and dose optimization to target while sparing normal tissue.", "formula": "", "id": 497, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Physics/Imaging", "stem": "The photoelectric effect would be most predominant in which imaging techniques?", "choices": ["MV portal imaging and CBCT", "kV pair imaging and kV-CBCT", "Ultrasound and MRI", "Nuclear medicine gamma imaging"], "correct": 1, "expl": ["Incorrect — MV imaging uses the megavoltage treatment beam, where Compton scattering dominates, not the photoelectric effect.", "Correct — kV pair imaging and kV-CBCT use low (diagnostic-range) photon energies, where the photoelectric effect predominates, especially in bone.", "Incorrect — ultrasound and MRI do not use ionizing photons at all.", "Incorrect — nuclear medicine gamma imaging detects emitted photons rather than relying on photoelectric interaction as its dominant imaging contrast mechanism."], "concept": "Photoelectric effect dominance at low (kV) photon energies underlies the superior soft-tissue/bone contrast of kV imaging versus MV imaging.", "formula": "", "id": 498, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Ethics/Legal", "stem": "What is negligence?", "choices": ["A healthcare professional intentionally harming a patient", "A healthcare professional failing to follow the standards of care, causing harm to the patient", "A patient refusing treatment", "An unavoidable complication of treatment"], "correct": 1, "expl": ["Incorrect — intentional harm describes battery or assault, not negligence.", "Correct — negligence is the failure of a healthcare professional to follow the standard of care that a reasonably prudent professional would provide, resulting in harm to the patient.", "Incorrect — patient refusal of treatment is a separate concept (informed refusal), not negligence.", "Incorrect — an unavoidable complication that occurs despite appropriate standard-of-care practice is not, by definition, negligence."], "concept": "Negligence requires four elements: duty, breach of duty (failure to meet standard of care), causation, and resulting harm/damages.", "formula": "", "id": 499, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Physics", "stem": "Atomic nuclei with differing Z (atomic) numbers, but the same A (mass) number, are called:", "choices": ["Isotopes", "Isotones", "Isobars", "Isomers"], "correct": 2, "expl": ["Incorrect — isotopes share the same Z (same element), differing in neutron number/mass number.", "Incorrect — isotones share the same number of neutrons (N), not the same mass number by definition.", "Correct — isobars have the same mass number (A) but different atomic numbers (Z), representing different elements.", "Incorrect — isomers share the same Z and A but differ in nuclear energy state, not atomic number."], "concept": "Nuclear terminology: isotopes (same Z), isotones (same N), isobars (same A), isomers (same Z and A, different energy state).", "formula": "", "id": 500, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Instrumentation", "stem": "Which of the following types of radiation can be detected using a Geiger-Müller counter?", "choices": ["Only alpha particles", "Only beta particles", "Gamma rays (as well as alpha and beta)", "Neutrons only"], "correct": 2, "expl": ["Incorrect — GM counters can detect more than only alpha particles.", "Incorrect — GM counters can detect more than only beta particles.", "Correct — GM counters are versatile survey instruments capable of detecting alpha, beta, and gamma radiation (with appropriate probe/window), commonly used for gamma/contamination surveys.", "Incorrect — standard GM counters are not efficient neutron detectors; specialized neutron detectors are needed for that purpose."], "concept": "GM detectors are broadly sensitive survey instruments used for presence/contamination detection across several radiation types, including gamma rays.", "formula": "", "id": 501, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Emergency Response", "stem": "What is the first step you should take if you find a patient in cardiac arrest?", "choices": ["Begin chest compressions immediately without assessment", "Call for help/activate emergency response", "Retrieve the AED before assessing the patient", "Move the patient to another room"], "correct": 1, "expl": ["Incorrect — assessment and calling for help/activating the emergency response system come first, per BLS protocol.", "Correct — the first step upon finding an unresponsive, non-breathing patient is to call for help/activate the emergency response system (and begin CPR if trained/indicated).", "Incorrect — activating the emergency response system precedes retrieving equipment.", "Incorrect — moving the patient delays critical intervention and is inappropriate as a first step."], "concept": "Basic life support protocol: recognize the emergency, call for help/activate emergency response, then begin CPR/AED as trained and indicated.", "formula": "", "id": 502, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Infection Control", "stem": "Which of the following is an example of vector-borne disease transmission?", "choices": ["Direct skin-to-skin contact", "Contaminated surface (fomite) contact", "Bites from insects or animals", "Airborne respiratory droplets"], "correct": 2, "expl": ["Incorrect — this describes direct contact transmission, not vector-borne.", "Incorrect — this describes vehicle-borne (fomite) transmission, not vector-borne.", "Correct — vector-borne transmission occurs via a living carrier such as an insect or animal (e.g., mosquito, tick) transmitting a pathogen through a bite.", "Incorrect — this describes airborne or droplet transmission, not vector-borne."], "concept": "Vector-borne transmission specifically involves a biological carrier (insect/animal vector), distinct from direct, vehicle-borne, or airborne transmission.", "formula": "", "id": 503, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Physics", "stem": "What is x-ray beam quality?", "choices": ["The total number of photons in the beam", "The energy of the x-ray photons in the beam", "The dose rate of the beam", "The field size of the beam"], "correct": 1, "expl": ["Incorrect — total photon number relates to beam quantity/intensity, not quality.", "Correct — beam quality refers to the energy (penetrating power) of the x-ray photons in the beam, often characterized by HVL or effective/peak energy.", "Incorrect — dose rate is a quantity-related parameter, not the definition of beam quality.", "Incorrect — field size is a geometric parameter unrelated to the definition of beam quality."], "concept": "Beam quality describes the penetrating ability/energy spectrum of the beam, commonly assessed via half-value layer (HVL).", "formula": "", "id": 504, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Image Guidance", "stem": "What is the purpose of image-guided radiation therapy (IGRT)?", "choices": ["To replace the need for CT simulation", "To track tumor/patient position before treatment and adjust setup as needed", "To calculate the prescribed dose", "To determine beam energy"], "correct": 1, "expl": ["Incorrect — IGRT is used in conjunction with, not as a replacement for, CT simulation.", "Correct — IGRT uses imaging (kV, CBCT, MV, surface, etc.) immediately before/during treatment to verify and adjust patient position, improving daily setup accuracy.", "Incorrect — dose calculation is performed by the treatment planning system using the planning CT, not directly by IGRT.", "Incorrect — beam energy is selected during planning, not determined by IGRT."], "concept": "IGRT reduces systematic and random setup errors by verifying daily patient/tumor position against the planning images before beam delivery.", "formula": "", "id": 505, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Treatment Techniques", "stem": "What is the difference between IMRT and VMAT?", "choices": ["IMRT fields are stationary; VMAT fields rotate around the patient during delivery", "IMRT delivers a single fraction; VMAT requires multiple fractions", "IMRT uses electrons; VMAT uses photons only", "There is no difference between the two techniques"], "correct": 0, "expl": ["Correct — IMRT delivers intensity-modulated beams from fixed (stationary) gantry angles, while VMAT delivers dose during continuous gantry rotation with simultaneously varying dose rate, gantry speed, and MLC position.", "Incorrect — fractionation schedule is not the defining difference between IMRT and VMAT; both can be delivered over multiple fractions.", "Incorrect — both IMRT and VMAT are photon-based techniques; this is not the distinguishing feature.", "Incorrect — IMRT and VMAT are meaningfully different delivery techniques."], "concept": "IMRT = modulated delivery from fixed gantry angles; VMAT = modulated delivery during continuous gantry arc rotation, generally allowing faster treatment.", "formula": "", "id": 506, "catKey": "NK1"}, {"cat": "Need-to-Know Review", "sub": "Radiobiology", "stem": "Which of the following is true regarding LET and RBE?", "choices": ["High-LET radiation has a lower RBE than low-LET radiation", "High-LET radiation has a higher RBE than low-LET radiation", "LET and RBE are unrelated concepts", "RBE only applies to photon radiation"], "correct": 1, "expl": ["Incorrect — this reverses the true relationship between LET and RBE.", "Correct — high-LET radiation (e.g., neutrons, alpha particles, protons) generally produces greater biological damage per unit dose, giving it a higher RBE than low-LET radiation (e.g., photons, electrons).", "Incorrect — LET directly influences RBE; they are closely related concepts.", "Incorrect — RBE is used to compare any radiation type to a reference radiation, not limited to photons."], "concept": "Higher LET radiation deposits energy more densely along its track, causing more severe/less repairable DNA damage and thus higher RBE.", "formula": "", "id": 507, "catKey": "NK1"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Anatomy", "stem": "About what fraction of the body's lymph nodes are located in the head and neck area?", "choices": ["1/4", "1/3", "1/2", "2/3"], "correct": 1, "expl": ["Incorrect — this underestimates the proportion.", "Correct — roughly one-third of the body's total lymph nodes are located in the head and neck region.", "Incorrect — this overestimates the proportion.", "Incorrect — this overestimates the proportion."], "concept": "The head and neck contain a disproportionately dense concentration of lymph nodes relative to body size — about one-third of the total.", "formula": "", "id": 508, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Anatomy", "stem": "How many cartilages make up the larynx?", "choices": ["3 pair", "6 pair", "9", "12"], "correct": 2, "expl": ["Incorrect — 3 pair (6 total) does not match the standard count.", "Incorrect — 6 pair (12 total) overstates the count.", "Correct — the larynx is composed of 9 cartilages (3 unpaired: thyroid, cricoid, epiglottis; 3 paired: arytenoid, corniculate, cuneiform).", "Incorrect — 12 overstates the total cartilage count."], "concept": "The larynx has 9 cartilages total: 3 single (thyroid, cricoid, epiglottis) and 3 paired (arytenoid, corniculate, cuneiform).", "formula": "", "id": 509, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Anatomy", "stem": "What is the function of the hyoid bone?", "choices": ["Acts as an attachment for muscles associated with swallowing", "Prevents food from entering the trachea", "Protects the delicate vocal cords", "Acts as a base for the laryngeal cartilages to rest on"], "correct": 0, "expl": ["Correct — the hyoid bone serves as an attachment point for muscles involved in swallowing and tongue movement.", "Incorrect — this describes the function of the epiglottis, not the hyoid.", "Incorrect — protecting the vocal cords is not the hyoid's primary function.", "Incorrect — the hyoid does not serve as a base for laryngeal cartilages; it is a separate, free-floating bone."], "concept": "The hyoid bone, suspended by muscles and ligaments, anchors muscles of the tongue, floor of mouth, and larynx involved in swallowing.", "formula": "", "id": 510, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Anatomy", "stem": "Which of the following is typically the largest vascular structure located in the neck?", "choices": ["Common carotid artery", "Internal jugular vein", "Internal carotid artery", "External carotid artery"], "correct": 1, "expl": ["Incorrect — the common carotid is smaller in caliber than the internal jugular vein.", "Correct — the internal jugular vein is typically the largest vascular structure in the neck.", "Incorrect — the internal carotid artery is smaller than the internal jugular vein.", "Incorrect — the external carotid artery is smaller than the internal jugular vein."], "concept": "The internal jugular vein, running alongside the carotid sheath, is the largest vascular structure in the neck.", "formula": "", "id": 511, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Anatomy", "stem": "The jugulodigastric node may also be referred to as the:", "choices": ["Node of Rouviere", "Subdigastric", "Retropharyngeal", "Circle of Willis"], "correct": 1, "expl": ["Incorrect — the node of Rouviere is a distinct high retropharyngeal node.", "Correct — the jugulodigastric node is also called the subdigastric node.", "Incorrect — retropharyngeal nodes are a separate nodal group.", "Incorrect — the Circle of Willis is a vascular structure at the base of the brain, unrelated to lymph nodes."], "concept": "The jugulodigastric (subdigastric) node lies at the point where the posterior digastric muscle crosses the internal jugular vein — a classic 'sentinel' node for oropharyngeal drainage.", "formula": "", "id": 512, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Anatomy", "stem": "Postcricoid and pyriform sinuses are located in which of the following areas?", "choices": ["Oropharynx", "Hypopharynx", "Ethmoid sinuses", "Maxillary sinuses"], "correct": 1, "expl": ["Incorrect — the oropharynx does not include the postcricoid area or pyriform sinuses.", "Correct — the postcricoid region and pyriform sinuses are subsites of the hypopharynx.", "Incorrect — ethmoid sinuses are part of the paranasal sinus system, unrelated to the hypopharynx.", "Incorrect — maxillary sinuses are part of the paranasal sinus system, unrelated to the hypopharynx."], "concept": "The hypopharynx is divided into three subsites: pyriform sinuses, postcricoid area, and posterior pharyngeal wall.", "formula": "", "id": 513, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Anatomy", "stem": "Which of the following is NOT considered part of the oral cavity?", "choices": ["Buccal mucosa", "Hard palate", "Floor of tongue", "Soft palate"], "correct": 3, "expl": ["Incorrect — buccal mucosa is a recognized oral cavity subsite.", "Incorrect — the hard palate is a recognized oral cavity subsite.", "Incorrect — the floor of the tongue (anterior 2/3) is a recognized oral cavity subsite.", "Correct — the soft palate is part of the oropharynx, not the oral cavity."], "concept": "Oral cavity subsites include lips, buccal mucosa, alveolar ridges, hard palate, floor of mouth, and anterior 2/3 of tongue; the soft palate belongs to the oropharynx.", "formula": "", "id": 514, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Treatment", "stem": "In treating the oropharynx area with conformal treatment (IMRT), all of the following structures can be avoided EXCEPT:", "choices": ["TMJ", "Part of the pterygoid muscles", "Salivary glands", "Tonsils"], "correct": 3, "expl": ["Incorrect — the TMJ can often be spared with conformal planning.", "Incorrect — portions of the pterygoid muscles can often be spared with conformal planning.", "Incorrect — some salivary gland tissue can often be spared with conformal planning.", "Correct — the tonsils themselves are typically within the primary target volume for oropharyngeal cancer and cannot be avoided."], "concept": "Oropharyngeal IMRT can spare nearby structures (TMJ, pterygoids, contralateral salivary tissue) but the tonsillar target itself must receive full dose.", "formula": "", "id": 515, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Anatomy", "stem": "Many structures and soft tissue of the aerodigestive tract within the facial/cervical regions can be directly examined by means of: (1) Palpation (2) Direct inspection (3) Biopsy", "choices": ["1, 2", "1, 3", "2, 3", "1, 2, and 3"], "correct": 3, "expl": ["Incorrect — biopsy is also a valid direct examination method.", "Incorrect — direct inspection is also a valid examination method.", "Incorrect — palpation is also a valid examination method.", "Correct — palpation, direct inspection, and biopsy are all valid means of directly examining accessible head and neck structures."], "concept": "Clinical evaluation of accessible head/neck aerodigestive structures uses palpation, visual inspection, and tissue biopsy as complementary tools.", "formula": "", "id": 516, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Anatomy", "stem": "Which of the following lymph node areas is at very high risk for dissemination of disease, is inaccessible for surgery, and therefore must be included as the minimum target volume when treating the nasopharyngeal area?", "choices": ["Waldeyer ring", "Rouviere nodes", "Circle of Willis", "Jugulodigastric"], "correct": 1, "expl": ["Incorrect — Waldeyer's ring is lymphoid tissue, not the retropharyngeal nodal group described here.", "Correct — the Rouviere nodes (lateral retropharyngeal nodes) are a high-risk, surgically inaccessible nodal group that must be covered when treating nasopharyngeal cancer.", "Incorrect — the Circle of Willis is a vascular structure, not a lymph node group.", "Incorrect — the jugulodigastric node is a separate cervical node, not the specific surgically inaccessible retropharyngeal group described."], "concept": "Because the retropharyngeal (Rouviere) nodes are surgically inaccessible and at high risk, they are routinely included in nasopharyngeal radiation targets.", "formula": "", "id": 517, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Terminology", "stem": "Ear pain is termed:", "choices": ["Stridor", "Dysphagia", "Odynophagia", "Otalgia"], "correct": 3, "expl": ["Incorrect — stridor is a harsh, raspy breathing sound.", "Incorrect — dysphagia is difficulty swallowing.", "Incorrect — odynophagia is painful swallowing.", "Correct — otalgia is the medical term for ear pain."], "concept": "Know the terminology set: stridor (raspy breathing), dysphagia (difficulty swallowing), odynophagia (painful swallowing), otalgia (ear pain), diplopia (double vision).", "formula": "", "id": 518, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Terminology", "stem": "Painful swallowing is termed:", "choices": ["Stridor", "Dysphagia", "Odynophagia", "Otalgia"], "correct": 2, "expl": ["Incorrect — stridor is a harsh, raspy breathing sound.", "Incorrect — dysphagia is difficulty (not necessarily pain) with swallowing.", "Correct — odynophagia specifically refers to painful swallowing.", "Incorrect — otalgia is ear pain, not painful swallowing."], "concept": "Odynophagia (painful swallowing) is distinct from dysphagia (difficulty swallowing), though the two often coexist.", "formula": "", "id": 519, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Terminology", "stem": "Harsh, raspy breath is termed:", "choices": ["Stridor", "Dysphagia", "Odynophagia", "Otalgia"], "correct": 0, "expl": ["Correct — stridor describes harsh, raspy, high-pitched breathing, often from upper airway narrowing.", "Incorrect — dysphagia refers to difficulty swallowing, not a breathing sound.", "Incorrect — odynophagia refers to painful swallowing, not a breathing sound.", "Incorrect — otalgia refers to ear pain, not a breathing sound."], "concept": "Stridor is a red-flag sign of airway compromise in head and neck cancer patients and requires prompt evaluation.", "formula": "", "id": 520, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Terminology", "stem": "Double vision is termed:", "choices": ["Stridor", "Dysphagia", "Odynophagia", "Diplopia"], "correct": 3, "expl": ["Incorrect — stridor is a breathing sound, not a visual symptom.", "Incorrect — dysphagia is difficulty swallowing, not a visual symptom.", "Incorrect — odynophagia is painful swallowing, not a visual symptom.", "Correct — diplopia is the medical term for double vision."], "concept": "Diplopia can signal cranial nerve or orbital involvement in head and neck malignancies and warrants further evaluation.", "formula": "", "id": 521, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Oncology", "stem": "The majority of head and neck cancers have a histology of:", "choices": ["Adenocarcinoma", "Squamous cell carcinoma", "Lymphomas", "Sarcomas"], "correct": 1, "expl": ["Incorrect — adenocarcinoma is a minority histology in head and neck cancer, more typical of salivary gland tumors.", "Correct — the vast majority of head and neck cancers are squamous cell carcinomas.", "Incorrect — lymphomas are a minority of head and neck malignancies.", "Incorrect — sarcomas are a minority of head and neck malignancies."], "concept": "Squamous cell carcinoma accounts for the large majority of head and neck cancers, arising from the mucosal lining of the upper aerodigestive tract.", "formula": "", "id": 522, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Oncology", "stem": "The two most common etiologic factors contributing to head and neck cancers are: (1) Smoking (2) Heredity (3) Alcohol (4) Environmental", "choices": ["1, 2", "1, 3", "2, 3", "2, 4"], "correct": 1, "expl": ["Incorrect — heredity is not one of the two classic dominant etiologic factors.", "Correct — tobacco (smoking) and alcohol use are the two most common, and synergistic, etiologic risk factors for head and neck cancer.", "Incorrect — heredity is not among the two dominant etiologic factors.", "Incorrect — neither heredity nor generic 'environmental' factors are the classic top two."], "concept": "Tobacco and alcohol use act synergistically and together account for the majority of head and neck squamous cell carcinoma risk.", "formula": "", "id": 523, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Treatment", "stem": "The main goals in treating head and neck cancers include determining the best modality of treatment for: (1) Eradication of the disease (2) Maintenance of physiologic function (3) Preservation of social cosmesis", "choices": ["1, 2", "1, 3", "2, 3", "1, 2, and 3"], "correct": 3, "expl": ["Incorrect — cosmesis is also a treatment goal.", "Incorrect — physiologic function preservation is also a treatment goal.", "Incorrect — disease eradication is also a treatment goal.", "Correct — head and neck cancer treatment planning must balance disease eradication, functional preservation, and cosmetic/social outcomes."], "concept": "Head and neck oncology uniquely emphasizes function (speech, swallowing) and appearance alongside oncologic control, given the region's role in identity and communication.", "formula": "", "id": 524, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Oncology", "stem": "Plummer-Vinson syndrome (iron deficiency anemia), often seen in females, is considered an important etiologic factor in which of the following cancers?", "choices": ["Oral cavity", "Oropharynx", "Nasopharynx", "Hypopharynx"], "correct": 0, "expl": ["Correct — Plummer-Vinson syndrome (iron deficiency anemia, esophageal webs, glossitis) is classically linked to increased risk of oral cavity (and hypopharyngeal/esophageal) cancer, particularly historically tested as oral cavity.", "Incorrect — Plummer-Vinson syndrome is not classically linked as an etiologic factor for oropharyngeal cancer specifically.", "Incorrect — nasopharyngeal cancer is more classically linked to EBV and dietary nitrosamines, not Plummer-Vinson syndrome.", "Incorrect — while sometimes linked to upper aerodigestive cancers generally, the classic board-tested association is with oral cavity cancer."], "concept": "Plummer-Vinson (Paterson-Kelly) syndrome is a classic risk factor association tested for upper aerodigestive tract cancers, particularly in the oral cavity.", "formula": "", "id": 525, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Treatment", "stem": "In some head and neck cancers, the supraclavicular area is often treated if there is advanced disease or lower involved nodes. The normal dosage of irradiation to this area is:", "choices": ["2500 cGy", "3000 cGy", "5000 cGy", "6500 cGy"], "correct": 2, "expl": ["Incorrect — this underdoses the region for adequate coverage of at-risk nodal tissue.", "Incorrect — this underdoses the region for standard elective/at-risk nodal coverage.", "Correct — the supraclavicular area is typically treated to approximately 5000 cGy.", "Incorrect — this overstates the typical supraclavicular dose."], "concept": "Elective/at-risk supraclavicular nodal irradiation is typically prescribed to about 50 Gy, consistent with standard elective nodal dosing.", "formula": "", "id": 526, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Oncology", "stem": "The highest rate of nodal metastasis in all head and neck cancers is with cancers of the:", "choices": ["Oral cavity", "Oropharynx", "Nasopharynx", "Hypopharynx"], "correct": 2, "expl": ["Incorrect — oral cavity cancers have a lower rate of nodal spread compared to nasopharynx.", "Incorrect — oropharyngeal cancers have high but not the highest nodal spread rate among these choices.", "Correct — nasopharyngeal cancer has the highest rate of nodal metastasis of all head and neck cancer subsites, given its rich lymphatic drainage.", "Incorrect — hypopharyngeal cancers have high nodal spread rates but not the highest among these choices."], "concept": "Nasopharynx's rich bilateral lymphatic drainage explains why it has the highest nodal metastasis rate of head and neck primary sites.", "formula": "", "id": 527, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Treatment", "stem": "A mouth stent or tongue blade may serve more than one purpose during irradiation treatments for head and neck cancers. They may also serve to separate or ____ the palate.", "choices": ["Moisten", "Displace", "Keep still", "Keep patient from swallowing"], "correct": 1, "expl": ["Incorrect — moistening is not a function of a mouth stent/tongue blade.", "Correct — mouth stents/tongue blades can displace the palate/tongue away from the treatment field to spare normal tissue.", "Incorrect — while immobilization is a secondary benefit, 'displace' is the specific function described.", "Incorrect — preventing swallowing is not the described function of the device."], "concept": "Oral positioning devices serve to displace tissue (tongue, palate) out of the high-dose region to reduce normal tissue toxicity.", "formula": "", "id": 528, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Treatment", "stem": "Which of the following is considered at the most risk when treating the maxillary antrum with radiation?", "choices": ["Brain", "Eye", "Skin", "Pituitary"], "correct": 1, "expl": ["Incorrect — the brain is farther from the maxillary antrum and generally not the primary at-risk organ.", "Correct — the eye/orbit is directly adjacent to the maxillary sinus and is the primary organ at risk during treatment of the maxillary antrum.", "Incorrect — skin toxicity is a lesser concern compared to eye/orbital toxicity for this site.", "Incorrect — the pituitary is more relevant to sellar/nasopharyngeal treatment, not primarily maxillary antrum treatment."], "concept": "The maxillary sinus sits directly below the orbit, making the eye the key organ at risk requiring careful dose limitation.", "formula": "", "id": 529, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/Metastasis", "stem": "The most common site of distant metastatic disease from head and neck cancers is the:", "choices": ["Brain", "Bone", "Lung", "Liver"], "correct": 2, "expl": ["Incorrect — brain metastasis is uncommon from head and neck primary sites.", "Incorrect — bone is a recognized but less common site than lung.", "Correct — the lung is the most common site of distant metastasis from head and neck cancers.", "Incorrect — liver metastasis is less common than lung for head and neck primaries."], "concept": "Hematogenous spread of head and neck squamous cell carcinoma most commonly targets the lungs.", "formula": "", "id": 530, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Treatment", "stem": "The usual wedge-pair technique often used in the treatment of the parotid gland is:", "choices": ["Superior/inferior oblique combination", "Anterior/posterior oblique combination", "Anterior/posterior combination", "Anterior/inferior oblique combination"], "correct": 0, "expl": ["Correct — a superior/inferior oblique wedge-pair combination is the classic technique for parotid gland treatment.", "Incorrect — this is not the classic parotid wedge-pair configuration.", "Incorrect — a straight AP/PA combination does not describe the classic oblique wedge-pair used for parotid.", "Incorrect — this is not the classic parotid wedge-pair configuration."], "concept": "Parotid gland tumors are classically treated with a superior/inferior wedged-pair oblique beam arrangement to spare the contralateral parotid and oral cavity.", "formula": "", "id": 531, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Oncology", "stem": "The most commonly involved malignancy of the sinuses would be:", "choices": ["Ethmoid", "Maxillary", "Sphenoid", "Frontal"], "correct": 1, "expl": ["Incorrect — ethmoid sinus cancer is less common than maxillary.", "Correct — the maxillary sinus is the most commonly involved sinus site for malignancy.", "Incorrect — sphenoid sinus cancer is rare.", "Incorrect — frontal sinus cancer is rare."], "concept": "Among the paranasal sinuses, the maxillary sinus is the most frequent site of primary malignancy.", "formula": "", "id": 532, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/Lung", "stem": "The histologic subtype of lung cancer most seen in patients with no history of smoking is:", "choices": ["Squamous cell carcinoma", "Large cell carcinoma", "Adenocarcinoma", "Small cell carcinoma"], "correct": 2, "expl": ["Incorrect — squamous cell carcinoma is strongly associated with smoking history.", "Incorrect — large cell carcinoma is also generally associated with smoking history.", "Correct — adenocarcinoma is the histologic subtype most commonly seen in never-smokers.", "Incorrect — small cell carcinoma is strongly associated with smoking history."], "concept": "Adenocarcinoma has become the most common lung cancer histology overall and predominates specifically among never-smokers.", "formula": "", "id": 533, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/CNS", "stem": "Total dose for prophylactic cranial irradiation is typically:", "choices": ["2000 cGy", "3000 cGy", "3600 cGy", "4500 cGy"], "correct": 1, "expl": ["Incorrect — this underdoses standard prophylactic cranial irradiation.", "Correct — prophylactic cranial irradiation (PCI) is typically delivered to approximately 3000 cGy (commonly in 10-15 fractions).", "Incorrect — this overstates the typical PCI dose.", "Incorrect — this overstates the typical PCI dose."], "concept": "PCI, used mainly in limited-stage small cell lung cancer with complete response, is prescribed to a modest dose (~25-30 Gy) to reduce brain metastasis risk without excessive neurotoxicity.", "formula": "", "id": 534, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/Lung", "stem": "To verify the histology of a suspected lung cancer, all of the following could be helpful EXCEPT:", "choices": ["Excisional biopsy", "CT scan", "Bronchoscopy with biopsy", "Sputum cytology"], "correct": 1, "expl": ["Incorrect — excisional biopsy provides definitive tissue diagnosis.", "Correct — CT scan is an imaging modality used for detection/staging, not for obtaining histologic diagnosis.", "Incorrect — bronchoscopy with biopsy provides tissue for histologic diagnosis.", "Incorrect — sputum cytology can provide cellular material for histologic/cytologic diagnosis."], "concept": "CT imaging characterizes and stages a lesion but cannot itself provide the tissue-based histologic diagnosis obtained through biopsy or cytology.", "formula": "", "id": 535, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Anatomy", "stem": "How many lobes does the right lung have?", "choices": ["2", "3", "4", "5"], "correct": 1, "expl": ["Incorrect — 2 lobes describes the left lung, not the right.", "Correct — the right lung has 3 lobes (upper, middle, lower).", "Incorrect — the right lung does not have 4 lobes.", "Incorrect — the right lung does not have 5 lobes."], "concept": "The right lung has 3 lobes (upper, middle, lower); the left lung has only 2 (upper, lower) due to the cardiac notch.", "formula": "", "id": 536, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/Lung", "stem": "Target volume delineation for lung tumors may involve cardiac or respiratory gating procedures. The rationale for this is that lung tumors:", "choices": ["Are often metastatic", "Are difficult to image", "Move with cardiac or respiratory motion", "Change shape with cardiac or respiratory motion"], "correct": 2, "expl": ["Incorrect — metastatic potential is not the rationale for motion management.", "Incorrect — imaging difficulty is not the primary rationale described here.", "Correct — lung tumors move with cardiac and respiratory motion, and gating techniques account for this motion during target delineation and treatment.", "Incorrect — motion, not shape change, is the primary rationale for gating."], "concept": "Respiratory and cardiac motion can displace lung tumors several centimeters, making motion management essential for accurate targeting.", "formula": "", "id": 537, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/Lung", "stem": "The histologic subtype of lung cancer most seen in patients exposed to asbestos is:", "choices": ["Squamous cell carcinoma", "Mesothelioma", "Adenocarcinoma", "Oat cell carcinoma"], "correct": 1, "expl": ["Incorrect — squamous cell carcinoma is linked primarily to smoking, not asbestos specifically.", "Correct — mesothelioma is the malignancy classically associated with asbestos exposure.", "Incorrect — while asbestos can be a co-factor, adenocarcinoma is not the classic asbestos-associated histology tested here.", "Incorrect — oat cell (small cell) carcinoma is linked primarily to smoking, not asbestos specifically."], "concept": "Asbestos exposure is the classic, well-established risk factor for malignant mesothelioma of the pleura.", "formula": "", "id": 538, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Treatment Planning", "stem": "The natural slope of the chest may cause high dose regions in the upper mediastinum. This area of increased dose may be managed by the use of a:", "choices": ["Bolus", "Bite block", "Custom compensator", "Wing board"], "correct": 2, "expl": ["Incorrect — bolus increases surface dose; it does not correct for sloping contour hot spots.", "Incorrect — a bite block is an immobilization device for head and neck treatment, unrelated to chest contour compensation.", "Correct — a custom compensator is used to correct for missing tissue/sloping contours, evening out dose across an irregular surface such as the upper mediastinum/neck-shoulder region.", "Incorrect — a wing board is an immobilization device, not a dose-modifying compensator."], "concept": "Compensating filters correct dose inhomogeneity caused by oblique/sloping patient surfaces without requiring the beam to be perpendicular to skin.", "formula": "", "id": 539, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/Lung", "stem": "A radiation treatment field with an upper border above both clavicles and a lower border approximately 5 cm below the carina, including mediastinal lymphatics and blocking most of the left lung, would likely be for:", "choices": ["An initial field treatment for an upper right lung tumor", "An off-cord field for the treatment of a middle lobe right lung tumor", "Emergency treatment field for a right superior vena cava syndrome", "Palliative treatment for Hodgkin's lymphoma"], "correct": 0, "expl": ["Correct — this broad initial field, covering supraclavicular-to-below-carina with mediastinal lymphatics and blocking the contralateral lung, is characteristic of an initial treatment field for an upper right lung tumor.", "Incorrect — this description is broader than a limited 'off-cord' boost field.", "Incorrect — while SVC syndrome fields can be broad, the specific description (blocking most of the left lung, upper right lung emphasis) fits an initial right upper lobe field better.", "Incorrect — this description is specific to lung tumor field borders, not classic mantle/involved-field Hodgkin's lymphoma anatomy."], "concept": "Initial lung tumor fields are often generously sized to cover primary tumor and mediastinal nodal drainage before later cone-down/boost planning.", "formula": "", "id": 540, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Anatomy", "stem": "The junction of the transverse and descending colon takes place at the ______.", "choices": ["Hepatic flexure", "Splenic flexure", "Ileocecal junction", "Sigmoid colon"], "correct": 1, "expl": ["Incorrect — the hepat
