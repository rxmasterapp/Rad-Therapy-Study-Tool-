"Incorrect — transitional cell carcinoma is more associated with bladder cancer, not typical prostate cancer."], "concept": "The vast majority of prostate cancers are adenocarcinomas arising from the glandular epithelium.", "formula": "", "id": 626, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "GU Treatment", "stem": "Brachytherapy in the management of prostate cancer would be classified as:", "choices": ["HDR interstitial", "LDR interstitial", "HDR intracavitary", "HDR intraluminal"], "correct": 1, "expl": ["Incorrect — while HDR interstitial techniques also exist for prostate, the classic answer here (permanent seed implant) is LDR interstitial.", "Correct — permanent prostate seed implants are a classic example of LDR (low-dose-rate) interstitial brachytherapy.", "Incorrect — intracavitary brachytherapy is not the standard approach for the prostate (a solid organ, not a body cavity).", "Incorrect — intraluminal brachytherapy applies to hollow structures like the esophagus/bronchus, not the prostate."], "concept": "Permanent prostate seed implants (e.g., I-125 or Pd-103) are the classic example of LDR interstitial brachytherapy.", "formula": "", "id": 627, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Systemic Therapy", "stem": "Hormonal therapy for prostate cancer may include the administration of:", "choices": ["Tamoxifen", "Megace", "Taxol", "Lupron"], "correct": 3, "expl": ["Incorrect — tamoxifen is an anti-estrogen used for breast cancer, not prostate cancer hormonal therapy.", "Incorrect — Megace is a progestin more associated with endometrial/breast cancer management, not standard prostate hormonal therapy.", "Incorrect — Taxol is a chemotherapy agent, not a hormonal therapy.", "Correct — Lupron (leuprolide), a GnRH agonist, is a standard androgen deprivation therapy used in prostate cancer management."], "concept": "Androgen deprivation therapy for prostate cancer commonly uses GnRH agonists/antagonists like leuprolide (Lupron) to suppress testosterone production.", "formula": "", "id": 628, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Patient Care/Side Effects", "stem": "The patient complaining of diarrhea should be advised to:", "choices": ["Eat fresh fruits and vegetables", "Eat more starch and dairy products", "Avoid high-fiber foods", "Consume liquids only"], "correct": 2, "expl": ["Incorrect — fresh fruits/vegetables are high in fiber and can worsen diarrhea symptoms.", "Incorrect — increased dairy can worsen symptoms in patients with transient lactose intolerance, common during pelvic RT.", "Correct — patients with radiation-induced diarrhea should be advised to avoid high-fiber foods, which can exacerbate GI symptoms.", "Incorrect — liquids-only is overly restrictive and not standard first-line dietary advice; a low-residue diet is generally recommended instead."], "concept": "A low-residue, low-fiber diet is standard dietary counseling for managing radiation-induced diarrhea during pelvic treatment.", "formula": "", "id": 629, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Patient Positioning", "stem": "The appropriate treatment position for a patient treated with opposing hockey-stick fields is:", "choices": ["Supine with both arms above the head", "Supine with both arms on the abdomen", "Prone with both arms up around a pillow", "Lateral decubitus with elbows bent"], "correct": 0, "expl": ["Correct — hockey-stick fields (used e.g. for craniospinal/paraspinal treatment extending onto the flank) commonly use a supine position with arms raised above the head to clear the treatment field.", "Incorrect — arms on the abdomen would obstruct the lateral extension of a hockey-stick field.", "Incorrect — prone positioning is not the standard setup described for this technique.", "Incorrect — lateral decubitus is not the standard setup described for this technique."], "concept": "Arms-up supine positioning clears the lateral treatment fields from arm interference, important for extended/angled field configurations like hockey-stick fields.", "formula": "", "id": 630, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "GU Oncology", "stem": "A common location for distant metastasis from seminoma is:", "choices": ["Brain", "Skin", "Liver", "Lung"], "correct": 3, "expl": ["Incorrect — brain metastasis is uncommon from seminoma.", "Incorrect — skin metastasis is uncommon from seminoma.", "Incorrect — liver metastasis, while possible, is less common than lung as the classic answer.", "Correct — the lung is a common site of distant hematogenous metastasis from seminoma."], "concept": "Seminoma metastasizes predictably through lymphatics first, with the lung being a common site of subsequent hematogenous spread.", "formula": "", "id": 631, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Anatomy", "stem": "The inguinal nodes should be included in radiation treatment fields for: (1) Prostate (2) Testicular (3) Penile", "choices": ["1 and 3", "3 only", "2 only", "1, 2, and 3"], "correct": 1, "expl": ["Incorrect — prostate cancer fields do not routinely require inguinal node coverage.", "Correct — of these three, only penile cancer routinely requires inguinal lymph node coverage, given its external genital lymphatic drainage.", "Incorrect — testicular cancer drains along the gonadal vessels to retroperitoneal/renal hilar nodes, classically sparing the inguinal nodes.", "Incorrect — only penile cancer requires inguinal coverage among these three sites."], "concept": "Testicular cancer's embryologic descent means its lymphatic drainage bypasses the inguinal nodes (draining instead to retroperitoneal nodes), unlike penile or vulvar cancer.", "formula": "", "id": 632, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/Endocrine", "stem": "What is the most common type of thyroid cancer?", "choices": ["Papillary", "Follicular", "Medullary", "Anaplastic"], "correct": 0, "expl": ["Correct — papillary thyroid carcinoma is the most common type of thyroid cancer and generally carries an excellent prognosis.", "Incorrect — follicular carcinoma is the second most common type, less frequent than papillary.", "Incorrect — medullary carcinoma is a less common, neuroendocrine-derived thyroid cancer.", "Incorrect — anaplastic carcinoma is rare but highly aggressive."], "concept": "Papillary thyroid carcinoma is by far the most common thyroid malignancy, typically associated with a favorable prognosis.", "formula": "", "id": 633, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Patient Positioning", "stem": "The best position for treating the vertex field (e.g., in craniospinal irradiation) is:", "choices": ["Chin extended as much as possible", "Chin flexed", "Chin turned to one side", "Chin extension at 12 cm"], "correct": 1, "expl": ["Incorrect — excessive chin extension is not the standard vertex field position.", "Correct — chin flexion (bringing the chin toward the chest) is the standard positioning for the vertex field, helping to align beam geometry appropriately for cranial fields matched to spinal fields.", "Incorrect — turning the chin to one side introduces asymmetry inappropriate for a symmetric vertex field.", "Incorrect — this describes a specific measurement, not the fundamental positioning principle (chin flexion)."], "concept": "Chin-flexed positioning for the vertex field supports proper beam divergence and field matching, particularly relevant in craniospinal irradiation setups.", "formula": "", "id": 634, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Patient Positioning", "stem": "When treating an extremity, the limb should be positioned:", "choices": ["Perpendicular to the table", "Resting on a sponge", "Parallel to the horizontal axis of the beam", "Parallel to the torso"], "correct": 2, "expl": ["Incorrect — perpendicular positioning is not the standard approach for extremity treatment geometry.", "Incorrect — while a sponge may aid comfort/immobilization, this is not the defining positioning principle being tested.", "Correct — the limb should be positioned parallel to the horizontal axis of the beam to allow for straightforward, reproducible field alignment.", "Incorrect — parallel to the torso is not the standard geometric reference for extremity beam alignment."], "concept": "Extremity treatment setups typically align the limb parallel to the beam's horizontal axis to simplify field placement and reproducibility.", "formula": "", "id": 635, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Physics/Electrons", "stem": "The energy loss of megavoltage (MeV) electron beams in water is approximately ______ MeV/cm.", "choices": ["10", "5", "2", "3"], "correct": 2, "expl": ["Incorrect — this overstates the typical energy loss rate.", "Incorrect — this overstates the typical energy loss rate.", "Correct — megavoltage electron beams lose energy in water at approximately 2 MeV per cm of depth traveled.", "Incorrect — this slightly overstates the typical energy loss rate."], "concept": "The approximate 2 MeV/cm energy loss rate for electrons in water underlies rules of thumb relating electron energy to therapeutic depth.", "formula": "", "id": 636, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Physics", "stem": "The field size of an x-ray or gamma ray beam is defined as the area enclosed within the boundary of the _____% depth dose line.", "choices": ["50", "60", "80", "100"], "correct": 0, "expl": ["Correct — the 50% isodose line defines the physical field size for x-ray or gamma ray beams.", "Incorrect — 60% is not the standard convention for defining photon field size.", "Incorrect — 80% is the convention used for electron beam field size definition, not photon.", "Incorrect — 100% describes the point of maximum dose, not the field size boundary convention."], "concept": "By convention, photon field size is defined by the 50% isodose line (the 'physical field size'), while electron field size uses the 80% line.", "formula": "", "id": 637, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Treatment Planning/Calculation", "stem": "The expected total dose to point A for treatment of the cervix from both external beam radiation and brachytherapy is approximately:", "choices": ["35 Gy", "70 Gy", "90 Gy", "140 Gy"], "correct": 2, "expl": ["Incorrect — this underestimates the standard combined point A dose.", "Incorrect — this underestimates the standard combined point A dose for typical bulky/definitive cervix treatment.", "Correct — combined external beam (approximately 40-45 Gy) and brachytherapy (approximately 40-45 Gy) doses to point A typically total approximately 85-90 Gy for definitive cervical cancer treatment.", "Incorrect — this overstates the standard combined point A dose."], "concept": "Point A dose in cervical cancer combines external beam pelvic irradiation with a substantial brachytherapy boost, together reaching a high cumulative total appropriate for this relatively radioresistant, centrally-located tumor.", "formula": "", "id": 638, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Anatomy", "stem": "Hypogastric lymph nodes would likely be included in radiation fields for the treatment of the:", "choices": ["Base of tongue", "Stomach", "Esophagus", "Rectum"], "correct": 3, "expl": ["Incorrect — base of tongue radiation targets cervical nodal chains, not hypogastric (pelvic) nodes.", "Incorrect — stomach cancer nodal fields target perigastric/celiac nodes, not hypogastric nodes.", "Incorrect — esophageal cancer nodal fields target mediastinal/perigastric nodes, not hypogastric nodes.", "Correct — hypogastric (internal iliac) lymph nodes are part of the pelvic nodal drainage relevant to rectal cancer treatment fields."], "concept": "Hypogastric (internal iliac) nodes are part of the pelvic external iliac/internal iliac nodal chain targeted in pelvic malignancies such as rectal cancer.", "formula": "", "id": 639, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Treatment Planning/Calculation", "stem": "Rotational arc therapy is selected for treatment to the pituitary gland. The arc is 240 degrees and the calculated MU is 196. The MU/degree setting will be:", "choices": ["0.817", "0.667", "1.22", "1.50"], "correct": 0, "expl": ["Correct — MU/degree equals total MU divided by arc degrees: 196 divided by 240 equals 0.817.", "Incorrect — this does not correctly divide MU by arc degrees.", "Incorrect — this inverts the calculation (arc degrees divided by MU) rather than MU divided by arc degrees.", "Incorrect — this does not correctly divide MU by arc degrees."], "concept": "Rotational/arc therapy MU settings are calculated by dividing the total calculated MU by the total arc length in degrees.", "formula": "MU/degree = Total MU / Arc length (degrees)", "id": 640, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Treatment Planning", "stem": "When performing manual contouring, it is important to:", "choices": ["Contour the patient in the treatment position", "Verify the beam energy being used", "Establish the beam arrangement planned", "All of the above"], "correct": 3, "expl": ["Incorrect — verifying beam energy and beam arrangement are also important, not just treatment position.", "Incorrect — contouring in treatment position and establishing beam arrangement are also important.", "Incorrect — contouring in treatment position and verifying beam energy are also important.", "Correct — accurate manual contouring requires the patient in the correct treatment position, with beam energy and beam arrangement considerations established for accurate dose calculation."], "concept": "Manual contouring accuracy depends on capturing the patient's exact treatment-position anatomy along with the intended beam energy and arrangement for correct dose calculation.", "formula": "", "id": 641, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Treatment Planning", "stem": "Total dose to the lumpectomy site following accelerated partial breast irradiation (APBI) utilizing high-dose-rate brachytherapy will be approximately:", "choices": ["20 Gy", "35 Gy", "45 Gy", "60 Gy"], "correct": 1, "expl": ["Incorrect — this underestimates the standard APBI HDR total dose.", "Correct — APBI via HDR brachytherapy is typically delivered to approximately 34 Gy (commonly about 3.4 Gy x 10 fractions, twice daily) to the lumpectomy cavity plus margin.", "Incorrect — this overstates the standard APBI HDR total dose.", "Incorrect — this significantly overstates the standard APBI HDR total dose."], "concept": "APBI via HDR brachytherapy (e.g., balloon-based or interstitial catheters) delivers an accelerated, hypofractionated dose (commonly approximately 34 Gy in 10 twice-daily fractions) confined to the lumpectomy cavity plus margin.", "formula": "", "id": 642, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Physics/Brachytherapy", "stem": "The dose rate used for LDR brachytherapy procedures is typically:", "choices": ["20 Gy/min", "10 Gy/min", "2 Gy/min", "0.05 Gy/min (approximately 40-200 cGy/hr)"], "correct": 3, "expl": ["Incorrect — this rate is far too high, describing HDR rather than LDR dose rates.", "Incorrect — this rate is far too high for LDR brachytherapy.", "Incorrect — this rate is far too high for LDR brachytherapy.", "Correct — LDR brachytherapy is defined by low dose rates, typically in the range of roughly 0.4-2 Gy/hr (a small fraction of a Gy per minute), much slower than HDR."], "concept": "LDR brachytherapy delivers dose slowly over many hours to days, in contrast to HDR brachytherapy's much higher dose rate delivered in minutes.", "formula": "", "id": 643, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Physics/Electrons", "stem": "The 50% isodose line of a 12 MeV electron beam would be at an approximate depth of:", "choices": ["3 cm", "4 cm", "5 cm", "6 cm"], "correct": 2, "expl": ["Incorrect — this underestimates the depth of the 50% isodose line for this energy.", "Incorrect — this underestimates the depth of the 50% isodose line for this energy.", "Correct — using the rule depth of 50% isodose line (cm) is approximately E(MeV)/2.5, 12/2.5 = 4.8, approximately 5 cm.", "Incorrect — this overestimates the depth of the 50% isodose line for this energy."], "concept": "Rule of thumb for electron beams: depth of the 50% isodose line (cm) is approximately Energy(MeV)/2.5.", "formula": "Depth of 50% line (cm) is approx E(MeV) / 2.5", "id": 644, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Treatment Planning", "stem": "The volume larger than the treatment volume that receives some significant dose is the:", "choices": ["Tumor volume", "Target volume", "Irradiated volume", "Clinical volume"], "correct": 2, "expl": ["Incorrect — tumor volume (GTV) is the smallest volume, representing visible/palpable disease.", "Incorrect — the target volume (CTV/PTV) is smaller than, and contained within, the irradiated volume.", "Correct — the irradiated volume is the ICRU-defined volume larger than the treatment volume that still receives a dose considered significant relative to normal tissue tolerance.", "Incorrect — 'clinical volume' (CTV) is smaller than, and contained within, the irradiated volume."], "concept": "ICRU volume hierarchy from smallest to largest: GTV, then CTV, then PTV, then treated volume, then irradiated volume.", "formula": "", "id": 645, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Treatment Planning/Calculation", "stem": "A 6 MV photon beam on the linac has an output at isocenter of 1.2 cGy/MU. What would be the inverse square factor used in the MU calculation for an extended-distance treatment at 120 cm SSD?", "choices": ["0.823", "0.677", "1.21", "1.48"], "correct": 1, "expl": ["Incorrect — this does not correctly apply the inverse square relationship for this extended distance.", "Correct — using (SAD/SSD+dmax) squared = (100/121.5) squared, approximately 0.677 for this extended-distance setup.", "Incorrect — this does not correctly apply the inverse square relationship for this extended distance.", "Incorrect — this does not correctly apply the inverse square relationship for this extended distance."], "concept": "Extended-SSD treatments require an inverse square correction factor comparing the calibration distance (SAD) to the actual treatment distance (SSD+dmax).", "formula": "Inverse square factor = (SAD / (SSD+dmax)) squared", "id": 646, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Physics", "stem": "The shape of the isodose curves depends largely on: (1) Field size (2) Depth dose (3) Flattening filters (4) SSD", "choices": ["1 and 4", "1 and 3", "2 and 4", "2 and 3"], "correct": 1, "expl": ["Incorrect — depth dose and flattening filters (not SSD) are the classic answer factors here alongside field size.", "Correct — isodose curve shape depends largely on field size and flattening filter design (as well as beam energy, blocks, wedges, and MLC), per the classic answer set.", "Incorrect — depth dose and SSD alone do not capture the classic factor set for isodose shape.", "Incorrect — depth dose is a resultant characteristic rather than one of the primary shaping factors in this classic answer set."], "concept": "Isodose curve shape is influenced by field size, beam modifiers (flattening filters, blocks, wedges, cones, MLCs), and beam energy.", "formula": "", "id": 647, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Physics/Brachytherapy", "stem": "Which radioisotope is most commonly used for permanent interstitial implants of the prostate gland?", "choices": ["Cesium-137", "Cobalt-60", "Gold-198", "Iodine-131"], "correct": 2, "expl": ["Incorrect — Cesium-137 is used for LDR temporary applications (e.g., historical intracavitary gynecologic brachytherapy), not permanent prostate seeds.", "Incorrect — Cobalt-60 is used for teletherapy units and some HDR sources, not permanent prostate seed implants.", "Correct — Gold-198 (along with Iodine-125 and Palladium-103) has been used for permanent interstitial prostate seed implants.", "Incorrect — Iodine-131 is used for thyroid disease treatment, not prostate brachytherapy."], "concept": "Permanent low-dose-rate prostate seed implants commonly use Iodine-125 or Palladium-103 (with Gold-198 historically used as well), chosen for their relatively short half-lives and appropriate energy.", "formula": "", "id": 648, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Radiobiology", "stem": "Electron beams are useful in radiation therapy primarily because:", "choices": ["They have a greater biological effect than x-rays", "They provide more skin sparing than gamma rays", "They have a definite range in tissue", "They have maximum LET at electronic equilibrium"], "correct": 2, "expl": ["Incorrect — electrons do not have a categorically greater biological effect (RBE) than photons at therapeutic energies.", "Incorrect — electrons actually provide less skin sparing than megavoltage photons/gamma rays; this is the opposite of a defining electron advantage.", "Correct — electron beams have a well-defined, finite range in tissue (a sharp dose falloff beyond a certain depth), making them useful for treating superficial targets while sparing deeper structures.", "Incorrect — this is not the defining clinical advantage of electron beams; LET considerations are more relevant to particle therapies like protons/neutrons."], "concept": "The sharp, energy-dependent dose falloff (definite range) of electron beams allows precise treatment of superficial targets while sparing underlying critical structures.", "formula": "", "id": 649, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Anatomy", "stem": "A good surface landmark to approximate the apex of the lung is the:", "choices": ["Sternal angle", "Clavicle", "Thyroid notch", "Cricoid cartilage"], "correct": 1, "expl": ["Incorrect — the sternal angle marks the level of the tracheal bifurcation/aortic arch, not the lung apex.", "Correct — the clavicle is a commonly used surface landmark approximating the level of the lung apex.", "Incorrect — the thyroid notch is a laryngeal landmark, too superior for the lung apex.", "Incorrect — the cricoid cartilage is a laryngeal landmark, too superior for the lung apex."], "concept": "The clavicle provides a convenient, easily palpable external landmark approximating the superior extent of the lung apex.", "formula": "", "id": 650, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Breast Treatment", "stem": "Opposed tangential fields would likely be used in the treatment of the:", "choices": ["Breast", "Spleen", "Femur", "Esophagus"], "correct": 0, "expl": ["Correct — opposed tangential fields are the classic technique for whole breast irradiation, sparing underlying lung and heart.", "Incorrect — tangential fields are not a standard technique for splenic irradiation.", "Incorrect — tangential fields are not a standard technique for femur/extremity irradiation.", "Incorrect — tangential fields are not a standard technique for esophageal irradiation."], "concept": "Tangential fields are specifically designed to treat the curved chest wall/breast tissue while minimizing dose to underlying lung and heart.", "formula": "", "id": 651, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Physics", "stem": "A representation of the dose in an irradiated volume as a function of spatial position along a single line is known as a/an:", "choices": ["Isodose curve", "PDD line", "Dose profile", "DVH"], "correct": 2, "expl": ["Incorrect — an isodose curve represents dose across a 2D plane, not along a single line.", "Incorrect — 'PDD line' is not standard terminology for this concept (PDD is percentage depth dose along the central axis specifically).", "Correct — a dose profile represents dose as a function of position along a single line (e.g., across the field at a given depth).", "Incorrect — a DVH (dose-volume histogram) summarizes dose across a volume/structure, not along a single spatial line."], "concept": "A dose profile plots dose along a specific line (e.g., a transverse line at a given depth), distinct from isodose curves (2D) or DVHs (volumetric).", "formula": "", "id": 652, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Treatment Planning", "stem": "In order to make custom Cerrobend blocks, the following information is needed: (1) Target to film distance (2) Beam energy (3) Patient thickness", "choices": ["1 and 2", "2 and 3", "1 and 3", "All of the above"], "correct": 0, "expl": ["Correct — the block cutter requires target-to-film (or target-to-tray) distance and beam energy to correctly scale and cut the divergent block shape.", "Incorrect — patient thickness is not required by the block-cutting machine itself; target-to-film distance is needed instead.", "Incorrect — patient thickness is not required by the block-cutting machine itself.", "Incorrect — patient thickness is not one of the parameters required for cutting a divergent Cerrobend block."], "concept": "Cerrobend block fabrication requires target-to-film (or target-to-tray) distance and beam energy to properly scale the block's divergent shape and thickness for adequate attenuation.", "formula": "", "id": 653, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/Pancreas", "stem": "For patients with pancreatic cancer, extra care is taken to limit dose to the radiosensitive:", "choices": ["Heart, stomach, and small bowel", "Stomach, kidney, and small bowel", "Stomach, rectum, and bladder", "Liver, kidney, and spinal cord"], "correct": 3, "expl": ["Incorrect — while stomach/small bowel are relevant, this combination omits key structures (liver, kidney, spinal cord) classically emphasized for pancreatic treatment.", "Incorrect — this omits the liver and spinal cord, both key structures for pancreatic treatment planning.", "Incorrect — rectum and bladder are not the primary organs at risk for upper abdominal pancreatic treatment.", "Correct — the liver, kidneys, and spinal cord are key radiosensitive structures requiring careful dose limitation during pancreatic radiation therapy."], "concept": "Pancreatic radiation planning must carefully limit dose to nearby radiosensitive organs at risk, including the liver, bilateral kidneys, and spinal cord.", "formula": "", "id": 654, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Physics/Brachytherapy", "stem": "Indian club needles have:", "choices": ["Good seed (source) retention only", "One hot (active) end", "Two hot (active) ends", "Even activity distribution along the entire needle"], "correct": 1, "expl": ["Incorrect — 'good seed retention' does not describe the defining physical characteristic being tested.", "Correct — Indian club needles have one active ('hot') end, with the source activity concentrated at that end, resembling the shape of an Indian club.", "Incorrect — this describes a different needle type (dual-ended), not the Indian club design.", "Incorrect — Indian club needles do not have even activity distribution; the activity is concentrated at one end."], "concept": "Indian club needles are named for their characteristic shape, with source activity loaded at one 'hot' end, tapering like an Indian exercise club.", "formula": "", "id": 655, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Physics", "stem": "The width of penumbra increases with increasing:", "choices": ["SSD", "Source-to-collimator distance", "Energy", "SAD"], "correct": 0, "expl": ["Correct — penumbra width increases with increasing SSD (as well as with larger source size and decreased source-to-collimator distance).", "Incorrect — increasing source-to-collimator distance actually tends to decrease geometric penumbra, not increase it.", "Incorrect — beam energy affects penumbra somewhat, but the classic primary factor tested here is SSD.", "Incorrect — SAD is a fixed machine geometry parameter, not the primary variable causing increased penumbra in this context."], "concept": "Geometric penumbra widens with increasing source-to-surface distance (SSD) and with larger effective source size, per basic beam geometry principles.", "formula": "", "id": 656, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Physics/Beam Modifiers", "stem": "The attenuation of Cerrobend is less dense than lead by about:", "choices": ["5%", "10%", "15%", "25%"], "correct": 2, "expl": ["Incorrect — this understates the typical difference.", "Incorrect — this understates the typical difference.", "Correct — Cerrobend (a low-melting-point alloy) is approximately 15% less dense than pure lead, requiring slightly thicker blocks for equivalent attenuation.", "Incorrect — this overstates the typical difference."], "concept": "Because Cerrobend has roughly 15% lower density than lead, blocks made from it must be made proportionally thicker to achieve equivalent attenuation.", "formula": "", "id": 657, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Head & Neck Treatment", "stem": "When using lateral and anterior supraclavicular fields to treat a tumor in the oropharynx, the field junction should be placed:", "choices": ["Cephalad of the thyroid notch", "Caudal of the thyroid notch", "Caudal of the larynx", "Cephalad of the mandible"], "correct": 0, "expl": ["Correct — the field junction between lateral (head/neck) and anterior supraclavicular fields is classically placed cephalad (above) the level of the thyroid notch, to avoid overlap near the spinal cord/larynx.", "Incorrect — this places the junction too low relative to the standard convention.", "Incorrect — this places the junction too low relative to the standard convention.", "Incorrect — placing the junction at the mandible would be too high, failing to adequately separate the fields."], "concept": "The classic field-junction landmark for matching lateral head/neck fields to an anterior supraclavicular field is the level of the thyroid notch (junction placed just above it).", "formula": "", "id": 658, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Oncology/CNS", "stem": "Overall, most intracranial malignancies are:", "choices": ["Glioblastoma multiforme", "Astrocytoma", "Metastatic", "Pituitary adenoma"], "correct": 2, "expl": ["Incorrect — glioblastoma is the most common primary malignant brain tumor, but not the most common intracranial malignancy overall.", "Incorrect — astrocytoma is a common primary brain tumor category, but not the most common intracranial malignancy overall.", "Correct — when considering all intracranial malignancies, metastatic disease (spread from other primary sites) is more common than any single primary brain tumor type.", "Incorrect — pituitary adenomas are typically benign and not the most common intracranial malignancy."], "concept": "Brain metastases from systemic cancers (lung, breast, melanoma, etc.) outnumber primary malignant brain tumors overall.", "formula": "", "id": 659, "catKey": "CAR"}, {"cat": "Board Review: Clinical Applications", "sub": "Treatment Planning", "stem": "When treating the whole brain with opposing laterals, one way to minimize beam divergence into the eye opposite the entrance port would be:", "choices": ["Rotate the collimator", "Center the axis near the lateral canthus", "Turn the patient's head slightly away from the beam", "Rotate the couch away from the gantry"], "correct": 1, "expl": ["Incorrect — collimator rotation does not directly address beam divergence toward the contralateral eye.", "Correct — centering the field's inferior border/axis near the lateral canthus helps minimize beam divergence into the eyes on opposing lateral whole-brain fields.", "Incorrect — turning the head introduces asymmetry and setup complexity rather than directly solving beam divergence geometry.", "Incorrect — couch rotation is not the standard solution for this specific geometric issue with opposing lateral whole-brain fields."], "concept": "Careful field border placement near the lateral canthus, along with appropriate collimation, helps limit beam divergence into the eyes on opposing lateral cranial fields.", "formula": "", "id": 660, "catKey": "CAR"}, {"cat": "Patient Interactions and Management", "sub": "Ethical/Legal", "stem": "A patient with early dementia but who is deemed to retain decisional capacity for this specific treatment decision refuses her final two fractions, stating she is 'tired of coming in.' Her adult daughter, who holds a durable power of attorney for healthcare, insists treatment continue. What should the therapist do?", "choices": ["Follow the daughter's instructions since she holds power of attorney", "Treat the patient anyway since only 2 fractions remain and stopping early risks tumor control", "Respect the patient's refusal, since a durable power of attorney only becomes active if/when the patient loses decisional capacity for the decision at hand, and document/notify the physician", "Ask the ethics committee to override the patient before the next scheduled fraction"], "correct": 2, "expl": ["Incorrect — a DPOA agent's authority is triggered by the patient's loss of capacity for that specific decision, not simply by the agent's preference; it does not override a still-capacitated patient.", "Incorrect — treatment against the wishes of a patient who retains decisional capacity is battery, regardless of how few fractions remain or the oncologic stakes.", "Correct — because capacity is decision-specific and this patient retains capacity for this treatment decision, her refusal governs; the DPOA is not yet operative for this decision. The therapist documents and notifies the radiation oncologist.", "Incorrect — ethics committee involvement does not authorize overriding a capacitated patient's informed refusal; escalation does not change the fundamental right to refuse."], "concept": "Decisional capacity is decision-specific and can fluctuate or be preserved for simple decisions even with an underlying diagnosis like early dementia; a healthcare proxy/DPOA only gains authority once the principal loses capacity for the specific decision in question.", "formula": "", "catKey": "PC1", "difficulty": "hard", "id": 661}, {"cat": "Patient Interactions and Management", "sub": "Medical Emergencies", "stem": "A patient receiving IV contrast develops diffuse urticaria, mild wheezing, and a blood pressure drop from 128/76 to 96/60 with a heart rate increase to 118. Per standard severity grading, this reaction is best classified as:", "choices": ["Mild reaction — observe only", "Moderate reaction — requires prompt intervention (e.g., antihistamine, close monitoring, possible bronchodilator) but is not immediately life-threatening", "Severe/anaphylactic reaction — requires epinephrine and emergency response activation", "Vasovagal reaction — requires only leg elevation and reassurance"], "correct": 1, "expl": ["Incorrect — mild reactions are typically limited to isolated hives/itching without hemodynamic or respiratory involvement; this presentation exceeds that.", "Correct — diffuse urticaria with mild bronchospasm (wheezing) and a measurable but not severe hypotension/tachycardic response is classified as a moderate reaction, requiring prompt treatment and close monitoring, though not yet meeting criteria for full anaphylaxis/emergency epinephrine in most protocols at this severity.", "Incorrect — while this could evolve toward a severe reaction and must be watched closely, this specific presentation (moderate BP drop, mild wheeze, no laryngeal edema/airway compromise described) is classified as moderate rather than severe by standard grading scales.", "Incorrect — vasovagal reactions present with bradycardia, pallor, and diaphoresis, not tachycardia with urticaria and bronchospasm."], "concept": "Contrast reaction severity grading (mild/moderate/severe) hinges on the combination and degree of cutaneous, respiratory, and hemodynamic findings; escalating vital sign changes with bronchospasm place a reaction in the moderate tier, requiring immediate intervention and readiness to escalate.", "formula": "", "catKey": "PC1", "difficulty": "hard", "id": 662}, {"cat": "Patient Interactions and Management", "sub": "Infection Control", "stem": "A therapist is establishing a treatment plan of care for a neutropenic patient (ANC 400/microL) who also requires droplet precautions for a concurrent respiratory viral infection. Which combination of considerations is most appropriate?", "choices": ["Only reverse/neutropenic precautions are needed; droplet precautions are redundant", "Only droplet precautions are needed since they are more restrictive", "Both precaution sets must be simultaneously applied — protecting the patient from external pathogens (reverse isolation) while also preventing the patient's respiratory pathogen from spreading to others (droplet precautions), which may require coordinated scheduling (e.g., end-of-day appointment, dedicated equipment)", "Precautions are unnecessary as long as staff wash hands after the encounter"], "correct": 2, "expl": ["Incorrect — reverse isolation protects the patient from outside pathogens, but does not address preventing spread of the patient's own contagious respiratory infection to others; both purposes are distinct and both are needed.", "Incorrect — droplet precautions alone do not address the patient's own vulnerability to acquiring infection from the environment/staff given severe neutropenia.", "Correct — this patient simultaneously needs protection from outside pathogens (neutropenic/reverse precautions) and needs to prevent transmission of her own respiratory pathogen to others (droplet precautions); logistics such as scheduling at a lower-traffic time and using dedicated equipment/PPE help satisfy both needs at once.", "Incorrect — hand hygiene alone is insufficient to meet either precaution requirement in this dual-risk scenario."], "concept": "Some patients require simultaneous, seemingly opposite infection control strategies (protecting them from others' pathogens while also protecting others from the patient's own pathogen); recognizing and reconciling both needs is an advanced infection control competency.", "formula": "", "catKey": "PC1", "difficulty": "hard", "id": 663}, {"cat": "Patient Interactions and Management", "sub": "Documentation/Ethics", "stem": "A therapist accidentally treats a patient's field with 10% more MU than prescribed on a single fraction due to a data-entry transposition, caught after treatment was already delivered. The deviation does not meet the institution's formal medical event reporting threshold. What is the most appropriate combination of actions?", "choices": ["No action is needed since it did not meet the reporting threshold", "Document the occurrence, notify the radiation oncologist and physicist for dose assessment/plan adjustment guidance, and follow the institution's internal quality/incident review process even though it falls below the formal regulatory reporting threshold", "Only correct the record retroactively to reflect the intended dose, without further notification", "Wait to see if the patient develops side effects before taking any action"], "correct": 1, "expl": ["Incorrect — falling below a formal reporting threshold does not eliminate the need for internal documentation, notification, and quality review; those thresholds govern external regulatory reporting, not internal accountability.", "Correct — even sub-threshold deviations require transparent documentation, physician/physicist notification for cumulative dose and plan implications, and internal incident review, both for this patient's ongoing care and for systems-level quality improvement.", "Incorrect — altering the record to reflect intended (rather than actual) dose without notification and proper addendum procedure would falsify the medical record.", "Incorrect — waiting for symptoms to appear delays necessary dose reassessment and plan adjustment and is not an appropriate response to a known delivery deviation."], "concept": "Formal medical event reporting thresholds (regulatory) are distinct from internal quality and safety obligations; any known deviation from the prescription warrants documentation, clinical team notification, and review regardless of whether it crosses a regulatory threshold.", "formula": "", "catKey": "PC1", "difficulty": "hard", "id": 664}, {"cat": "Patient Interactions and Management", "sub": "Interpersonal Communication", "stem": "During a difficult conversation, a patient states, 'I know this cancer is going to kill me eventually, I just want to make it to my daughter's wedding in 3 months.' Which communication response best demonstrates use of the 'ask-tell-ask' technique combined with appropriate goals-of-care sensitivity?", "choices": ["Immediately reassure her the wedding will happen and change the subject to lighten the mood", "Ask what she already understands about her prognosis and goals, share information tailored to what she's asking, then ask what she heard/how she's feeling to check understanding and invite further questions", "Tell her exactly what the statistical median survival is for her diagnosis so she has accurate information", "Refer her immediately to hospice without further discussion since she has voiced a terminal outlook"], "correct": 1, "expl": ["Incorrect — false reassurance and changing the subject can shut down important goals-of-care communication and misses the patient's cue that she wants to talk about this.", "Correct — 'ask-tell-ask' begins by asking what the patient already understands/wants to know, then tells information calibrated to that, then asks again to confirm understanding and emotional response — this respects patient autonomy and opens space for goals-of-care discussion.", "Incorrect — leading with a specific statistic without first assessing what the patient wants to know can feel impersonal and may not match her actual question or readiness for that level of detail.", "Incorrect — an immediate hospice referral, without further exploration of her actual wishes/values or physician involvement, jumps ahead of an appropriate, collaborative goals-of-care conversation."], "concept": "Ask-tell-ask is a structured communication technique for delivering difficult information that centers the patient's own understanding and pacing, particularly valuable in goals-of-care and prognosis conversations.", "formula": "", "catKey": "PC1", "difficulty": "hard", "id": 665}, {"cat": "Patient Interactions and Management", "sub": "Pharmacology", "stem": "A patient on warfarin for atrial fibrillation is scheduled for a procedure requiring a brief interruption of anticoagulation. Her INR the morning of a planned brachytherapy applicator placement is 2.8 (therapeutic range typically 2-3). What is the most appropriate initial consideration for the radiation oncology team?", "choices": ["Proceed with applicator placement as scheduled without further coordination, since 2.8 is within her typical therapeutic range", "Recognize that an INR in the therapeutic-to-elevated range increases bleeding risk for an invasive procedure and coordinate with the prescribing physician regarding anticoagulation management/bridging before proceeding", "Discontinue all her cardiac medications immediately without physician involvement to reduce bleeding risk", "Administer vitamin K empirically without checking with the prescribing physician"], "correct": 1, "expl": ["Incorrect — while 2.8 is within her chronic therapeutic range for atrial fibrillation, it still represents a meaningfully elevated bleeding risk for an invasive procedure like applicator placement, and this should be proactively addressed rather than proceeding by default.", "Correct — anticoagulation status directly affects bleeding risk for invasive procedures; the radiation oncology team should coordinate with the prescribing physician (often cardiology) regarding whether/how to interrupt or bridge anticoagulation before an invasive brachytherapy procedure.", "Incorrect — unilaterally discontinuing cardiac medications without physician involvement risks serious cardiac/thromboembolic complications and is outside the therapist's scope.", "Incorrect — empiric vitamin K administration without physician direction is an inappropriate, potentially harmful unilateral medication intervention."], "concept": "Invasive procedures in anticoagulated patients require coordinated, physician-directed management of anticoagulation risk versus procedural bleeding risk — a cross-disciplinary patient safety consideration beyond simple lab-value recognition.", "formula": "", "catKey": "PC1", "difficulty": "hard", "id": 666}, {"cat": "Patient Interactions and Management", "sub": "Ergonomics/Monitoring", "stem": "A post-thoracotomy patient with a chest tube still in place requires positioning for supraclavicular field treatment. Which combination of precautions is most appropriate?", "choices": ["Clamp the chest tube during positioning to prevent accidental disconnection, then unclamp immediately after setup", "Keep the drainage unit below the level of the chest at all times, avoid kinking/tension on the tubing, and avoid clamping unless specifically ordered, since clamping a chest tube can cause a tension pneumothorax if there is an ongoing air leak", "Disconnect the chest tube from the drainage unit during positioning for ease of movement, then reconnect afterward", "No special precautions are needed since the tube is a surgical device unrelated to radiation therapy positioning"], "correct": 1, "expl": ["Incorrect — clamping a chest tube without a specific order and clinical indication for doing so can precipitate a life-threatening tension pneumothorax if there is an ongoing air leak; this is a well-recognized danger of empiric chest tube clamping.", "Correct — chest tube management principles (drainage unit below chest level, no kinking/tension, avoiding unauthorized clamping) must be maintained during any positioning task, since improper handling risks tension pneumothorax or loss of the closed drainage system's function.", "Incorrect — disconnecting a chest tube from its drainage system breaks the closed, water-sealed system and can allow air to enter the pleural space, risking pneumothorax.", "Incorrect — chest tube management is directly relevant to safe patient positioning and must be actively addressed, not ignored."], "concept": "Chest tubes require closed-system, gravity-dependent drainage management during any patient movement; clamping without explicit order and clinical justification is a recognized danger due to tension pneumothorax risk from any occult air leak.", "formula": "", "catKey": "PC1", "difficulty": "hard", "id": 667}, {"cat": "Patient and Medical Record Management", "sub": "Evaluation", "stem": "A patient's chart shows CA 19-9 markedly elevated, CEA mildly elevated, and imaging showing a mass at the head of the pancreas with associated biliary ductal dilation. Which combination of findings is most consistent with, and which marker is most specific to, this presentation?", "choices": ["CEA is the most specific marker for pancreatic adenocarcinoma in this context", "CA 19-9 is the tumor marker most specific to pancreatic adenocarcinoma, though it can be falsely elevated in biliary obstruction/cholestasis independent of pancreatic malignancy, so imaging/histology remain essential for diagnosis", "Both markers are equally nonspecific and neither has any association with pancreatic disease", "Elevated CA 19-9 in this context indicates the cancer has already spread to bone"], "correct": 1, "expl": ["Incorrect — CEA is a more general marker (elevated in colorectal and various other cancers) and is less specific to pancreatic cancer than CA 19-9.", "Correct — CA 19-9 is the tumor marker most associated with pancreatic adenocarcinoma, but it is important to recognize its important pitfall: biliary obstruction/cholestasis itself (as suggested by the ductal dilation here) can falsely elevate CA 19-9 independent of tumor burden, so marker elevation must always be interpreted alongside imaging and, when needed, tissue diagnosis.", "Incorrect — CA 19-9 does have a recognized, clinically useful association with pancreatic cancer, even though it requires cautious interpretation.", "Incorrect — an elevated CA 19-9 does not by itself indicate bone metastasis; that would require specific imaging (e.g., bone scan) correlation, not marker level alone."], "concept": "Tumor markers must be interpreted in clinical context; CA 19-9 is the most pancreas-associated marker among common panels but has recognized confounders (notably biliary obstruction) that limit its specificity as a standalone diagnostic tool.", "formula": "", "catKey": "PC2", "difficulty": "hard", "id": 668}, {"cat": "Patient and Medical Record Management", "sub": "Documentation", "stem": "A patient's electronic treatment record shows an auto-populated 'verified' status for daily setup checks, but the therapist recalls that on one specific date, imaging was not actually reviewed by the physician before treatment due to a system outage. What is the most appropriate action?", "choices": ["Leave the auto-populated status as-is since correcting it might complicate the workflow", "Manually correct/annotate the record for that specific date to accurately reflect that physician image review did not occur as normally required, and follow institutional policy for handling the resulting deviation (e.g., physician retrospective review, incident documentation)", "Assume the system's auto-population is always accurate and do nothing further", "Delete the auto-populated entry entirely without any explanatory note"], "correct": 1, "expl": ["Incorrect — allowing an inaccurate auto-populated status to stand, when the therapist has direct knowledge it is incorrect, compromises the accuracy and legal integrity of the medical record.", "Correct — the treatment record must accurately reflect what actually occurred; when automation produces an inaccurate entry, it must be corrected/annotated per proper error-correction procedure, and any resulting clinical deviation (missed physician image review) must be addressed per institutional policy, potentially including retrospective review and formal documentation.", "Incorrect — automated systems are not infallible, and known inaccuracies discovered by staff must be addressed, not passively accepted.", "Incorrect — deleting an entry without a proper annotated correction destroys the audit trail and compromises record integrity."], "concept": "Automated/auto-populated electronic health record fields do not eliminate staff responsibility for record accuracy; a known discrepancy between automated documentation and actual clinical events must be corrected via proper addendum procedure, not ignored or silently deleted.", "formula": "", "catKey": "PC2", "difficulty": "hard", "id": 669}, {"cat": "Patient and Medical Record Management", "sub": "Assessment", "stem": "A patient's labs during week 5 of concurrent pelvic chemoradiation show: WBC 2.1 (low), ANC 900 (low), Hgb 9.8 (low), Platelets 68,000 (low). Which combination of clinical concerns and priority actions is most appropriate?", "choices": ["Only infection risk (from low WBC/ANC) needs to be addressed; the other values are incidental", "All three cytopenias carry distinct risks (infection from neutropenia, bleeding from thrombocytopenia, fatigue/tissue hypoxia and reduced radiosensitivity from anemia) and should prompt physician notification for consideration of treatment modification, transfusion, growth factor support, or infection precautions as appropriate", "This pattern indicates the treatment is working exactly as intended and requires no intervention", "Only the hemoglobin value is clinically actionable; WBC and platelet counts are not affected by concurrent chemoradiation"], "correct": 1, "expl": ["Incorrect — focusing on only one cytopenia ignores clinically significant bleeding risk (thrombocytopenia) and anemia-related radiobiological/functional concerns, both of which require attention alongside infection risk.", "Correct — pancytopenia during concurrent chemoradiation reflects combined marrow suppression, and each cytopenia carries a distinct clinical risk requiring assessment: neutropenia (infection), thrombocytopenia (bleeding), and anemia (fatigue, tissue hypoxia which can reduce radiosensitivity via the oxygen effect). This constellation should prompt physician notification for possible treatment modification or supportive care.", "Incorrect — significant pancytopenia is a toxicity requiring clinical attention and possible intervention, not an expected 'success' marker to be left unaddressed.", "Incorrect — concurrent chemoradiation commonly affects all three cell lines via bone marrow suppression, not hemoglobin alone."], "concept": "Integrating multiple simultaneous lab abnormalities into a coherent clinical risk picture (rather than assessing each value in isolation) reflects advanced patient assessment during concurrent chemoradiation.", "formula": "", "catKey": "PC2", "difficulty": "hard", "id": 670}, {"cat": "Patient and Medical Record Management", "sub": "Evaluation", "stem": "A patient's pathology report states 'microsatellite instability-high (MSI-H)' for a newly diagnosed colorectal cancer. This finding is most directly relevant to which aspect of the patient's overall care record and downstream management?", "choices": ["It has no bearing on management and is a research-only finding", "It suggests possible Lynch syndrome (hereditary nonpolyposis colorectal cancer) and may prompt genetic counseling referral, as well as inform potential immunotherapy eligibility given MSI-H tumors' responsiveness to checkpoint inhibitors", "It is only relevant to selecting the chemotherapy regimen and has no genetic counseling implications", "It indicates the cancer is definitely metastatic"], "correct": 1, "expl": ["Incorrect — MSI-H status has significant, actionable clinical implications and is not merely a research finding.", "Correct — MSI-H status raises concern for an underlying hereditary cancer syndrome (Lynch syndrome), appropriately prompting genetic counseling/testing referral, and is also a recognized predictive biomarker for response to immune checkpoint inhibitor therapy, directly influencing systemic treatment options.", "Incorrect — MSI-H status has genetic counseling implications in addition to systemic therapy relevance; it is not limited to chemotherapy selection alone.", "Incorrect — MSI-H status is a molecular/genetic tumor characteristic and does not by itself indicate the stage or presence of metastatic disease."], "concept": "Recognizing the dual clinical significance of biomarkers like MSI-H (hereditary syndrome screening plus predictive value for immunotherapy) reflects an advanced understanding of how molecular pathology integrates into comprehensive patient management.", "formula": "", "catKey": "PC2", "difficulty": "hard", "id": 671}, {"cat": "Patient and Medical Record Management", "sub": "Documentation", "stem": "A patient begins a new investigational combination of radiation with a novel systemic agent as part of a clinical trial. Which of the following is a documentation requirement unique to trial participation, beyond standard treatment record-keeping?", "choices": ["No additional documentation is needed beyond the standard treatment record", "Protocol-specific case report form (CRF) data, adverse event grading per trial-defined criteria, and documentation of continued informed consent/eligibility throughout the trial course, in addition to the standard treatment record", "Only the physician needs to maintain any trial-related documentation; therapists have no role", "Trial documentation replaces the need for a standard treatment record entirely"], "correct": 1, "expl": ["Incorrect — clinical trials impose documentation requirements substantially beyond standard treatment records.", "Correct — clinical trial participation requires protocol-specific case report form completion, standardized (often CTCAE-based per protocol) adverse event grading and reporting, and ongoing documentation confirming eligibility and informed consent status throughout the study, all in addition to standard treatment documentation.", "Incorrect — while physicians typically have primary trial documentation responsibilities, therapists often contribute treatment delivery data and observations relevant to protocol compliance and adverse event identification.", "Incorrect — trial-specific documentation supplements, rather than replaces, the standard clinical treatment record."], "concept": "Clinical trial participation adds a parallel, protocol-driven documentation layer (CRFs, standardized toxicity grading, ongoing consent/eligibility confirmation) on top of standard treatment record-keeping requirements.", "formula": "", "catKey": "PC2", "difficulty": "hard", "id": 672}, {"cat": "Patient and Medical Record Management", "sub": "Assessment", "stem": "A patient with a known allergy to iodinated contrast requires a contrast-enhanced planning CT for accurate target delineation of a mediastinal mass. Which is the most appropriate integrated approach?", "choices": ["Cancel the contrast-enhanced scan entirely and rely on a non-contrast CT with reduced target delineation accuracy, with no further discussion", "Coordinate with the ordering physician regarding premedication protocols (e.g., corticosteroid/antihistamine preparation) if contrast is still deemed necessary, or discuss alternative approaches such as non-contrast CT fused with contrast-enhanced diagnostic imaging or MRI to achieve adequate target delineation without re-exposing the patient to unmitigated risk", "Administer contrast as normal since mild allergies rarely cause serious reactions", "Substitute barium sulfate for the IV iodinated contrast in this scenario"], "correct": 1, "expl": ["Incorrect — simply defaulting to a non-contrast scan without exploring premedication or alternative imaging fusion strategies may unnecessarily compromise target delineation accuracy when better options exist.", "Correct — balancing diagnostic/planning needs against known contrast allergy requires physician-coordinated risk mitigation: premedication protocols if contrast is still needed, or alternative strategies like fusing a non-contrast planning CT with a contrast-enhanced diagnostic CT or MRI already obtained (or obtainable with appropriate premedication) to achieve target delineation without unmitigated re-exposure risk.", "Incorrect — a known iodinated contrast allergy is not something to disregard; even reactions initially perceived as mild can escalate on re-exposure, warranting explicit risk mitigation.", "Incorrect — barium sulfate is an oral/rectal GI contrast agent and is not a substitute for IV iodinated contrast used for vascular/soft tissue enhancement in a mediastinal planning CT."], "concept": "Balancing imaging/target-delineation needs against contrast allergy risk requires a coordinated, physician-directed strategy (premedication or alternative imaging/fusion techniques) rather than a simple binary choice between full-risk contrast administration or accepting reduced-quality imaging.", "formula": "", "catKey": "PC2", "difficulty": "hard", "id": 673}, {"cat": "Radiation Physics and Radiobiology", "sub": "Dose Calculation", "stem": "A tumor is treated with fractionated radiation using an alpha/beta ratio of 10 Gy for the tumor and 3 Gy for the adjacent late-responding normal tissue. If a regimen of 2 Gy x 30 fractions (60 Gy total) is converted to an equivalent dose in 2 Gy fractions (EQD2) for the late-responding tissue using a hypothetical alternate regimen of 3 Gy x 15 fractions (45 Gy total), which statement is most accurate regarding the biological effect on late-responding tissue?", "choices": ["The EQD2 for late tissue with the 3 Gy x 15 regimen is lower than 60 Gy, meaning it is biologically gentler on late-responding tissue than the original regimen", "The EQD2 for late tissue with the 3 Gy x 15 regimen is higher than 60 Gy, meaning it delivers a greater biological effect on late-responding tissue than the original 2 Gy x 30 regimen despite a lower total physical dose", "EQD2 calculations are irrelevant to late-responding tissue since they only apply to tumor tissue", "Both regimens are always biologically identical for late tissue as long as total physical dose is similar"], "correct": 1, "expl": ["Incorrect — the calculation shows the opposite: the larger fraction size regimen produces a higher biologically equivalent dose to late tissue, not lower.", "Correct — using EQD2 = D x [(d + alpha/beta) / (2 + alpha/beta)], for late tissue (alpha/beta=3): 45 x [(3+3)/(2+3)] = 45 x 1.2 = 54 Gy... [continues in explanation] Despite a lower total physical dose (45 Gy vs 60 Gy), the larger fraction size (3 Gy) increases the biologically effective dose to late-responding, low alpha/beta tissue disproportionately, illustrating why hypofractionation must be used cautiously near late-responding critical structures.", "Incorrect — EQD2/BED calculations are specifically important for late-responding normal tissue, since their low alpha/beta ratio makes them disproportionately sensitive to fraction size changes.", "Incorrect — biological effect depends on both total dose and fraction size (via the linear-quadratic model), not total physical dose alone; two regimens with similar total dose can have very different biological effects on tissues with different alpha/beta ratios."], "concept": "The linear-quadratic model (EQD2/BED) demonstrates that late-responding tissues (low alpha/beta) are disproportionately sensitive to fraction size; larger fractions can produce a greater biological effect on these tissues even at a lower total physical dose, which is why hypofractionated regimens require careful attention to dose per fraction near critical late-responding structures.", "formula": "EQD2 = D x [(d + alpha/beta) / (2 + alpha/beta)]", "catKey": "S1", "difficulty": "hard", "id": 674}, {"cat": "Radiation Physics and Radiobiology", "sub": "Dose Calculation", "stem": "Using the linear-quadratic model, calculate the biologically effective dose (BED) for a tumor (alpha/beta = 10) treated with 2.5 Gy x 20 fractions (50 Gy total).", "choices": ["50 Gy", "62.5 Gy", "55 Gy", "70 Gy"], "correct": 1, "expl": ["Incorrect — this is simply the total physical dose, not the BED, which must account for fraction size relative to alpha/beta.", "Correct — BED = D x [1 + d/(alpha/beta)] = 50 x [1 + 2.5/10] = 50 x 1.25 = 62.5 Gy.", "Incorrect — this does not correctly apply the BED formula.", "Incorrect — this overstates the BED using this formula and fraction size."], "concept": "BED calculations quantify the biological impact of a fractionation scheme, accounting for both total dose and fraction size relative to a tissue's alpha/beta ratio; larger fractions increase BED relative to the same total physical dose.", "formula": "BED = D x [1 + d/(alpha/beta)]", "catKey": "S1", "difficulty": "hard", "id": 675}, {"cat": "Radiation Physics and Radiobiology", "sub": "Biological Effects", "stem": "A cell population is irradiated with a dose that produces a surviving fraction of 0.5 at 2 Gy (SF2 = 0.5). If cell killing followed a purely exponential (single-hit, no repair/shoulder) model with this same D0-equivalent response, what would be the approximate surviving fraction after a total dose of 6 Gy delivered in a single fraction (ignoring any repair between fractions, since this is one fraction)?", "choices": ["0.5", "0.125", "0.25", "0.0625"], "correct": 1, "expl": ["Incorrect — 0.5 is only the surviving fraction after 2 Gy, not after 6 Gy.", "Correct — under a purely exponential single-hit model, survival scales exponentially with dose: SF(6 Gy) = SF(2 Gy)^3 = 0.5^3 = 0.125, since 6 Gy is three times the reference 2 Gy dose.", "Incorrect — this would correspond to only two 2 Gy-equivalent 'hits' (0.5^2), not three.", "Incorrect — this overstates the cell kill beyond what the exponential model predicts for 6 Gy given SF2=0.5."], "concept": "For simple exponential survival models, surviving fraction scales multiplicatively with the number of dose increments; real cell survival curves (linear-quadratic, with a shoulder) deviate from this simple exponential model at low doses, which is part of the radiobiological rationale for fractionation.", "formula": "SF(nD) = SF(D)^n for purely exponential survival scaling", "catKey": "S1", "difficulty": "hard", "id": 676}, {"cat": "Radiation Physics and Radiobiology", "sub": "Principles of Physics", "stem": "A 6 MV photon beam has a percentage depth dose of 67% at 10 cm depth for a 10x10 cm field at 100 cm SSD. If the same beam energy and field size are used but SSD is increased to 120 cm (extended SSD, dmax unchanged), which statement about the PDD at 10 cm depth is most accurate?", "choices": ["PDD at 10 cm remains exactly 67% regardless of SSD change", "PDD at 10 cm increases somewhat with increased SSD due to the Mayneord F factor effect, since photon beams become relatively more penetrating (less divergent falloff) at greater distances", "PDD at 10 cm decreases significantly due to increased scatter at extended distances", "PDD is undefined at extended SSD and cannot be calculated"], "correct": 1, "expl": ["Incorrect — PDD is not strictly independent of SSD; there is a known, if modest, dependence captured by the Mayneord F factor.", "Correct — the Mayneord F factor describes how PDD increases slightly with increasing SSD, because the relative contribution of inverse-square falloff between dmax and the depth of interest becomes proportionally smaller at greater distances, making the beam appear relatively more penetrating.", "Incorrect — PDD does not decrease with increased SSD; if anything it modestly increases per the Mayneord relationship.", "Incorrect — PDD remains a well-defined, calculable quantity at extended SSD via standard correction factors like the Mayneord F factor."], "concept": "The Mayneord F factor quantifies the (generally small) increase in PDD with increasing SSD for a fixed field size and depth, reflecting the geometric relationship between inverse-square falloff and depth dose; this correction is used when converting PDD tables between different SSDs.", "formula": "F factor = [(SSD2+dmax)/(SSD1+dmax)]^2 x [(SSD1+d)/(SSD2+d)]^2", "catKey": "S1", "difficulty": "hard", "id": 677}, {"cat": "Radiation Physics and Radiobiology", "sub": "Radiation Tissue Tolerance", "stem": "A patient previously received 45 Gy in 25 fractions to the mediastinum for lymphoma 8 years ago. She now requires 60 Gy to a partially overlapping lung field for a new primary lung cancer. Assuming approximately 50% of the spinal cord's prior BED is considered 'recovered' over this time interval, which planning consideration is most critical?", "choices": ["Ignore the prior treatment entirely since 8 years have passed", "Calculate the estimated residual (unrecovered) BED to the spinal cord from the prior course, add the BED of the new course in the overlap region, and ensure the summed cumulative BED remains within an acceptable re-irradiation tolerance, in close consultation with medical physics", "Automatically deny any further radiation therapy to this patient given prior mediastinal treatment", "Assume the spinal cord fully recovered and plan the new course without any dose summation considerations"], "correct": 1, "expl": ["Incorrect — even after years have elapsed, cumulative dose to critical structures like the spinal cord must still be considered in re-irradiation planning; time alone does not eliminate the relevance of prior treatment.", "Correct — re-irradiation planning requires estimating the fraction of prior BED that has 'recovered' over time (organ- and structure-specific, often modeled with partial recovery assumptions) and summing residual BED with the new course's BED in any overlapping region to keep cumulative biological dose within acceptable tolerance — a complex, physics-collaborative calculation.", "Incorrect — re-irradiation may still be feasible with careful cumulative dose planning; it is not automatically precluded.", "Incorrect — assuming full spinal cord recovery without any calculation risks a potentially serious under-appreciation of cumulative dose and toxicity risk (e.g., myelopathy)."], "concept": "Re-irradiation of critical late-responding structures like the spinal cord requires quantitative modeling of partial tissue recovery over time and careful cumulative BED summation across treatment courses — an advanced application of radiobiological principles to real clinical decision-making.", "formula": "", "catKey": "S1", "difficulty": "hard", "id": 678}, {"cat": "Radiation Physics and Radiobiology", "sub": "Biological Effects", "stem": "Which statement best explains why hyperfractionation (e.g., 1.15-1.2 Gy per fraction, twice daily) can achieve a higher total tumor dose within a similar overall treatment time compared to conventional fractionation, while maintaining acceptable late toxicity?", "choices": ["Hyperfractionation eliminates the need for the '4 Rs' of radiobiology entirely", "Because late-responding tissues (low alpha/beta) are more sensitive to fraction size than early-responding tissues/tumors (higher alpha/beta), using smaller fractions disproportionately spares late tissue relative to the biological effect on tumor, allowing a higher total dose to be delivered for similar late-toxicity risk", "Hyperfractionation always increases late toxicity compared to conventional fractionation for any total dose", "Hyperfractionation works only because of increased overall treatment time, not fraction size"], "correct": 1, "expl": ["Incorrect — hyperfractionation still relies on and exploits the 4 Rs (particularly repair and redistribution between the closely spaced fractions), it does not eliminate them.", "Correct — because late-responding tissue (low alpha/beta, e.g., ~3 Gy) is disproportionately sensitive to fraction size compared to early-responding/tumor tissue (higher alpha/beta, e.g., ~10 Gy), reducing fraction size preferentially spares late tissue's biological effect relative to tumor's biological effect, allowing a higher total dose (and thus greater tumor cell kill) to be delivered for a similar level of late toxicity.", "Incorrect — this is the opposite of the intended and generally observed radiobiological rationale for hyperfractionation.", "Incorrect — hyperfractionation specifically relies on reduced fraction size (with similar or shorter overall time via twice-daily treatment), not simply on extending overall treatment time."], "concept": "The differential alpha/beta sensitivity of tumor versus late-responding normal tissue to fraction size is the core radiobiological rationale underlying hyperfractionation's ability to intensify tumor dose without proportionally increasing late toxicity.", "formula": "", "catKey": "S1", "difficulty": "hard", "id": 679}, {"cat": "Radiation Physics and Radiobiology", "sub": "Principles of Physics", "stem": "A linear accelerator's output is calibrated such that 100 MU delivers 100 cGy at dmax for a 10x10 cm field at 100 cm SAD. For a 15x15 cm field, the collimator scatter factor (Sc) is 1.03 and the phantom scatter factor (Sp) is 1.02 relative to the 10x10 reference field. What total scatter factor (Sc,p) should be used in the MU calculation for the 15x15 field?", "choices": ["1.03", "1.02", "1.0506", "2.05"], "correct": 2, "expl": ["Incorrect — this uses only the collimator scatter factor and omits the phantom scatter contribution.", "Incorrect — this uses only the phantom scatter factor and omits the collimator scatter contribution.", "Correct — total scatter factor Sc,p = Sc x Sp = 1.03 x 1.02 = 1.0506.", "Incorrect — this incorrectly adds the two factors rather than multiplying them."], "concept": "Total scatter factor (Sc,p) in MU calculations is the product (not sum) of collimator scatter factor (head scatter, field-size dependent) and phantom scatter factor (patient/phantom scatter, field-size dependent).", "formula": "Sc,p = Sc x Sp", "catKey": "S1", "difficulty": "hard", "id": 680}, {"cat": "Radiation Protection, Equipment Operation, and Quality Assurance", "sub": "Personnel Protection", "stem": "A radiation therapist works in a room where the workload is 500 Gy/week at 1 meter, use factor is 0.5, occupancy factor for the adjacent office is 1 (full occupancy), and the required weekly dose limit for that occupied area is 0.02 Gy. Ignoring distance/shielding contributions for this conceptual question, which factor combination correctly represents the unshielded weekly dose the adjacent area would receive from workload alone (before any barrier is applied)?", "choices": ["Workload x Use factor x Occupancy factor = 500 x 0.5 x 1 = 250 Gy/week, requiring substantial barrier attenuation to reach the 0.02 Gy/week limit", "Workload alone (500 Gy/week) represents the dose regardless of use or occupancy factors", "Use factor and occupancy factor are irrelevant to shielding calculations", "The unshielded dose is automatically equal to the design limit, since shielding calculations always target the exact workload"], "correct": 0, "expl": ["Correct — unshielded dose to the point of interest (before applying barrier transmission) is calculated as Workload x Use Factor x Occupancy Factor x (1/distance^2 in full calculations); here, 500 x 0.5 x 1 = 250 Gy/week, which must then be reduced by the barrier's transmission factor to reach the 0.02 Gy/week design limit — illustrating the substantial attenuation vault barriers must provide.", "Incorrect — workload alone overstates the relevant unshielded dose to the area of interest; use and occupancy factors are essential to a realistic shielding calculation.", "Incorrect — use factor (fraction of time the beam points at that barrier) and occupancy factor (fraction of time the area is occupied) are fundamental, required inputs to shielding design.", "Incorrect — shielding calculations determine the barrier thickness needed to reduce the unshielded dose down to the design limit; the unshielded dose itself is a separate, typically much higher, starting value."], "concept": "Vault shielding design requires calculating the unshielded dose at a point of interest (workload x use factor x occupancy factor x inverse-square distance factor) and then determining the barrier transmission/thickness needed to reduce that dose to the applicable weekly design limit.", "formula": "Unshielded dose = Workload x Use Factor x Occupancy Factor x (1/d^2)", "catKey": "S2", "difficulty": "hard", "id": 681}, {"cat": "Radiation Protection, Equipment Operation, and Quality Assurance", "sub": "Facilities/Area Monitoring", "stem": "A required barrier transmission factor is calculated to be 0.001 (i.e., the barrier must reduce dose to 0.1% of the unshielded value). If the tenth-value layer (TVL) of concrete for this beam energy is 34 cm, approximately what barrier thickness is required?", "choices": ["34 cm", "68 cm", "102 cm", "136 cm"], "correct": 2, "expl": ["Incorrect — 34 cm (one TVL) only reduces transmission to 10% (0.1), not to 0.1% (0.001).", "Incorrect — 68 cm (two TVLs) reduces transmission to 1% (0.01), not yet to 0.1%.", "Correct — a transmission factor of 0.001 represents a reduction to 1/1000, which is 3 tenth-value layers (each TVL reduces transmission by a factor of 10): 3 x 34 cm = 102 cm.", "Incorrect — 136 cm (4 TVLs) would over-attenuate to 0.0001 transmission, more shielding than required."], "concept": "Barrier thickness calculations using tenth-value layers require determining how many factors of 10 reduction are needed (based on the required transmission factor) and multiplying that number of TVLs by the TVL thickness for the material and beam energy.", "formula": "Number of TVLs = -log10(Transmission factor); Barrier thickness = Number of TVLs x TVL", "catKey": "S2", "difficulty": "hard", "id": 682}, {"cat": "Radiation Protection, Equipment Operation, and Quality Assurance", "sub": "Instrumentation", "stem": "An ionization chamber reading is taken at 22 degrees C and 760 mmHg. The chamber was calibrated at reference conditions of 22 degrees C and 760 mmHg (standard temperature and pressure for that calibration). If the actual measurement is later taken at 30 degrees C and 750 mmHg, which correction factor direction is correct, and why?", "choices": ["No correction is needed since only temperature changed", "A temperature-pressure correction factor greater than 1.0 must be applied, since higher temperature and lower pressure both reduce air density in the chamber, causing fewer ionizations per unit dose and requiring the reading to be corrected upward", "A correction factor less than 1.0 must be applied since warmer air always increases ionization chamber sensitivity", "Pressure changes never require correction, only temperature does"], "correct": 1, "expl": ["Incorrect — both temperature and pressure changed relative to calibration conditions, and both affect air density inside the (vented) ionization chamber, requiring correction.", "Correct — increased temperature and decreased pressure both reduce the density of air within a vented ion chamber, meaning fewer ion pairs are produced for a given dose; therefore the raw reading underestimates true dose, and a correction factor greater than 1.0 (Ptp) must be applied to correct the reading upward to reflect true dose.", "Incorrect — this reverses the correct direction of the correction; lower air density from higher temperature reduces, not increases, chamber signal for a given dose.", "Incorrect — pressure changes also alter air density and require correction alongside temperature; both are incorporated into the standard temperature-pressure correction factor."], "concept": "Vented ionization chambers require a temperature-pressure correction factor (Ptp) referencing calibration conditions, since ambient temperature and pressure directly affect the density of air (the sensitive medium) within the chamber and thus its response per unit dose.", "formula": "Ptp = [(273.2+T)/(273.2+T_ref)] x [P_ref/P]", "catKey": "S2", "difficulty": "hard", "id": 683}, {"cat": "Radiation Protection, Equipment Operation, and Quality Assurance", "sub": "Quality Control", "stem": "During annual comprehensive QA (per AAPM TG-142-style protocols), a linac's MLC leaf position accuracy is found to be within tolerance for static fields but exhibits a systematic 1.2 mm positioning error specifically during dynamic (sliding-window IMRT) delivery, discovered via a dedicated dynamic MLC test. What is the most appropriate interpretation and next step?", "choices": ["Since static field MLC accuracy passed, no further action is needed", "Dynamic and static MLC performance can differ meaningfully; a dynamic-specific positioning error exceeding tolerance for IMRT delivery requires investigation/recalibration and may necessitate suspending IMRT/VMAT treatments on that machine until resolved, even though static conformal fields remain unaffected", "This error is irrelevant since IMRT treatments
