nown lung cancer presents with facial swelling, distended neck veins, and shortness of breath that worsens when lying flat. This presentation is most consistent with:", "choices": ["Superior vena cava (SVC) syndrome", "Spinal cord compression", "Febrile neutropenia", "Hypercalcemia of malignancy"], "correct": 0, "expl": ["Correct — facial/neck swelling, distended neck veins, and dyspnea worsened by lying flat are classic signs of SVC syndrome, an oncologic emergency often from mediastinal tumor compression, requiring urgent evaluation and often emergent radiation therapy.", "Incorrect — spinal cord compression presents with back pain, weakness, or sensory changes, not facial/neck swelling.", "Incorrect — febrile neutropenia presents with fever in the setting of low neutrophil count, not these findings.", "Incorrect — hypercalcemia presents with symptoms like confusion, constipation, and polyuria, not facial swelling/JVD."], "concept": "Recognize classic presentations of oncologic emergencies: SVC syndrome, spinal cord compression, and whole-brain herniation from elevated intracranial pressure — all may require urgent/emergent RT.", "formula": "", "id": 52, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Oncologic Emergencies", "stem": "A patient with known metastatic breast cancer presents with new-onset lower extremity weakness, urinary retention, and severe midline back pain. What is the most likely diagnosis requiring emergent evaluation?", "choices": ["Radiation dermatitis", "Peripheral neuropathy from chemotherapy", "Simple mechanical low back strain", "Malignant spinal cord compression"], "correct": 3, "expl": ["Incorrect — dermatitis presents as skin changes, not neurologic deficits.", "Incorrect — chemotherapy-induced peripheral neuropathy typically presents as symmetric distal sensory changes, not acute bladder dysfunction and severe midline pain.", "Incorrect — mechanical strain does not typically cause bladder dysfunction or bilateral weakness; the oncologic history raises high suspicion for compression.", "Correct — new bilateral leg weakness, urinary retention, and severe back pain in a patient with known metastatic disease is highly concerning for malignant spinal cord compression — an oncologic emergency requiring immediate imaging (MRI) and often emergent steroids/RT to prevent permanent paralysis."], "concept": "Cord compression is a time-sensitive oncologic emergency — rapid recognition and treatment (often within 24 hours) is critical to preserving neurologic function.", "formula": "", "id": 53, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Anatomy/Pathophysiology", "stem": "A patient is diagnosed with a soft tissue sarcoma of the thigh. Which pattern of spread is most characteristic of sarcomas compared to carcinomas?", "choices": ["Exclusively local spread with no distant metastasis", "Predominantly lymphatic spread", "No metastatic potential", "Predominantly hematogenous spread, often to the lungs"], "correct": 3, "expl": ["Incorrect — while local control is important, sarcomas are well known for distant hematogenous spread.", "Incorrect — unlike most carcinomas, sarcomas typically spread hematogenously rather than via lymphatics.", "Incorrect — sarcomas do have metastatic potential, particularly to the lungs.", "Correct — sarcomas characteristically metastasize hematogenously, with the lungs being the most common distant site, which is why chest imaging is important in staging/surveillance."], "concept": "Sarcomas vs. carcinomas: sarcomas favor hematogenous spread (commonly to lung); carcinomas more often spread via lymphatics first.", "formula": "", "id": 54, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Anatomy/Pathophysiology", "stem": "Which structure is most important to identify and spare when treating a brain tumor located near the optic chiasm?", "choices": ["The femoral head", "The optic pathway/chiasm, due to risk of vision loss from excess dose", "The parotid gland", "The spinal cord at the lumbar level"], "correct": 1, "expl": ["Incorrect — the femoral head is relevant to pelvic RT, not brain tumors.", "Correct — the optic chiasm and optic pathways are critical, dose-limiting structures near the skull base/sella; exceeding tolerance dose risks vision loss.", "Incorrect — the parotid gland is a head and neck (not intracranial) organ at risk, unrelated to chiasm-adjacent brain tumors.", "Incorrect — the lumbar spinal cord is anatomically distant from intracranial tumors near the chiasm."], "concept": "Know site-specific critical structures: optic chiasm/nerves (sellar/parasellar tumors), brainstem, cochlea, parotids (head/neck), lungs/heart (thoracic), bowel/bladder/femoral heads (pelvic).", "formula": "", "id": 55, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Tumor Classification", "stem": "Multiple myeloma is best classified as a malignancy arising from which cell type?", "choices": ["Melanocytes", "Squamous epithelial cells", "Glandular epithelial cells", "Plasma cells within the bone marrow"], "correct": 3, "expl": ["Incorrect — melanocyte origin describes melanoma, not myeloma.", "Incorrect — squamous cell origin describes cancers like many head/neck, cervical, and skin cancers, not myeloma.", "Incorrect — glandular epithelial origin describes adenocarcinomas (e.g., prostate, breast), not myeloma.", "Correct — multiple myeloma is a malignant proliferation of plasma cells (differentiated B lymphocytes) within the bone marrow, often producing lytic bone lesions and hypercalcemia."], "concept": "Recognize hematologic malignancies (leukemia, lymphoma, multiple myeloma) as distinct from solid-organ carcinomas/sarcomas in origin and typical treatment approach.", "formula": "", "id": 56, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Anatomy/Pathophysiology", "stem": "In staging colorectal cancer, direct extension of tumor beyond the muscularis propria into pericolic fat, without nodal involvement, would generally correspond most closely to which general TNM concept?", "choices": ["Decreasing overall stage", "Increasing T-stage (local tumor extent) without N involvement", "No change in classification", "M1 disease automatically"], "correct": 1, "expl": ["Incorrect — increased local invasion increases, not decreases, overall stage.", "Correct — the T category in TNM reflects local tumor extent/invasion depth; deeper invasion into surrounding tissue without nodal spread increases T-stage while N remains node-negative.", "Incorrect — deeper local invasion is a meaningful change captured by increasing T-stage.", "Incorrect — M1 specifically denotes distant metastasis, which is not implied by local extension alone."], "concept": "TNM = Tumor extent (T), regional lymph Node involvement (N), distant Metastasis (M) — the general framework underlying staging, even without site-specific detail.", "formula": "", "id": 57, "catKey": "P1"}, {"cat": "Treatment Volume Localization", "sub": "Treatment Techniques", "stem": "During CT simulation of a lung tumor, which technique is most useful for accounting for tumor motion due to respiration?", "choices": ["4D-CT acquisition to capture the tumor's motion throughout the respiratory cycle", "Increasing slice thickness to speed up the scan", "Scanning only at end-inspiration", "Using a smaller field of view only"], "correct": 0, "expl": ["Correct — 4D-CT captures images throughout the respiratory cycle, allowing an internal target volume (ITV) to be generated that encompasses tumor motion, or enabling gating/tracking strategies.", "Incorrect — increasing slice thickness reduces spatial resolution and does not address motion.", "Incorrect — scanning at a single respiratory phase does not capture the full range of tumor motion and can lead to underdosing if motion is significant.", "Incorrect — field of view size does not address respiratory motion."], "concept": "4D-CT simulation is the standard approach for characterizing and managing respiratory tumor motion (e.g., in lung, liver treatment planning).", "formula": "", "id": 58, "catKey": "P2"}, {"cat": "Treatment Volume Localization", "sub": "CT Simulation", "stem": "In CT simulation, increasing the mA setting primarily affects which image parameter?", "choices": ["Gantry rotation speed", "Slice thickness", "Image noise (lower mA increases noise, higher mA reduces it)", "Field of view"], "correct": 2, "expl": ["Incorrect — gantry rotation speed is a separate acquisition timing parameter.", "Incorrect — slice thickness is a separate, independently selected acquisition parameter.", "Correct — mA (tube current) directly affects the number of photons produced; higher mA reduces quantum noise (grainier appearance) at the cost of increased patient dose.", "Incorrect — field of view is a geometric acquisition/reconstruction parameter, not directly controlled by mA."], "concept": "CT acquisition parameters (mA, slice thickness, FOV, reconstruction algorithm) each affect image quality and dose differently — key for CT simulation QA and technique optimization.", "formula": "", "id": 59, "catKey": "P2"}, {"cat": "Treatment Volume Localization", "sub": "CT Simulation", "stem": "CT number (Hounsfield unit) is primarily used in treatment planning to:", "choices": ["Determine patient identification", "Set the treatment machine's gantry angle", "Provide electron density information for dose calculation heterogeneity corrections", "Determine the patient's prescribed dose"], "correct": 2, "expl": ["Incorrect — CT number has no relationship to patient identification.", "Incorrect — gantry angle is a planning/delivery parameter selected by the planner/physician, unrelated to CT number.", "Correct — CT numbers (Hounsfield units) correlate with tissue electron density, which the treatment planning system uses for accurate dose calculation, particularly inhomogeneity/heterogeneity corrections (e.g., lung, bone, air cavities).", "Incorrect — the prescribed dose is determined by the physician based on clinical factors, not derived from CT number."], "concept": "CT number → electron density conversion is fundamental to modern heterogeneity-corrected dose calculation algorithms.", "formula": "", "id": 60, "catKey": "P2"}, {"cat": "Treatment Volume Localization", "sub": "Documentation/Verification", "stem": "After CT simulation, permanent tattoos are placed on the patient's skin at the marked reference points. What is the primary purpose of these marks?", "choices": ["To mark where contrast was injected", "To indicate billing codes", "To provide a reproducible external reference for daily patient setup and alignment with the treatment isocenter", "Cosmetic decoration only"], "correct": 2, "expl": ["Incorrect — tattoos mark simulation reference/isocenter points, not injection sites.", "Incorrect — tattoos are unrelated to billing documentation.", "Correct — permanent reference marks (tattoos) allow reproducible daily alignment of the patient using room lasers, ensuring the treatment isocenter is accurately and consistently reproduced each fraction.", "Incorrect — the marks serve a clinical setup purpose, not cosmetic."], "concept": "Temporary and permanent reference marks are essential for reproducible daily setup — a core treatment volume localization/verification concept.", "formula": "", "id": 61, "catKey": "P2"}, {"cat": "Treatment Volume Localization", "sub": "Documentation/Verification", "stem": "A therapist notices the simulation set-up instructions do not match the physician's order for patient positioning (e.g., supine vs. prone). What should the therapist do before proceeding?", "choices": ["Use clinical judgment to choose whichever position seems more comfortable for the patient", "Stop and clarify/verify the discrepancy with the physician before continuing", "Ask the patient which position they prefer", "Proceed with the documented set-up instructions since they were already written"], "correct": 1, "expl": ["Incorrect — positioning must be implemented according to physician order, not therapist comfort judgment alone.", "Correct — any discrepancy between documentation and physician order must be clarified and verified with the physician before treatment/simulation proceeds, per implement-according-to-physician-order documentation standards.", "Incorrect — while patient comfort matters, treatment position is a clinical decision made by the physician, not patient preference.", "Incorrect — proceeding despite a known discrepancy risks a significant setup error and possible geographic miss."], "concept": "Documentation and verification of the simulation procedure must always be implemented strictly according to the physician's order; discrepancies require clarification, not assumption.", "formula": "", "id": 62, "catKey": "P2"}, {"cat": "Treatment Volume Localization", "sub": "Treatment Techniques", "stem": "Which type of contrast administration is most useful during CT simulation for a head and neck tumor to help distinguish tumor from adjacent vascular structures?", "choices": ["IV (intravenous) contrast", "Rectal contrast", "Oral contrast only", "No contrast is ever used in head and neck simulation"], "correct": 0, "expl": ["Correct — IV contrast enhances vascular structures and can improve tumor-to-vessel and tumor-to-normal-tissue differentiation in head and neck simulation, aiding target delineation.", "Incorrect — rectal contrast is used for pelvic (rectal/anal) simulation, not head and neck.", "Incorrect — oral contrast is more useful for GI tract delineation, not vascular/soft tissue head and neck anatomy.", "Incorrect — IV contrast is frequently used in head and neck CT simulation when clinically appropriate and not contraindicated."], "concept": "Match contrast route to clinical purpose and site: IV contrast highlights vascular structures/tumor enhancement; oral/rectal contrast outlines GI structures for pelvic/abdominal simulation.", "formula": "", "id": 63, "catKey": "P2"}, {"cat": "Treatment Volume Localization", "sub": "CT Simulation", "stem": "Which structure or system is used to verify accurate transfer of the simulation isocenter to the treatment room laser system?", "choices": ["The patient's oral contrast timing", "The patient's insurance authorization", "Programmable/movable lasers referenced to the CT simulation isocenter coordinates", "The treatment machine's beam energy selection"], "correct": 2, "expl": ["Incorrect — oral contrast timing pertains to GI visualization, not isocenter transfer.", "Incorrect — insurance authorization is an administrative matter, unrelated to isocenter localization.", "Correct — programmable lasers in the simulation and treatment rooms are aligned to the coordinates established at CT simulation, ensuring the isocenter is accurately and reproducibly transferred to the treatment room for daily setup.", "Incorrect — beam energy selection is a treatment planning/delivery parameter, unrelated to isocenter transfer verification."], "concept": "Programmable lasers referenced to simulation coordinates are central to accurately transferring and reproducing the planned isocenter at the treatment unit.", "formula": "", "id": 64, "catKey": "P2"}, {"cat": "Treatment Volume Localization", "sub": "Treatment Techniques", "stem": "Sectional (axial) CT anatomy is essential in treatment volume localization primarily because it allows the planner to:", "choices": ["View anatomy exclusively in the sagittal plane", "Avoid the need for any additional imaging modalities ever", "Determine the patient's billing code", "Correlate cross-sectional anatomic relationships of the tumor to adjacent critical structures for accurate 3D target and organ-at-risk delineation"], "correct": 3, "expl": ["Incorrect — sectional CT primarily provides axial (cross-sectional) images, though modern systems can reformat into other planes; the key value is cross-sectional anatomic correlation.", "Incorrect — additional imaging (MRI, PET) is often fused with CT for improved target delineation, not avoided because of CT.", "Incorrect — billing is unrelated to sectional anatomy interpretation.", "Correct — understanding sectional/topographic anatomy allows accurate identification of the tumor's relationship to adjacent critical organs in three dimensions, essential for accurate volume/contour delineation."], "concept": "Strong sectional/cross-sectional anatomy knowledge underlies accurate contouring of targets and critical organs during treatment volume localization.", "formula": "", "id": 65, "catKey": "P2"}, {"cat": "Prescription and Dose Calculation", "sub": "Treatment Prescription", "stem": "Which volume represents the gross tumor plus a margin for suspected microscopic disease spread, but does NOT yet include a margin for daily setup uncertainty or organ motion?", "choices": ["Clinical Target Volume (CTV)", "Treated volume", "Planning Target Volume (PTV)", "Gross Tumor Volume (GTV)"], "correct": 0, "expl": ["Correct — the CTV = GTV + a margin for presumed microscopic (subclinical) disease extension, but does not yet account for setup error or organ motion.", "Incorrect — treated volume refers to the volume actually receiving a dose considered adequate for the treatment goal (e.g., enclosed by a specified isodose), not a target-definition concept.", "Incorrect — the PTV adds an additional geometric margin around the CTV to account for setup uncertainty and internal organ motion.", "Incorrect — the GTV represents only the visible/palpable gross tumor itself, with no added margin."], "concept": "Target volume hierarchy: GTV (visible tumor) → CTV (+ microscopic spread margin) → PTV (+ setup/motion margin) — a fundamental ICRU concept.", "formula": "", "id": 66, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Geometric Parameters", "stem": "A treatment field has an SSD (source-to-surface distance) setup. If the patient's surface is measured at 95 cm SSD instead of the intended 100 cm SSD, and the machine is not adjusted, what is the most likely consequence?", "choices": ["The field size will automatically compensate for the discrepancy", "No effect on dose to the target", "Underdosing the target due to increased effective distance", "Overdosing the target/skin surface due to decreased distance from the source, per the inverse square law"], "correct": 3, "expl": ["Incorrect — field size setting does not automatically compensate for an SSD discrepancy; this must be caught by setup verification and MU recalculation.", "Incorrect — SSD error directly affects delivered dose due to the inverse square relationship.", "Incorrect — a decrease in SSD (patient surface closer to the source) increases, not decreases, dose rate at the surface/target.", "Correct — a shorter-than-intended SSD places the patient's surface closer to the source, increasing the dose rate there per the inverse square law, risking an overdose if MU are not recalculated for the actual distance."], "concept": "SSD errors directly affect dose via the inverse square law — accurate setup and verification of SSD/SAD (TSD/TAD) is essential to safe, accurate dose delivery.", "formula": "I₁d₁² = I₂d₂²", "id": 67, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Dose Calculation", "stem": "A photon beam has a percentage depth dose (PDD) of 100% at dmax and 60% at 10 cm depth for a given field size and energy. If the prescribed dose at 10 cm depth is 200 cGy, what is the dose delivered at dmax?", "choices": ["200 cGy", "333 cGy", "600 cGy", "120 cGy"], "correct": 1, "expl": ["Incorrect — 200 cGy is the depth dose itself, not the dmax dose, which must be higher since PDD decreases with depth.", "Correct — Dose at dmax = Dose at depth ÷ (PDD at depth/100) = 200 ÷ 0.60 = 333 cGy.", "Incorrect — 600 cGy would result from dividing by 0.333 instead of by 0.60; this is a calculation error.", "Incorrect — 120 cGy would be 60% of 200 cGy, the reverse of the needed calculation."], "concept": "PDD relates the dose at any depth to the dose at dmax: Dose(depth) = Dose(dmax) × PDD(depth)/100 — a fundamental dose calculation manipulation.", "formula": "Dose(dmax) = Dose(depth) ÷ [PDD(depth)/100]", "id": 68, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Dose Calculation", "stem": "Using the inverse square law, if the dose rate at 100 cm SSD is 100 cGy/min, what is the approximate dose rate at 80 cm SSD (all else being equal)?", "choices": ["156 cGy/min", "64 cGy/min", "100 cGy/min", "125 cGy/min"], "correct": 0, "expl": ["Correct — New rate = 100 × (100/80)² = 100 × 1.5625 = 156.25 ≈ 156 cGy/min; decreasing distance increases dose rate per the inverse square law.", "Incorrect — 64 cGy/min would result from an increase in distance, not a decrease.", "Incorrect — dose rate changes significantly with distance per the inverse square law; it would not remain unchanged.", "Incorrect — 125 cGy/min underestimates the increase."], "concept": "Inverse square calculations are a common board-exam calculation type: New Intensity = Old Intensity × (Old distance/New distance)².", "formula": "I₂ = I₁ × (d₁/d₂)²", "id": 69, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Dose Calculation", "stem": "A patient is prescribed 200 cGy per fraction for 25 fractions. What is the total prescribed dose?", "choices": ["5000 cGy (50 Gy)", "4500 cGy (45 Gy)", "2500 cGy (25 Gy)", "2000 cGy (20 Gy)"], "correct": 0, "expl": ["Correct — Total dose = dose per fraction × number of fractions = 200 cGy × 25 = 5000 cGy = 50 Gy.", "Incorrect — 4500 cGy would correspond to 22.5 fractions, not 25.", "Incorrect — this equals 12.5 fractions at 200 cGy, not 25.", "Incorrect — 2000 cGy corresponds to only 10 fractions, not 25."], "concept": "Basic fractionation calculation: Total dose = dose/fraction × number of fractions — the foundation for prescription verification.", "formula": "Total dose = dose/fraction × # fractions", "id": 70, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Dose Calculation", "stem": "Which factor accounts for the reduction in dose caused by placing a beam modifier (such as a tray or compensator) in the beam path?", "choices": ["Phantom scatter factor", "Tray factor", "Wedge factor", "Collimator scatter factor"], "correct": 1, "expl": ["Incorrect — phantom scatter factor accounts for scatter contribution within the patient/phantom, not a tray accessory.", "Correct — the tray factor (or accessory transmission factor) accounts for beam attenuation caused by a block tray or similar accessory placed in the beam path, and is incorporated into MU calculations.", "Incorrect — a wedge factor specifically accounts for attenuation caused by a wedge, not a general accessory tray.", "Incorrect — collimator scatter factor accounts for scatter from the collimator/head as field size changes, not tray attenuation."], "concept": "MU calculations incorporate multiple correction factors: output factor, collimator scatter, phantom scatter, tray/wedge transmission factors, and inhomogeneity corrections.", "formula": "", "id": 71, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Dose Calculation", "stem": "Two adjacent treatment fields are abutted at the patient's skin surface with no gap. What is the primary dosimetric concern at the junction?", "choices": ["Overdosage (hot spot) at the junction due to beam divergence causing overlap at depth", "Underdosage at the junction due to beam divergence away from each other", "The fields will always match perfectly regardless of technique", "No dosimetric concern exists at abutted fields"], "correct": 0, "expl": ["Correct — because photon beams diverge from the source, fields matched (abutted) at the surface will geometrically overlap at depth, creating a hot spot/overdose region at the junction unless a gap calculation or other technique (e.g., feathering, half-beam block) is used to correct for divergence.", "Incorrect — divergence typically causes overlap (and thus overdosing), not underdosing, at depth for surface-abutted fields.", "Incorrect — matching requires deliberate gap calculations; fields do not automatically match without technique-specific correction.", "Incorrect — abutting fields is a well-recognized dosimetric challenge requiring careful gap calculation."], "concept": "Gap calculations account for beam divergence to avoid hot spots (overlap) or cold spots (under-coverage) at field junctions — a classic board calculation topic.", "formula": "", "id": 72, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Dose Calculation", "stem": "A wedge is inserted into the beam path to modify the isodose distribution. Which best describes its primary clinical purpose?", "choices": ["To increase skin dose intentionally in all cases", "To eliminate the need for treatment planning", "To increase the total treatment time only", "To compensate for sloping patient contours or to combine with another field for a more homogeneous composite dose distribution"], "correct": 3, "expl": ["Incorrect — increasing skin dose is not the intended clinical goal of wedge use; in fact, dynamic/physical wedge choice can be selected in part to manage surface dose.", "Incorrect — wedges are a planning tool used within, not instead of, the treatment planning process.", "Incorrect — while wedges do affect beam-on time due to attenuation, this is not their primary clinical purpose.", "Correct — wedges tilt the isodose distribution to compensate for sloping surfaces or to combine with another wedged/open field to achieve a more homogeneous composite dose distribution across the target."], "concept": "Wedges (physical or enhanced dynamic) modify beam isodose distribution to compensate for contour or achieve dose homogeneity — important for site-specific planning (e.g., breast tangents).", "formula": "", "id": 73, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Dose Calculation", "stem": "Bolus material is placed on the patient's skin surface primarily to:", "choices": ["Increase the SSD", "Reduce the skin-sparing effect of megavoltage photon beams by shifting the dose buildup region closer to the skin surface", "Shield underlying critical structures", "Decrease the total prescribed dose"], "correct": 1, "expl": ["Incorrect — bolus is placed directly on the skin and effectively decreases (does not increase) the SSD to the skin surface if source distance is otherwise fixed relative to the bolus surface.", "Correct — bolus is tissue-equivalent material placed on the skin to reduce the natural skin-sparing effect of megavoltage beams, effectively bringing the dmax closer to (or at) the skin surface, useful when superficial disease requires full surface dose.", "Incorrect — bolus is not a shielding material; it is tissue-equivalent and does not attenuate significantly to protect deeper structures.", "Incorrect — bolus modifies the dose distribution/skin dose, not the total prescribed target dose."], "concept": "Bolus counteracts the skin-sparing effect of megavoltage beams — used when the clinical target includes the skin surface (e.g., chest wall, scar boosts).", "formula": "", "id": 74, "catKey": "P3"}, {"cat": "Treatments", "sub": "Treatment Options", "stem": "Which of the following best describes the goal of neoadjuvant chemotherapy in combined-modality cancer treatment?", "choices": ["Chemotherapy given before definitive local therapy (surgery or radiation) to shrink the tumor", "Chemotherapy given after surgery to eliminate residual microscopic disease", "Chemotherapy given simultaneously with radiation to enhance radiosensitivity", "Chemotherapy given only for palliative symptom control"], "correct": 0, "expl": ["Correct — neoadjuvant therapy is given before definitive local treatment (surgery or RT), often to shrink tumor volume and potentially downstage disease before the primary intervention.", "Incorrect — this describes adjuvant chemotherapy (given after primary local treatment), not neoadjuvant.", "Incorrect — this describes concurrent (concomitant) chemoradiation, not neoadjuvant timing.", "Incorrect — neoadjuvant therapy is generally given with curative, not purely palliative, intent."], "concept": "Understand treatment sequencing terminology: neoadjuvant (before local therapy), adjuvant (after local therapy), and concurrent/concomitant (simultaneous with RT).", "formula": "", "id": 75, "catKey": "P4"}, {"cat": "Treatments", "sub": "Verification/Application", "stem": "Cone beam CT (CBCT) acquired immediately before treatment is primarily used to:", "choices": ["Calculate the patient's total prescribed dose", "Verify daily patient position and internal anatomy against the planning CT before beam delivery", "Replace the need for the original planning CT simulation", "Determine the patient's insurance eligibility"], "correct": 1, "expl": ["Incorrect — dose calculation is performed using the planning CT and treatment planning system, not directly from daily CBCT.", "Correct — CBCT allows image-guided verification of daily patient position and internal anatomy immediately before treatment, allowing shifts to correct for setup error or anatomic changes before beam-on.", "Incorrect — CBCT is a verification tool used in conjunction with, not as a replacement for, the original planning CT.", "Incorrect — CBCT is a clinical imaging tool, unrelated to insurance administration."], "concept": "Image-guided radiation therapy (IGRT) using CBCT, kV, or MV imaging verifies daily setup accuracy, reducing systematic and random setup errors.", "formula": "", "id": 76, "catKey": "P4"}, {"cat": "Treatments", "sub": "Verification/Application", "stem": "Which treatment technique involves continuous gantry rotation while simultaneously modulating dose rate, gantry speed, and MLC position?", "choices": ["2D conventional planning", "Volumetric modulated arc therapy (VMAT)", "Non-volumetric (static) arc therapy", "3D conformal radiation therapy (3D-CRT)"], "correct": 1, "expl": ["Incorrect — 2D conventional planning uses simple, non-conformal fields based on bony landmarks, unrelated to arc-based modulation.", "Correct — VMAT delivers dose via continuous gantry rotation while simultaneously varying dose rate, gantry speed, and MLC leaf positions, allowing highly conformal dose distributions with relatively short treatment times.", "Incorrect — non-volumetric arc therapy rotates the gantry but does not incorporate the same level of simultaneous intensity modulation as VMAT.", "Incorrect — 3D-CRT typically uses fixed gantry angles with static, conformal fields, not continuous rotation with dynamic modulation."], "concept": "Know technique hierarchy: 2D → 3D-CRT → IMRT (fixed-gantry intensity modulation) → VMAT (rotational intensity modulation) → stereotactic (highly conformal, high-dose-per-fraction) techniques.", "formula": "", "id": 77, "catKey": "P4"}, {"cat": "Treatments", "sub": "Verification/Application", "stem": "Respiratory gating is a motion management technique that:", "choices": ["Is only usable for head and neck tumors", "Requires the patient to stop breathing throughout the entire treatment", "Eliminates the need for any 4D-CT simulation", "Delivers the beam only during a specific, pre-defined portion of the patient's breathing cycle"], "correct": 3, "expl": ["Incorrect — gating is most relevant for tumors affected by respiratory motion (e.g., lung, liver, pancreas), not head and neck, which is largely unaffected by respiration.", "Incorrect — gating does not require complete breath cessation; breath-hold techniques are a related but distinct motion management approach.", "Incorrect — 4D-CT is typically used to characterize motion and define the appropriate gating window, not eliminated by gating.", "Correct — respiratory gating synchronizes beam delivery with a specific phase of the breathing cycle (e.g., end-exhale), reducing the target volume needed to account for motion and reducing normal tissue dose."], "concept": "Motion management options include ITV-based margins, respiratory gating, breath-hold techniques, and abdominal compression — chosen based on tumor site and motion characteristics.", "formula": "", "id": 78, "catKey": "P4"}, {"cat": "Treatments", "sub": "Machine Set-Up", "stem": "A treatment couch with six degrees of freedom (6DoF) allows correction for which types of setup error beyond standard translational (x, y, z) shifts?", "choices": ["Gantry angle only", "Only vertical shifts", "Rotational errors (pitch, roll, yaw) in addition to translational shifts", "Collimator angle only"], "correct": 2, "expl": ["Incorrect — gantry angle is a beam delivery parameter, not a couch degree of freedom correction.", "Incorrect — a 6DoF couch corrects for more than just vertical translation.", "Correct — a six-degrees-of-freedom couch can correct translational errors (x, y, z) plus rotational errors (pitch, roll, yaw), enabling more precise correction of complex setup deviations, particularly important for high-precision techniques like SRS/SBRT.", "Incorrect — collimator angle is also a beam delivery parameter, unrelated to couch motion correction."], "concept": "6DoF couches enable correction of both translational and rotational setup errors, important for high-precision stereotactic treatments where rotational error tolerance is very tight.", "formula": "", "id": 79, "catKey": "P4"}, {"cat": "Treatments", "sub": "Treatment Accessories", "stem": "A custom cerrobend (block alloy) block is used during treatment primarily to:", "choices": ["Increase skin dose intentionally", "Calibrate the machine output", "Shield normal tissue/critical structures from the primary beam within an irregularly shaped field", "Replace the need for a multileaf collimator entirely on all modern linear accelerators"], "correct": 2, "expl": ["Incorrect — blocks shield tissue from dose; they do not intentionally increase skin dose.", "Incorrect — output calibration uses ionization chambers, not treatment blocks.", "Correct — custom blocks (often made of a low-melting-point alloy) are shaped to conform to the field edges and shield normal tissue/critical structures from the primary beam, especially in irregularly shaped fields.", "Incorrect — blocks and MLC serve similar shielding purposes but are not universally interchangeable; many centers now rely primarily on MLC rather than custom blocks."], "concept": "Beam modifiers (blocks, MLC, compensators, bolus, wedges) each serve a specific purpose in shaping dose distribution to spare normal tissue and conform to the target.", "formula": "", "id": 80, "catKey": "P4"}, {"cat": "Treatments", "sub": "Treatment Accessories", "stem": "Which factor most directly determines the effectiveness of a shielding block in attenuating the primary beam?", "choices": ["The block's color", "The time of day treatment is delivered", "The block's distance from the patient only", "The block's thickness relative to the half-value layer (HVL) or half-value thickness (HVT) of the material for that beam energy"], "correct": 3, "expl": ["Incorrect — block color has no bearing on radiation attenuation.", "Incorrect — time of day has no bearing on shielding block attenuation.", "Incorrect — while block position in the beam matters for penumbra, attenuation effectiveness is fundamentally determined by thickness relative to HVL, not distance alone.", "Correct — attenuation depends on block thickness relative to the material's HVL/HVT for the specific beam energy used; standard practice is to use several HVLs of thickness (e.g., 5 HVLs for ~3-5% transmission)."], "concept": "Block/shielding effectiveness follows exponential attenuation principles based on material thickness relative to HVL/HVT for the beam energy in use.", "formula": "", "id": 81, "catKey": "P4"}, {"cat": "Treatments", "sub": "Treatment Administration", "stem": "During treatment delivery, the linear accelerator unexpectedly beam-holds mid-fraction due to a detected MLC discrepancy. What is the most appropriate therapist action?", "choices": ["Ignore the hold and complete the fraction using a different field arrangement without physician input", "Manually override the interlock and resume beam delivery immediately", "Discharge the patient and reschedule without documentation", "Do not override any safety interlock; assess the situation, document the event, and follow institutional troubleshooting/reporting procedures before resuming"], "correct": 3, "expl": ["Incorrect — changing field arrangement without physician/physics input could introduce a significant dosimetric error and is not an appropriate independent therapist action.", "Incorrect — manually overriding a safety interlock is unsafe and against safety protocol; interlocks exist specifically to prevent unsafe delivery.", "Incorrect — the event must be documented and reported per institutional and regulatory requirements, not ignored.", "Correct — safety interlocks must never be bypassed; the therapist should assess, document the equipment malfunction, and follow institutional troubleshooting and reporting procedures (physics/service notification) before any treatment resumes."], "concept": "Equipment malfunctions require proper troubleshooting, documentation, and reporting — safety interlocks are never bypassed regardless of scheduling pressure.", "formula": "", "id": 82, "catKey": "P4"}, {"cat": "Treatments", "sub": "Treatment Administration", "stem": "Which imaging technique uses a therapeutic megavoltage beam itself to generate a verification image of patient position?", "choices": ["Ultrasound-based surface imaging", "MV (portal) imaging", "kV planar imaging", "Cone beam CT using a diagnostic kV source"], "correct": 1, "expl": ["Incorrect — surface imaging uses optical/structured light, not any x-ray beam.", "Correct — MV (portal) imaging uses the therapeutic megavoltage beam to generate a verification image, historically the original method of electronic portal imaging before widespread kV/CBCT adoption.", "Incorrect — kV imaging uses a separate diagnostic-energy x-ray source mounted on the gantry, not the treatment beam itself.", "Incorrect — CBCT for IGRT typically uses a diagnostic kV imaging system, not the MV treatment beam."], "concept": "Distinguish imaging modalities for IGRT: kV planar/CBCT (diagnostic-energy, better soft-tissue contrast, lower dose) vs. MV portal imaging (uses treatment beam, lower contrast, historically significant).", "formula": "", "id": 83, "catKey": "P4"}, {"cat": "Treatments", "sub": "Treatment Options", "stem": "Stereotactic body radiation therapy (SBRT) is characterized by which of the following?", "choices": ["No requirement for advanced immobilization or image guidance", "Exclusive use for whole-brain treatment", "High dose per fraction delivered in a small number of fractions with high precision/conformality", "Low dose per fraction delivered over many weeks"], "correct": 2, "expl": ["Incorrect — SBRT requires rigorous immobilization and image guidance due to tight margins and high per-fraction doses.", "Incorrect — SBRT refers to extracranial body sites (lung, liver, spine); SRS is the intracranial-specific term.", "Correct — SBRT (and SRS for intracranial targets) delivers ablative high doses per fraction over a small number of fractions (often 1–5), requiring high geometric precision, robust immobilization, and image guidance to safely treat small, well-defined targets.", "Incorrect — this describes conventional fractionation, the opposite of SBRT's approach."], "concept": "SBRT/SRS = high dose per fraction, few fractions, tight margins, requiring superior immobilization and image guidance compared to conventional fractionation.", "formula": "", "id": 84, "catKey": "P4"}, {"cat": "Patient Interactions and Management", "sub": "Ethical/Legal", "stem": "A patient in severe distress from a suspected cardiac event cannot verbally consent to emergency intervention. Which type of consent applies as the therapist calls for help and begins basic care?", "choices": ["Proxy consent", "Implied consent", "Oral consent", "Written consent"], "correct": 1, "expl": ["Proxy consent requires a designated decision-maker to be present and consulted, which is not yet established here.", "Correct — implied consent is presumed in emergencies where a reasonable person would want life-saving treatment and the patient cannot express wishes.", "Oral consent still requires an ability to communicate agreement, which this patient lacks.", "Written consent requires a signed, capable patient and cannot be obtained in this emergency."], "concept": "Implied consent covers emergency situations where obtaining explicit consent is not possible and delay would endanger the patient.", "formula": "", "id": 85, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Ethical/Legal", "stem": "A patient with a documented DNR order goes into cardiac arrest during a routine visit. What is the therapist's correct action?", "choices": ["Honor the DNR order and follow the facility's protocol for end-of-life care", "Delay any action until a physician arrives on-site", "Call the family to ask permission to resuscitate", "Begin CPR immediately regardless of the DNR"], "correct": 0, "expl": ["Correct — a DNR reflects the patient's advance directive regarding extent of care; it must be honored per facility protocol.", "The therapist should still act — following the DNR protocol (which may include comfort measures) rather than simply doing nothing.", "Family permission is not required to override a patient's own valid DNR directive.", "Overriding a valid DNR violates the patient's documented wishes and legal rights."], "concept": "A DNR order is part of extent-of-care patient rights under the Patient Care Partnership and must be respected once verified as valid.", "formula": "", "id": 86, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Ethical/Legal", "stem": "A patient's living will specifies she does not want mechanical ventilation under any circumstances. Which category of patient right does this document represent?", "choices": ["Research participation right", "Advance directive (extent of care)", "Informed consent for a specific procedure", "Confidentiality"], "correct": 1, "expl": ["Research participation is a separate right unrelated to end-of-life care preferences.", "Correct — a living will is an advance directive specifying the extent of care a patient wants, exercised in advance of incapacity.", "Informed consent for a specific procedure is obtained at the time of that procedure, not a standing advance directive.", "Confidentiality concerns information privacy, not treatment preferences."], "concept": "Advance directives (living wills, healthcare proxies) let patients specify care preferences before they lose capacity to communicate them.", "formula": "", "id": 87, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Ethical/Legal", "stem": "Which term describes a failure to exercise the standard of care that a reasonably prudent radiation therapist would exercise in similar circumstances, resulting in patient harm?", "choices": ["Beneficence", "Negligence", "Battery", "Res ipsa loquitur"], "correct": 1, "expl": ["Beneficence is an ethical principle of acting for the patient's good, not a legal term for substandard care.", "Correct — negligence is the failure to provide the standard of care a reasonably prudent professional would provide, causing harm.", "Battery involves unauthorized physical contact/treatment, not a failure of standard of care.", "Res ipsa loquitur is a legal doctrine used to infer negligence from an event that would not normally occur without it, not the definition of negligence itself."], "concept": "Negligence requires four elements: duty, breach of duty, causation, and damages — a foundational legal/ethical concept in patient care.", "formula": "", "id": 88, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Ethical/Legal", "stem": "A therapist treats a patient at the wrong treatment site due to failure to verify the prescription. This scenario most directly illustrates which legal doctrine?", "choices": ["Confidentiality", "Beneficence", "Living will", "Res ipsa loquitur"], "correct": 3, "expl": ["Confidentiality concerns information privacy, unrelated to this scenario.", "Beneficence concerns acting for the patient's benefit, unrelated to inferring negligence.", "A living will is an advance directive, unrelated to a treatment verification error.", "Correct — res ipsa loquitur (\"the thing speaks for itself\") applies when an error like treating the wrong site is so obviously the result of negligence that it needs no further proof of breach."], "concept": "Res ipsa loquitur applies to obvious errors (wrong site, retained instruments) where negligence is self-evident from the outcome itself.", "formula": "", "id": 89, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Ethical/Legal", "stem": "Using a positioning aid to gently prevent a confused patient from moving off the treatment couch during setup is best classified as:", "choices": ["An immobilization aid used to prevent unintended motion, not a restraint", "A restraint requiring physician order and documentation", "A violation of the Patients' Bill of Rights", "Battery"], "correct": 0, "expl": ["Correct — positioning aids used to maintain accurate setup and prevent inadvertent motion are considered immobilization, distinct from a restraint used to control behavior.", "This distinguishes true restraints (used to limit voluntary movement broadly) from immobilization devices used for positioning accuracy.", "Properly used immobilization for treatment accuracy does not violate the Bill of Rights.", "Using appropriate immobilization with patient understanding is not battery."], "concept": "Know the distinction: restraints limit patient movement/behavior and require specific justification/orders, whereas immobilization devices support accurate, reproducible treatment setup.", "formula": "", "id": 90, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Ethical/Legal", "stem": "A patient asks about participating in a clinical trial involving a new fractionation schedule. Which patient right is most directly relevant to this request?", "choices": ["Beneficence only", "Respondeat superior", "Right to research participation, including the right to decline without affecting standard care", "Confidentiality"], "correct": 2, "expl": ["Beneficence is a broader ethical principle, not the specific patient right regarding research.", "Respondeat superior is a liability doctrine unrelated to research participation rights.", "Correct — the Patients' Bill of Rights includes the right to be informed about and choose whether to participate in research, without it affecting the standard care they otherwise receive.", "Confidentiality concerns information privacy, not research participation choice."], "concept": "Research participation is an explicit patient right under the AHA Patient Care Partnership; consent must be voluntary and informed.", "formula": "", "id": 91, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Ethical/Legal", "stem": "A patient receiving definitive treatment for early-stage cancer with an expected cure asks the therapist to clarify the overall goal of her care. This is best described as which goal of care?", "choices": ["Hospice", "Research-only", "Palliative", "Definitive (curative intent)"], "correct": 3, "expl": ["Hospice care is end-of-life comfort care, not applicable here.", "This is standard clinical treatment, not a research protocol.", "Palliative care aims to relieve symptoms without curative intent, not applicable to early-stage curable disease.", "Correct — definitive treatment is delivered with curative intent, aiming to eliminate the disease."], "concept": "Distinguish goals of care: definitive/curative intent vs. palliative intent (symptom relief without expectation of cure) — this shapes treatment planning decisions.", "formula": "", "id": 92, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Interpersonal Communication", "stem": "When communicating with a patient who has significant hearing impairment, which strategy is most effective?", "choices": ["Facing the patient directly, speaking clearly at a normal pace, and using written materials or an interpreter as needed", "Speaking loudly and quickly from behind the patient", "Avoiding conversation altogether to save time", "Relying solely on a family member to relay all information"], "correct": 0, "expl": ["Correct — facing the patient, speaking clearly, and supplementing with written materials or a qualified interpreter (e.g., ASL) improves comprehension for hearing-impaired patients.", "Speaking from behind removes visual cues (lip reading, facial expression) the patient needs.", "Avoiding conversation compromises informed consent and patient education.", "Relying solely on family bypasses the patient's own understanding and autonomy."], "concept": "Nonverbal communication (eye contact, facing the patient) and appropriate accommodations are key strategies for patients with sensory impairments.", "formula": "", "id": 93, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Interpersonal Communication", "stem": "A pediatric patient is anxious and resistant to lying still for simulation. Which communication approach is most appropriate?", "choices": ["Proceed quickly without any explanation to minimize distress", "Sedate the child without physician involvement", "Use complex medical terminology to explain the procedure fully", "Use age-appropriate language, allow a caregiver present when possible, and consider play-based preparation techniques"], "correct": 3, "expl": ["Proceeding without explanation increases fear and reduces cooperation, and does not respect the child's need for understanding at their level.", "Sedation decisions require physician order and appropriate monitoring, not unilateral therapist action.", "Complex terminology is inappropriate and increases anxiety in a pediatric patient.", "Correct — age-appropriate communication, caregiver presence, and child-life/play-based preparation strategies reduce anxiety and improve cooperation in pediatric patients."], "concept": "Communication must be adapted to the patient's age, cognitive level, and emotional state — a core interpersonal communication competency.", "formula": "", "id": 94, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Interpersonal Communication", "stem": "A patient recently diagnosed with cancer says, \"If I just eat healthier and pray harder, maybe I won't need all this radiation.\" This statement reflects which stage of the grief response?", "choices": ["Acceptance", "Bargaining", "Denial", "Depression"], "correct": 1, "expl": ["Acceptance reflects calm acknowledgment of the situation, not attempts to avoid treatment through bargaining.", "Correct — bargaining involves attempting to negotiate a better outcome, often through promises or alternate behaviors, characteristic of this stage of grief.", "Denial involves disbelief or refusal to accept the diagnosis itself, not attempts to negotiate an alternate outcome.", "Depression presents with sadness, withdrawal, or hopelessness, not negotiation attempts."], "concept": "Recognizing bargaining (attempts to negotiate an alternative to the difficult reality) helps the therapist respond with empathy while still supporting adherence to the treatment plan.", "formula": "", "id": 95, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Interpersonal Communication", "stem": "A patient becomes withdrawn, tearful, and stops engaging in conversation during the final weeks of a long treatment course. This most likely reflects which stage of the grief response?", "choices": ["Denial", "Depression", "Bargaining", "Anger"], "correct": 1, "expl": ["Denial presents as disbelief, not overt sadness and withdrawal.", "Correct — depression in the grief response presents as sadness, withdrawal, and low engagement, and should prompt a supportive, empathetic response and possible referral to psychosocial support.", "Bargaining involves negotiation attempts, not withdrawal.", "Anger typically presents as hostility or irritability, not withdrawal and tearfulness."], "concept": "Recognize depression as a grief stage (distinct from a clinical depression diagnosis) and know when to involve supportive services such as social work or counseling.", "formula": "", "id": 96, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Interpersonal Communication", "stem": "A patient with mild cognitive impairment struggles to remember daily setup instructions. Which strategy would most improve understanding and compliance?", "choices": ["Avoid explaining anything to prevent confusion", "Give one long, detailed explanation only on day one", "Speak only to the accompanying caregiver", "Use simple, consistent, repeated instructions each visit, supplemented with written or visual aids"], "correct": 3, "expl": ["Avoiding explanation altogether fails to support the patient's autonomy and understanding to the extent possible.", "A single long explanation is unlikely to be retained by a patient with cognitive impairment.", "Bypassing the patient disregards their right to be informed, even with cognitive impairment, to the extent they are able to understand.", "Correct — simple, repeated, consistent instructions along with visual or written aids improve comprehension and retention for patients with cognitive impairment."], "concept": "Strategies to improve understanding must be tailored to physical, sensory, or cognitive impairments while still respecting patient dignity and involvement.", "formula": "", "id": 97, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Patient Education", "stem": "Prior to starting head and neck radiation therapy, which patient education point is most important regarding oral care?", "choices": ["Avoid brushing teeth entirely during treatment", "No special oral care is needed during treatment", "Oral care is only necessary after treatment ends", "Begin a dental evaluation and preventive oral hygiene regimen before treatment starts, due to risk of mucositis and osteoradionecrosis"], "correct": 3, "expl": ["Avoiding brushing increases infection and mucositis risk; gentle, consistent oral hygiene is instead recommended.", "Oral care is critically important given the high risk of complications in head and neck RT.", "Oral care must begin before and continue throughout treatment, not only afterward.", "Correct — pre-treatment dental evaluation and ongoing oral hygiene reduce the risk of severe mucositis and, particularly with mandible in the field, osteoradionecrosis."], "concept": "Head and neck RT carries unique risks (mucositis, xerostomia, osteoradionecrosis) requiring proactive, multidisciplinary patient education before treatment begins.", "formula": "", "id": 98, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Patient Education", "stem": "A patient asks why she is receiving MRI-based simulation in addition to CT simulation. What is the most accurate explanation?", "choices": ["MRI replaces the need for CT-based dose calculation entirely", "MRI is only used for insurance documentation purposes", "MRI offers superior soft-tissue contrast for target/organ delineation and is fused with the CT for planning, which still provides the electron density data for dose calculation", "MRI is used because CT cannot be performed on cancer patients"], "correct": 2, "expl": ["CT remains necessary for the electron density information used in dose calculation; MRI alone cannot fully replace it in most workflows.", "MRI has direct clinical value for target delineation, not merely billing purposes.", "Correct — MRI's superior soft-tissue contrast helps better delineate tumor and organs at risk, and it is typically fused (co-registered) with the planning CT, which still provides the density data for dose calculation.", "CT is routinely performed on cancer patients and is not contraindicated."], "concept": "Patient education about multi-modality imaging (CT + MRI +/- PET) should clarify each modality's role in accurate target definition and dose calculation.", "formula": "", "id": 99, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Patient Education", "stem": "Which instruction is most appropriate to give a patient regarding skin marks used for daily setup?", "choices": ["Wash them off daily and the therapist will redraw them each visit", "Cover the marks with heavy makeup to hide them", "Avoid scrubbing, harsh soaps, or removing the marks, and report any fading promptly so they can be reinforced", "The marks are optional and can be ignored if faded"], "correct": 2, "expl": ["Washing off marks daily is unnecessary and increases setup error risk if not properly redrawn.", "Makeup or lotion over marks can interfere with visibility and skin reactions; this is not appropriate instruction.", "Correct — patients should be instructed to protect skin marks from washing off and to notify staff if fading occurs, since these marks are essential for reproducible daily setup.", "Faded marks compromise setup accuracy and must be addressed promptly, not ignored."], "concept": "Treatment compliance instructions around skin marks/positioning are essential patient education topics directly tied to setup reproducibility and safety.", "formula": "", "id": 100, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Patient Education", "stem": "A patient asks whether receiving a diagnostic chest x-ray during her RT course will add significantly to her overall radiation dose. What is the most accurate response?", "choices": ["Diagnostic imaging doses are typically much lower than therapeutic doses and are considered separately from the treatment prescription", "Diagnostic imaging contributes an equal dose to therapeutic treatment", "Diagnostic imaging should always be avoided during a course of RT", "There is no way to estimate the difference in dose between imaging and treatment"], "correct": 0, "expl": ["Correct — diagnostic imaging doses (e.g., chest x-ray, routine CT) are orders of magnitude lower than therapeutic radiation doses, and this distinction is important patient education content when addressing dose-related questions.", "This significantly overstates diagnostic imaging dose relative to therapeutic dose.", "Diagnostic imaging is often clinically necessary during a course of treatment and is not categorically avoided.", "Approximate relative dose magnitudes are well established and can be communicated to patients."], "concept": "Patients often confuse diagnostic and therapeutic radiation doses; clear, accurate patient education distinguishes the two, which differ by orders of magnitude.", "formula": "", "id": 101, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Support Services", "stem": "A patient undergoing treatment expresses significant financial stress about missing work for daily appointments. Which support service referral is most appropriate?", "choices": ["Dietitian", "Clergy", "Social services/social work", "Hospice"], "correct": 2, "expl": ["A dietitian addresses nutrition concerns, not financial stress.", "Clergy addresses spiritual/emotional support, not financial resource navigation specifically.", "Correct — a social worker can assist with resources for financial strain, transportation, and navigating work/appointment conflicts.", "Hospice addresses end-of-life care, not financial/logistical stress during active treatment."], "concept": "Know which support service best matches a patient's specific need: social work (financial/logistics/psychosocial), dietitian (nutrition), clergy (spiritual), hospice (end-of-life).", "formula": "", "id": 102, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Support Services", "stem": "A terminally ill patient nearing the end of a palliative treatment course expresses a wish to focus only on comfort at home rather than continue aggressive interventions. Which referral is most appropriate?", "choices": ["Physical therapy", "Clinical trial coordinator", "Occupational therapy for return to work", "Hospice"], "correct": 3, "expl": ["Physical therapy does not address the patient's stated goal of comfort-focused end-of-life care.", "Clinical trial referral is inconsistent with a patient choosing comfort-focused care over aggressive intervention.", "Return-to-work rehabilitation is not aligned with a terminal, comfort-focused care goal.", "Correct — hospice provides comprehensive comfort-focused, end-of-life care aligned with the patient's stated goals."], "concept": "Recognizing when a patient's goals shift toward comfort-focused care and connecting them to hospice is an important support-services competency.", "formula": "", "id": 103, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Ergonomics/Monitoring", "stem": "When using a Hoyer lift to transfer a non-ambulatory patient, which practice is essential for patient safety?", "choices": ["Move the lift quickly to minimize time spent transferring", "Use the lift only for patients who can bear some weight", "Skip checking sling attachment points if the patient is in a hurry", "Ensure the sling is properly positioned and secured before lifting, and move slowly and smoothly"], "correct": 3, "expl": ["Speed should never be prioritized over verifying safe, secure attachment.", "Hoyer lifts are specifically indicated for patients who cannot bear weight or assist with transfer.", "Skipping safety checks under any circumstance risks serious patient injury.", "Correct — verifying proper sling placement and secure attachment before lifting, then moving slowly and smoothly, prevents falls and injury during mechanical transfers."], "concept": "Mechanical transfer devices (Hoyer lift, transfer board, gait belt) each have specific safety-check procedures that must never be skipped regardless of time pressure.", "formula": "", "id": 104, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Ergonomics/Monitoring", "stem": "A patient with an indwelling urinary catheter is being positioned for treatment. Which precaution is most important?", "choices": ["Disconnect the catheter bag prior to positioning for convenience", "Ensure the collection bag remains below the level of the bladder and tubing is not kinked or pulled", "Clamp the catheter during treatment to prevent leakage", "No special precautions are needed"], "correct": 1, "expl": ["Disconnecting the closed drainage system increases infection risk and is not appropriate for routine positioning.", "Correct — keeping the bag below bladder level prevents retrograde urine flow and infection, and avoiding kinking maintains proper drainage during positioning.", "Clamping an indwelling catheter is not standard practice and can cause bladder distension/injury.", "Catheter management requires specific precautions to prevent infection and mechanical injury during setup."], "concept": "Managing medical equipment (catheters, tubes, infusion lines) during positioning requires attention to infection control and mechanical safety principles.", "formula": "", "id": 105, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Ergonomics/Monitoring", "stem": "During daily setup, the therapist notes the patient's weight has dropped significantly since simulation. What is the most appropriate action?", "choices": ["Ignore the change since weight does not affect treatment", "Document the change and notify the radiation oncologist, as significant weight loss may affect setup reproducibility and dose distribution", "Automatically increase the prescribed dose to compensate", "Discontinue treatment permanently without physician input"], "correct": 1, "expl": ["Weight change can significantly affect anatomy, immobilization fit, and dose distribution, and cannot be ignored.", "Correct — significant weight loss can alter external contour and internal anatomy, potentially requiring re-simulation or plan adaptation; this must be documented and reported to the physician.", "Dose adjustments are a physician decision based on clinical assessment, not an automatic therapist action.", "Discontinuing treatment is not an appropriate unilateral action; physician evaluation is required first."], "concept": "Ongoing patient monitoring (weight, vital signs, symptoms) during a treatment course can reveal changes requiring physician evaluation and possible replanning.", "formula": "", "id": 106, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Ergonomics/Monitoring", "stem": "A patient reports new-onset confusion and slurred speech during a treatment visit. This should raise concern for which type of medical emergency?", "choices": ["Normal treatment side effect requiring no escalation", "Dehydration only, treat with oral fluids and continue", "Simple fatigue from treatment, no action needed", "Possible stroke or acute neurologic event requiring immediate emergency evaluation"], "correct": 3, "expl": ["These symptoms are not an expected/normal treatment side effect and warrant urgent workup.", "While dehydration can cause some symptoms, new focal neurologic signs require urgent evaluation to rule out a more serious, time-sensitive cause before assuming a benign etiology.", "Attributing new focal neurologic symptoms to fatigue risks missing a time-sensitive emergency.", "Correct — new confusion and slurred speech are signs of a possible acute neurologic event (e.g., stroke), which is time-critical and requires immediate emergency evaluation."], "concept": "Recognizing signs and symptoms of an evolving medical emergency (motor control or cognitive changes) and escalating immediately is a critical patient-monitoring responsibility.", "formula": "", "id": 107, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Medical Emergencies", "stem": "A patient with known diabetes appears suddenly diaphoretic, shaky, and confused during a treatment visit. What is the most likely cause and appropriate action?", "choices": ["Hyperglycemia; administer insulin immediately", "Hypoglycemia; check blood glucose if possible and provide a fast-acting source of sugar per protocol, and notify appropriate staff", "Normal anxiety; no action needed", "Anaphylaxis; administer epinephrine"], "correct": 1, "expl": ["Diaphoresis, shakiness, and confusion are classic signs of hypoglycemia, not hyperglycemia, and insulin would worsen a low blood sugar emergency.", "Correct — these are classic hypoglycemia symptoms; the appropriate response includes checking glucose if possible, providing fast-acting sugar per protocol, and escalating to emergency/medical staff.", "These are signs of a genuine metabolic emergency, not simple anxiety, and require prompt intervention.", "There is no indication of an allergic reaction (hives, airway compromise) here; epinephrine is not indicated for hypoglycemia."], "concept": "Recognize diabetic emergencies: hypoglycemia (diaphoresis, shakiness, confusion, rapid onset) vs. hyperglycemia (gradual onset, excessive thirst/urination) — response differs accordingly.", "formula": "", "id": 108, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Medical Emergencies", "stem": "A patient begins having a generalized seizure during simulation. What is the therapist's most appropriate immediate action?", "choices": ["Leave the room until the seizure stops on its own", "Restrain the patient's limbs to stop the movements", "Place an object in the patient's mouth to prevent tongue biting", "Protect the patient from injury (clear the area, cushion the head), time the seizure, and call for emergency assistance"], "correct": 3, "expl": ["The patient should not be left unattended during a seizure; the therapist should stay to protect and monitor the patient while help is summoned.", "Restraining limbs during a seizure can cause injury and does not stop the seizure.", "Placing objects in the mouth during a seizure is outdated and dangerous, risking airway obstruction or injury.", "Correct — protecting the patient from injury, timing the event, and calling for emergency assistance is the appropriate first response to an active seizure."], "concept": "Seizure first aid focuses on protecting the patient from injury and prompt notification of emergency personnel — a foundational medical emergency response.", "formula": "", "id": 109, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Infection Control", "stem": "Which represents an example of the portal of exit in the chain of infection for a patient with a respiratory infection?", "choices": ["Respiratory secretions expelled by coughing", "The air conditioning system", "The treatment couch surface", "The therapist's hands"], "correct": 0, "expl": ["Correct — the portal of exit is the route by which the pathogen leaves the reservoir (infected patient); for a respiratory infection, this is respiratory secretions expelled through coughing/sneezing.", "The ventilation system could be involved in airborne transmission but is not the portal of exit from the patient.", "The couch surface could become a fomite (vehicle-borne transmission), not the portal of exit itself.", "The therapist's hands could serve as a mode of transmission (indirect contact), not the portal of exit from the infected patient."], "concept": "Understanding each specific link in the chain of infection (pathogen, reservoir, portal of exit, mode of transmission, portal of entry, susceptible host) helps target the correct infection control intervention.", "formula": "", "id": 110, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Infection Control", "stem": "Standard precautions, applied to all patients regardless of known infection status, include which of the following?", "choices": ["Airborne isolation for every patient", "No precautions are needed for asymptomatic patients", "N95 respirator use for every single patient interaction", "Hand hygiene and use of personal protective equipment when contact with blood or body fluids is anticipated"], "correct": 3, "expl": ["Airborne isolation is a transmission-based precaution used for specific known or suspected airborne pathogens, not universally.", "Standard precautions apply to all patients regardless of apparent infection status, since not all infections are symptomatic or known.", "N95 use is reserved for airborne precautions, not standard precautions applied to every patient.", "Correct — standard precautions (hand hygiene, PPE when indicated, safe handling of contaminated equipment/materials) apply universally to all patients, per CDC guidelines."], "concept": "CDC Standard Precautions form the baseline infection control practice for every patient encounter, supplemented by transmission-based precautions when specific pathogens are known or suspected.", "formula": "", "id": 111, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Infection Control", "stem": "A patient is on contact precautions for a multidrug-resistant organism. Which PPE is minimally required when providing direct care?", "choices": ["No PPE is required beyond hand hygiene", "N95 respirator only", "Full positive-pressure suit", "Gown and gloves"], "correct": 3, "expl": ["PPE beyond hand hygiene is specifically required for contact precautions.", "N95 respirators are for airborne precautions, not contact precautions.", "A full positive-pressure suit is excessive and not indicated for standard contact precautions.", "Correct — contact precautions require gown and gloves for direct patient contact to prevent transmission via direct or indirect contact with contaminated surfaces/secretions."], "concept": "Match PPE requirements to precaution type: contact = gown/gloves; droplet = surgical mask (+ eye protection as needed); airborne = N95/PAPR.", "formula": "", "id": 112, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Infection Control", "stem": "Which of the following is an example of an indirect, vehicle-borne mode of disease transmission?", "choices": ["Direct skin-to-skin contact", "A pathogen transmitted via a contaminated treatment table surface (fomite)", "A mosquito transmitting a pathogen", "A patient sneezing directly onto another person"], "correct": 1, "expl": ["Skin-to-skin contact is direct contact transmission, not indirect vehicle-borne transmission.", "Correct — vehicle-borne (fomite) transmission occurs when a contaminated inanimate object, like a treatment table, transfers the pathogen to a new host.", "A mosquito represents vector-borne (biological) transmission, a different indirect category.", "Direct sneezing onto another person is direct droplet transmission, not indirect vehicle-borne."], "concept": "Distinguish transmission modes: direct (droplet, direct contact) vs. indirect (vehicle-borne/fomite, vector-borne, airborne) — important for selecting appropriate precautions.", "formula": "", "id": 113, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Infection Control", "stem": "Neutropenic (reverse) isolation precautions are implemented primarily to:", "choices": ["Prevent damage to hospital equipment", "Protect staff from the patient's infection", "Satisfy billing documentation requirements", "Protect the immunocompromised patient from acquiring infections from their environment or caregivers"], "correct": 3, "expl": ["Equipment protection is not the purpose of reverse isolation.", "Standard/contact/droplet/airborne precautions protect staff and others from a patient's infection; reverse isolation is the opposite goal.", "Reverse isolation is a clinical safety measure, not a billing requirement.", "Correct — neutropenic precautions protect a patient with a severely weakened immune system (e.g., from chemotherapy) from acquiring infections from their surroundings or caregivers."], "concept": "Neutropenic/reverse isolation flips the usual direction of infection control — protecting a vulnerable patient from external pathogens rather than protecting others from the patient.", "formula": "", "id": 114, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Handling Hazardous Material", "stem": "A chemotherapy spill occurs in the treatment area. What is the most appropriate immediate action?", "choices": ["Follow the institution's hazardous spill protocol using appropriate PPE and designated spill kit, then dispose of materials per hazardous waste procedures", "Wipe it up with a regular paper towel and dispose of it in standard trash", "Ignore the spill if it appears to have already dried", "Use bare hands to clean it quickly"], "correct": 0, "expl": ["Correct — chemotherapy spills require use of a designated spill kit, appropriate PPE, and hazardous waste disposal procedures per institutional protocol and safety data sheet guidance.", "Chemotherapy agents are cytotoxic and hazardous; standard cleaning materials and disposal are inadequate and unsafe.", "Dried hazardous material can still pose exposure risk and must be properly cleaned per protocol.", "Bare-hand contact with cytotoxic chemotherapy agents poses a significant occupational exposure risk."], "concept": "Hazardous material handling (chemicals, chemotherapy agents, certain metals) requires specific protocols, PPE, and safety data sheet (SDS) guidance — distinct from routine cleaning.", "formula": "", "id": 115, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Handling Hazardous Material", "stem": "Which resource provides detailed information on the hazards, handling, and emergency measures for a specific hazardous chemical used in the department?", "choices": ["The ARRT Standards of Ethics", "The safety data sheet (SDS)", "The treatment planning system user manual", "The patient's medical record"], "correct": 1, "expl": ["The ARRT Standards of Ethics addresses professional conduct, not chemical hazard information.", "Correct — the safety data sheet (SDS, formerly MSDS) provides comprehensive hazard, handling, storage, and emergency response information for a specific hazardous material.", "The planning system manual addresses software operation, not chemical hazard information.", "The medical record contains patient clinical information, not chemical hazard data."], "concept": "Safety data sheets are the standard reference for hazardous material information in any clinical or industrial setting, including radiation therapy departments.", "formula": "", "id": 116, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Handling Hazardous Material", "stem": "Cerrobend (block alloy) used for custom shielding blocks contains which type of hazardous component requiring careful handling?", "choices": ["Heavy metals (e.g., bismuth, lead, tin, cadmium)", "Chemotherapy residue", "Iodine-based contrast", "Radioactive isotopes"], "correct": 0, "expl": ["Correct — cerrobend (block alloy) is typically composed of heavy metals such as bismuth, lead, tin, and cadmium, requiring appropriate ventilation and handling precautions, especially when melted.", "Cerrobend blocks are not associated with chemotherapy handling.", "Cerrobend is unrelated to iodinated contrast media.", "Cerrobend itself is not a radioactive material; the hazard relates to heavy metal exposure, particularly fumes during melting."], "concept": "Metals used in shielding block fabrication (block alloy) carry their own occupational hazard/handling considerations distinct from radiation safety.", "formula": "", "id": 117, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Pharmacology", "stem": "Which type of iodinated contrast media is generally associated with a lower risk of adverse reaction?", "choices": ["Barium-based contrast for IV use", "High-osmolar ionic contrast", "Low-osmolar non-ionic contrast", "Any contrast is equally low-risk"], "correct": 2, "expl": ["Barium is used orally/rectally for GI imaging, not administered intravenously.", "High-osmolar ionic contrast is associated with a higher rate of adverse reactions compared to non-ionic formulations.", "Correct — low-osmolar, non-ionic iodinated contrast media are associated with a lower incidence of adverse reactions compared to older high-osmolar ionic agents.", "Reaction risk varies meaningfully by contrast type and patient risk factors, not equally low across all agents."], "concept": "Know general contrast media properties: ionic vs. non-ionic and osmolarity affect reaction risk, relevant to patient safety counseling and monitoring.", "formula": "", "id": 118, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Pharmacology", "stem": "Barium sulfate contrast is contraindicated in which clinical scenario?", "choices": ["Standard pelvic simulation with no GI concerns", "Routine oral GI tract visualization", "Screening imaging in a healthy patient", "Suspected bowel perforation"], "correct": 3, "expl": ["There is no specific contraindication in this scenario.", "Barium is the standard agent for routine GI visualization when no contraindication exists.", "Barium is commonly used safely for GI imaging in patients without contraindications.", "Correct — barium sulfate is contraindicated with suspected bowel perforation because leakage into th
