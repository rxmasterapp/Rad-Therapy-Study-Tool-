<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RT Boards Prep — ARRT Radiation Therapy Registry Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pink-bg:#FDF3F6;
  --pink-bg-deep:#FBE7EE;
  --card:#FFFFFF;
  --border:#F0D5E1;
  --accent:#C1447A;
  --accent-dark:#9E3564;
  --accent-light:#F3D9E4;
  --ink:#2B2530;
  --muted:#8B6B78;
  --success:#1E8E5A;
  --success-bg:#E6F7EF;
  --danger:#C43D4B;
  --danger-bg:#FCEAEC;
  --warn:#B8791A;
  --warn-bg:#FBF1DE;
  --flag:#D97706;
  --radius:14px;
  --font-display:'Fraunces',Georgia,serif;
  --font-body:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--pink-bg);
  color:var(--ink);
  font-family:var(--font-body);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
::selection{background:var(--accent-light);}

/* ---------- App shell ---------- */
#app{display:flex;flex-direction:column;min-height:100vh;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;background:var(--card);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;
}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer;}
.brand-mark{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent-dark));
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;
  font-family:var(--font-mono);
}
.brand-text{font-family:var(--font-display);font-weight:600;font-size:19px;letter-spacing:-.01em;}
.brand-sub{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:-2px;}
.topbar-actions{display:flex;gap:10px;align-items:center;}
.pill{
  font-size:12px;padding:5px 11px;border-radius:999px;background:var(--pink-bg-deep);
  color:var(--accent-dark);font-weight:600;border:1px solid var(--border);
}
.btn{
  border:1px solid var(--border);background:var(--card);color:var(--ink);
  padding:9px 16px;border-radius:10px;font-size:14px;font-weight:600;transition:.15s;
}
.btn:hover{border-color:var(--accent);color:var(--accent-dark);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:var(--accent-dark);border-color:var(--accent-dark);color:#fff;}
.btn-danger{color:var(--danger);border-color:var(--danger-bg);}
.btn-danger:hover{background:var(--danger-bg);border-color:var(--danger);}
.btn-sm{padding:6px 12px;font-size:12.5px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

main{flex:1;width:100%;}
.container{max-width:1180px;margin:0 auto;padding:28px 24px 60px;}

/* ---------- Dashboard ---------- */
.hero{
  background:linear-gradient(135deg,var(--pink-bg-deep),var(--pink-bg));
  border:1px solid var(--border);border-radius:20px;padding:32px 34px;margin-bottom:28px;
  display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap;
}
.hero h1{font-family:var(--font-display);font-size:30px;margin:0 0 8px;letter-spacing:-.01em;}
.hero p{margin:0;color:var(--muted);font-size:14.5px;max-width:480px;}
.hero-stats{display:flex;gap:22px;}
.hero-stat{text-align:center;}
.hero-stat .num{font-family:var(--font-mono);font-size:26px;font-weight:600;color:var(--accent-dark);}
.hero-stat .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}

.section-title{font-family:var(--font-display);font-size:19px;margin:30px 0 14px;display:flex;align-items:center;gap:10px;}
.section-title .count{font-family:var(--font-mono);font-size:12px;color:var(--muted);font-weight:400;}

.mode-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;}
.mode-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;transition:.15s;display:flex;flex-direction:column;gap:8px;
}
.mode-card:hover{border-color:var(--accent);box-shadow:0 6px 20px -8px rgba(193,68,122,.25);transform:translateY(-1px);}
.mode-card .icon{font-size:20px;}
.mode-card h3{margin:0;font-size:15.5px;font-family:var(--font-display);}
.mode-card p{margin:0;font-size:12.5px;color:var(--muted);line-height:1.5;flex:1;}
.mode-card .go{font-size:12px;font-weight:700;color:var(--accent-dark);}

.cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px;}
.cat-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;
  cursor:pointer;transition:.15s;
}
.cat-card:hover{border-color:var(--accent);box-shadow:0 6px 20px -8px rgba(193,68,122,.2);}
.cat-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.cat-card h4{margin:0;font-size:14.5px;font-family:var(--font-display);}
.cat-tag{font-family:var(--font-mono);font-size:10.5px;background:var(--accent-light);color:var(--accent-dark);padding:2px 7px;border-radius:6px;font-weight:600;}
.progress-track{height:7px;background:var(--pink-bg-deep);border-radius:99px;overflow:hidden;margin:9px 0 6px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-dark));border-radius:99px;}
.cat-meta{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);}

/* ---------- Stats dashboard ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:22px;}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
.stat-box .num{font-family:var(--font-mono);font-size:28px;font-weight:600;color:var(--accent-dark);}
.stat-box .lbl{font-size:12px;color:var(--muted);margin-top:2px;}
.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;}
@media(max-width:860px){.two-col{grid-template-columns:1fr;}}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.panel h3{margin:0 0 14px;font-family:var(--font-display);font-size:16px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:12.5px;}
.bar-row .name{width:150px;flex-shrink:0;color:var(--ink);}
.bar-row .track{flex:1;height:9px;background:var(--pink-bg-deep);border-radius:99px;overflow:hidden;}
.bar-row .fill{height:100%;border-radius:99px;}
.bar-row .pct{width:38px;text-align:right;font-family:var(--font-mono);color:var(--muted);}
.history-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
.history-row:last-child{border-bottom:none;}
.badge{padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;}
.badge-good{background:var(--success-bg);color:var(--success);}
.badge-bad{background:var(--danger-bg);color:var(--danger);}
.empty-note{color:var(--muted);font-size:13px;padding:12px 0;}

/* ---------- Session view ---------- */
.session-wrap{display:grid;grid-template-columns:230px 1fr;min-height:calc(100vh - 60px);}
@media(max-width:860px){.session-wrap{grid-template-columns:1fr;}}
.sidebar{
  background:var(--card);border-right:1px solid var(--border);padding:18px 14px;
  position:sticky;top:60px;align-self:start;height:calc(100vh - 60px);overflow-y:auto;
}
.sidebar h4{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:16px 0 8px;}
.sidebar h4:first-child{margin-top:0;}
.navgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.navbtn{
  aspect-ratio:1;border-radius:7px;border:1.5px solid var(--border);background:var(--pink-bg);
  font-family:var(--font-mono);font-size:11.5px;font-weight:600;color:var(--muted);
  display:flex;align-items:center;justify-content:center;position:relative;
}
.navbtn.current{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-light);color:var(--accent-dark);}
.navbtn.answered-correct{background:var(--success-bg);border-color:var(--success);color:var(--success);}
.navbtn.answered-incorrect{background:var(--danger-bg);border-color:var(--danger);color:var(--danger);}
.navbtn.answered-plain{background:var(--accent-light);border-color:var(--accent);color:var(--accent-dark);}
.navbtn .flagdot{position:absolute;top:-3px;right:-3px;width:8px;height:8px;border-radius:50%;background:var(--flag);}
.legend{font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:5px;margin-top:12px;}
.legend span{display:flex;align-items:center;gap:6px;}
.dot{width:9px;height:9px;border-radius:3px;flex-shrink:0;}

.session-main{padding:20px 30px 60px;}
.session-topbar{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px;
}
.q-meta{display:flex;align-items:center;gap:14px;font-size:13px;color:var(--muted);}
.q-meta b{color:var(--ink);}
.timer{font-family:var(--font-mono);font-weight:700;font-size:15px;padding:6px 12px;border-radius:8px;background:var(--pink-bg-deep);color:var(--accent-dark);}
.timer.low{background:var(--danger-bg);color:var(--danger);}
.progress-bar-outer{height:6px;background:var(--pink-bg-deep);border-radius:99px;overflow:hidden;margin-bottom:20px;}
.progress-bar-inner{height:100%;background:var(--accent);border-radius:99px;transition:.2s;}

.qcard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px 28px;}
.qcard-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px;}
.qtag{font-family:var(--font-mono);font-size:11px;background:var(--accent-light);color:var(--accent-dark);padding:3px 9px;border-radius:6px;font-weight:600;}
.flagbtn{
  border:1px solid var(--border);background:var(--card);padding:6px 12px;border-radius:8px;font-size:12.5px;
  display:flex;align-items:center;gap:6px;color:var(--muted);font-weight:600;
}
.flagbtn.active{background:#FEF3E2;border-color:var(--flag);color:var(--flag);}
.stem{font-size:16.5px;line-height:1.6;margin-bottom:22px;}
.choices{display:flex;flex-direction:column;gap:10px;}
.choice{
  display:flex;gap:12px;align-items:flex-start;padding:13px 16px;border:1.5px solid var(--border);
  border-radius:11px;background:var(--pink-bg);transition:.12s;
}
.choice:not(.disabled):hover{border-color:var(--accent);background:#fff;}
.choice.disabled{cursor:default;}
.choice-letter{
  width:26px;height:26px;border-radius:50%;background:#fff;border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;font-size:12.5px;flex-shrink:0;
}
.choice-text{font-size:14.5px;line-height:1.5;padding-top:2px;}
.choice.selected{border-color:var(--accent);background:var(--accent-light);}
.choice.selected .choice-letter{background:var(--accent);color:#fff;border-color:var(--accent);}
.choice.correct-reveal{border-color:var(--success);background:var(--success-bg);}
.choice.correct-reveal .choice-letter{background:var(--success);color:#fff;border-color:var(--success);}
.choice.incorrect-reveal{border-color:var(--danger);background:var(--danger-bg);}
.choice.incorrect-reveal .choice-letter{background:var(--danger);color:#fff;border-color:var(--danger);}
.choice-input{display:none;}

.explain{margin-top:20px;padding-top:20px;border-top:1px dashed var(--border);}
.explain-banner{
  display:flex;align-items:center;gap:10px;padding:11px 15px;border-radius:10px;font-weight:700;font-size:14px;margin-bottom:16px;
}
.explain-banner.correct{background:var(--success-bg);color:var(--success);}
.explain-banner.incorrect{background:var(--danger-bg);color:var(--danger);}
.explain-block{margin-bottom:14px;}
.explain-block h5{margin:0 0 5px;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);}
.explain-block p{margin:0;font-size:14px;line-height:1.6;}
.choice-explain-list{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.ce-row{display:flex;gap:9px;font-size:13.5px;line-height:1.55;padding:9px 12px;border-radius:9px;background:var(--pink-bg);}
.ce-row.ce-correct{background:var(--success-bg);}
.ce-row .ce-letter{font-family:var(--font-mono);font-weight:700;flex-shrink:0;}
.formula-box{
  background:#fff;border:1px dashed var(--accent);border-radius:9px;padding:10px 14px;
  font-family:var(--font-mono);font-size:13.5px;color:var(--accent-dark);margin-top:6px;
}
.session-footer{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:10px;flex-wrap:wrap;}
.session-footer .right{display:flex;gap:10px;}
.submit-row{margin-top:22px;display:flex;justify-content:flex-end;}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(43,37,48,.45);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;
}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:16px;padding:26px;max-width:420px;width:100%;}
.modal h3{font-family:var(--font-display);margin:0 0 10px;font-size:19px;}
.modal p{color:var(--muted);font-size:14px;line-height:1.55;margin:0 0 20px;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;}

/* ---------- Summary screen ---------- */
.summary-hero{text-align:center;padding:20px 0 30px;}
.summary-score{font-family:var(--font-mono);font-size:56px;font-weight:700;color:var(--accent-dark);}
.summary-sub{color:var(--muted);font-size:14px;margin-top:4px;}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:24px 0;}
.summary-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;}
.summary-box .num{font-family:var(--font-mono);font-size:22px;font-weight:700;}
.summary-box .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}

.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.filter-chip{
  border:1px solid var(--border);background:var(--card);padding:6px 14px;border-radius:999px;font-size:12.5px;font-weight:600;color:var(--muted);
}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}

.hidden{display:none !important;}
.toggle-row{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);font-weight:600;}
.switch{position:relative;width:38px;height:22px;background:var(--border);border-radius:99px;cursor:pointer;flex-shrink:0;transition:.15s;}
.switch.on{background:var(--accent);}
.switch::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.15s;}
.switch.on::after{left:18px;}
footer.appfoot{text-align:center;padding:20px;color:var(--muted);font-size:12px;}

/* ---------- Mobile responsiveness ---------- */
html{-webkit-text-size-adjust:100%;}
html,body{overflow-x:hidden;}
button,.choice,.navbtn,.filter-chip,.switch,.flagbtn,.cat-card,.mode-card{-webkit-tap-highlight-color:transparent;}
img,svg{max-width:100%;}
.stem,.formula-box,.ce-row,.explain-block p,.hero p{overflow-wrap:break-word;word-break:break-word;}

@media(max-width:640px){
  .topbar{padding:10px 14px;}
  .brand-text{font-size:16px;}
  .brand-sub{display:none;}
  .topbar-actions{gap:6px;}
  .pill{display:none;}
  .btn{padding:9px 12px;font-size:13px;min-height:40px;}
  .btn-sm{padding:8px 10px;font-size:12px;min-height:36px;}

  .container{padding:16px 12px 44px;}

  .hero{flex-direction:column;align-items:flex-start;padding:20px 18px;border-radius:16px;gap:16px;margin-bottom:20px;}
  .hero h1{font-size:22px;}
  .hero p{font-size:13.5px;max-width:100%;}
  .hero-stats{width:100%;justify-content:space-between;gap:8px;}
  .hero-stat .num{font-size:20px;}
  .hero-stat .lbl{font-size:9.5px;}

  .section-title{font-size:16.5px;margin:22px 0 12px;}

  .mode-grid,.cat-grid{grid-template-columns:1fr;gap:10px;}
  .mode-card,.cat-card{padding:14px;}

  .stat-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .stat-box{padding:14px;}
  .stat-box .num{font-size:22px;}
  .panel{padding:14px;}
  .bar-row .name{width:88px;font-size:11.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .history-row{font-size:12px;}

  /* Session view: sidebar becomes a horizontally-scrollable strip above the question */
  .session-wrap{grid-template-columns:1fr;}
  .sidebar{
    position:sticky;top:52px;height:auto;max-height:none;
    border-right:none;border-bottom:1px solid var(--border);
    padding:10px 12px;overflow-y:visible;z-index:40;
  }
  .sidebar h4{display:none;}
  .navgrid{
    display:flex;grid-template-columns:none;gap:6px;overflow-x:auto;
    padding-bottom:6px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch;
  }
  .navbtn{aspect-ratio:auto;width:34px;height:34px;flex-shrink:0;scroll-snap-align:start;}
  .legend{flex-direction:row;flex-wrap:wrap;gap:10px;margin-top:10px;}

  .session-main{padding:14px 14px 40px;}
  .session-topbar{gap:8px;}
  .q-meta{font-size:12px;gap:10px;flex-wrap:wrap;}
  .timer{font-size:13.5px;padding:5px 10px;}

  .qcard{padding:18px 16px;border-radius:14px;}
  .qcard-head{flex-wrap:wrap;gap:8px;}
  .stem{font-size:15px;margin-bottom:18px;}
  .choice{padding:12px 13px;min-height:44px;}
  .choice-text{font-size:14px;}
  .choice-letter{width:24px;height:24px;font-size:11.5px;}
  .flagbtn{padding:8px 10px;min-height:40px;}

  .explain-block p{font-size:13.5px;}
  .ce-row{font-size:13px;padding:8px 10px;}
  .formula-box{font-size:12.5px;padding:9px 12px;}

  .session-footer{flex-direction:column;align-items:stretch;gap:8px;}
  .session-footer .right{width:100%;gap:8px;}
  .session-footer .right .btn{flex:1;}
  .submit-row{justify-content:stretch;}
  .submit-row .btn{width:100%;}

  .modal{padding:20px;border-radius:14px;}
  .modal-actions{flex-direction:column-reverse;gap:8px;}
  .modal-actions .btn{width:100%;}

  .summary-score{font-size:42px;}
  .summary-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .summary-box{padding:12px;}

  .filter-row{gap:6px;}
  .filter-chip{padding:6px 11px;font-size:11.5px;}
}

@media(max-width:380px){
  .hero-stats{gap:4px;}
  .hero-stat .num{font-size:17px;}
  .stat-grid,.summary-grid{grid-template-columns:1fr 1fr;}
  .navbtn{width:32px;height:32px;}
}

@supports(padding:max(0px)){
  .container{padding-bottom:max(44px, env(safe-area-inset-bottom));}
  .topbar{padding-top:max(10px, env(safe-area-inset-top));}
}
</style>
</head>
<body>
<div id="app"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBody"></div>
</div>

<script id="question-data" type="application/json">[{"cat": "Patient Interactions and Management", "sub": "Ethical/Legal", "stem": "A cognitively intact adult patient with a treatable but non-curable lung cancer refuses her scheduled fraction after learning of a new side effect. She understands the risks of refusing. What is the therapist's most appropriate action?", "choices": ["Ask a family member to authorize treatment on the patient's behalf", "Document the refusal, notify the radiation oncologist, and respect the patient's right to refuse", "Convince the patient using fear of tumor progression until she agrees to treatment", "Administer the treatment anyway since it was already prescribed by the radiation oncologist"], "correct": 1, "expl": ["Incorrect — a competent adult's own wishes control; family cannot override a capable patient's decision.", "Correct — a competent patient has the legal and ethical right to refuse treatment after being informed of consequences; the therapist documents and notifies the physician.", "Incorrect — coercion violates informed consent and patient autonomy.", "Incorrect — treating a competent adult against her informed refusal is battery, regardless of the prescription."], "concept": "Patient autonomy and informed consent take precedence for a competent adult; unwanted treatment constitutes battery.", "formula": "", "id": 1, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Ethical/Legal", "stem": "Which legal doctrine holds an employer (such as a hospital) liable for the negligent acts of an employee (such as a radiation therapist) performed within the scope of employment?", "choices": ["Res ipsa loquitur", "Respondeat superior", "Beneficence", "Informed consent"], "correct": 1, "expl": ["Incorrect — res ipsa loquitur (\"the thing speaks for itself\") applies when negligence is inferred from the nature of an injury alone.", "Correct — respondeat superior (\"let the master answer\") makes the employer vicariously liable for employee negligence within the scope of employment.", "Incorrect — beneficence is an ethical principle (acting for the patient's good), not a legal liability doctrine.", "Incorrect — informed consent is a patient-rights doctrine, not a liability doctrine."], "concept": "Respondeat superior = employer liability for employee negligence on the job; distinguish from res ipsa loquitur, which concerns inference of negligence from an obvious error (e.g., wrong-site treatment).", "formula": "", "id": 2, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Ethical/Legal", "stem": "A patient tells the therapist she does not want her cancer diagnosis discussed in front of her adult son, who is present at every visit. The therapist proceeds to summarize her diagnosis and prognosis in front of the son at the console. This is a violation of which patient right?", "choices": ["Beneficence", "Respondeat superior", "Confidentiality (HIPAA)", "Non-maleficence"], "correct": 2, "expl": ["Incorrect — beneficence refers to acting in the patient's best interest, not privacy of information.", "Incorrect — respondeat superior is a liability doctrine unrelated to privacy.", "Correct — disclosing protected health information to a third party against the patient's wishes violates HIPAA confidentiality.", "Incorrect — non-maleficence means avoiding harm; while related, the specific right violated here is informational privacy."], "concept": "HIPAA protects a patient's right to control who receives their health information; explicit patient wishes about disclosure must be honored even for family present at visits.", "formula": "", "id": 3, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Interpersonal Communication", "stem": "A patient who recently emigrated and has limited English proficiency is scheduled for CT simulation. Her adult daughter offers to interpret. What is the most appropriate action?", "choices": ["Postpone simulation indefinitely until the patient learns English", "Proceed with simple hand gestures and written English instructions only", "Use a qualified medical interpreter (in-person or via phone/video service) whenever possible", "Accept the daughter's help since she is fluent and available immediately"], "correct": 2, "expl": ["Incorrect — care should not be indefinitely delayed when interpreter services are available.", "Incorrect — gestures and written English are unreliable for informed consent and safety instructions in a non-English speaker.", "Correct — a qualified medical interpreter ensures accurate, unbiased communication and protects informed consent and confidentiality.", "Incorrect — family members may unintentionally mistranslate sensitive medical or consent information and compromise confidentiality."], "concept": "Best practice and many institutional/legal standards require professional interpreter services rather than family members for medical communication.", "formula": "", "id": 4, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Interpersonal Communication", "stem": "A patient recently diagnosed with a terminal prognosis becomes angry and lashes out at the therapist during simulation, saying the appointment is a waste of time. Which stage of grief does this behavior most likely reflect?", "choices": ["Denial", "Acceptance", "Bargaining", "Anger"], "correct": 3, "expl": ["Incorrect — denial typically presents as disbelief or refusal to acknowledge the diagnosis, not hostility.", "Incorrect — acceptance is characterized by calm acknowledgment of the situation, not hostility.", "Incorrect — bargaining involves attempts to negotiate more time or a better outcome, often with a higher power.", "Correct — anger, including irritability and hostility directed at caregivers, is a recognized stage of the grief response (Kübler-Ross model)."], "concept": "Recognizing stages of grief (denial, anger, bargaining, depression, acceptance) helps the therapist respond with empathy rather than personalize the patient's reaction.", "formula": "", "id": 5, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Patient Education", "stem": "Before a patient's first fraction of pelvic external beam radiation therapy, which instruction is most important to include regarding treatment compliance?", "choices": ["Maintain a consistent bladder- and bowel-filling protocol as instructed for daily setup reproducibility", "Discontinue all home medications the day of simulation", "Avoid all physical activity for the duration of treatment", "Increase fiber intake immediately to prevent constipation from pain medication"], "correct": 0, "expl": ["Correct — consistent bladder/bowel filling reproduces the anatomy seen at simulation, critical for accurate daily pelvic setup and target coverage.", "Incorrect — patients should not stop medications without physician guidance; this is unsafe advice.", "Incorrect — complete activity restriction is not standard and is not related to treatment compliance for setup.", "Incorrect — dietary fiber changes are not the primary daily compliance instruction and may not be indicated for every patient."], "concept": "Reproducible internal anatomy (bladder/rectal filling) directly affects daily setup accuracy and PTV coverage in pelvic RT — a key patient education/compliance point.", "formula": "", "id": 6, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Ergonomics/Monitoring", "stem": "When transferring a patient with significant lower-extremity weakness from a wheelchair to the treatment couch, which technique best reflects proper body mechanics for the therapist?", "choices": ["Twist the torso while lifting to reach the couch more quickly", "Lift alone whenever possible to avoid delaying the patient's treatment", "Keep the load close to the body, bend at the knees, and use leg muscles to lift", "Bend at the waist and lift with the back to save time"], "correct": 2, "expl": ["Incorrect — twisting while bearing a load significantly increases the risk of back injury.", "Incorrect — assistive devices or a second staff member should be used for patients who cannot bear weight, per ergonomic and safety standards.", "Correct — keeping the load close and lifting with the legs (not the back) is core proper body mechanics, reducing injury risk to both patient and therapist.", "Incorrect — bending and lifting with the back increases risk of spinal injury to the therapist."], "concept": "Proper body mechanics (wide base, bend knees, keep load close, avoid twisting) protect both patient and staff during transfers; use ergonomic devices (gait belt, Hoyer lift) as needed.", "formula": "", "id": 7, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Ergonomics/Monitoring", "stem": "A patient undergoing daily treatment reports new onset unilateral leg swelling and calf tenderness. What is the therapist's most appropriate immediate action?", "choices": ["Apply a warm compress to the leg to relieve discomfort before treatment", "Proceed with treatment and reassess symptoms at the next visit", "Instruct the patient to elevate the leg and continue as scheduled without notifying anyone", "Notify the radiation oncologist promptly, as this may indicate deep vein thrombosis"], "correct": 3, "expl": ["Incorrect — applying heat could dislodge a clot if DVT is present; this is not appropriate first action and delays proper evaluation.", "Incorrect — new unilateral leg swelling with tenderness is a potential medical emergency (DVT) requiring prompt physician notification, not routine deferral.", "Incorrect — self-management advice without physician evaluation risks missing a serious complication.", "Correct — unilateral calf swelling and tenderness are classic signs of DVT, a potentially life-threatening condition (risk of pulmonary embolism) requiring urgent physician notification."], "concept": "Recognizing signs/symptoms suggestive of medical emergencies (DVT, cardiac events, allergic reactions) and escalating promptly is a core patient-monitoring competency.", "formula": "", "id": 8, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Medical Emergencies", "stem": "During a treatment setup, a patient suddenly becomes unresponsive and is not breathing normally. What is the therapist's first action?", "choices": ["Move the patient to the CT simulator for imaging", "Call for emergency assistance/activate the emergency response system and begin CPR if trained and indicated", "Complete positioning the patient before calling for help", "Administer the patient's home medications from their chart"], "correct": 1, "expl": ["Incorrect — moving to imaging delays life-saving intervention and is inappropriate during a cardiac/respiratory emergency.", "Correct — activating the emergency response system and initiating CPR (if indicated and the therapist is trained) is the immediate priority for an unresponsive, non-breathing patient.", "Incorrect — patient safety takes priority over completing setup tasks in an emergency.", "Incorrect — administering medications is outside therapist scope and not the emergency priority; this is not an appropriate first response."], "concept": "Basic life support activation (call for help, begin CPR/AED as trained) is the immediate priority for any unresponsive, non-breathing patient.", "formula": "", "id": 9, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Medical Emergencies", "stem": "A patient reports itching, hives, and mild throat tightness shortly after receiving oral contrast for a CT simulation. This most likely represents which type of reaction?", "choices": ["A mild-to-moderate allergic (contrast) reaction", "A vasovagal response", "A cardiac arrhythmia", "Normal expected sensation from contrast"], "correct": 0, "expl": ["Correct — hives, itching, and throat tightness are classic signs of an allergic reaction to contrast media and require prompt recognition and physician/emergency response per protocol.", "Incorrect — vasovagal responses typically present with pallor, sweating, bradycardia, and hypotension, not hives/throat tightness.", "Incorrect — arrhythmia would present with cardiac symptoms (palpitations, chest pain), not hives.", "Incorrect — hives and throat tightness are not normal/expected effects and indicate a reaction requiring intervention."], "concept": "Recognize the spectrum of contrast reactions from mild (hives, itching) to severe (anaphylaxis, laryngeal edema) and respond per department emergency protocol and emergency medications.", "formula": "", "id": 10, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Infection Control", "stem": "Which is the correct order of the chain of infection?", "choices": ["Pathogen → reservoir → portal of exit → mode of transmission → portal of entry → susceptible host", "Pathogen → portal of entry → susceptible host → reservoir → portal of exit → mode of transmission", "Reservoir → susceptible host → pathogen → portal of exit → portal of entry → mode of transmission", "Susceptible host → pathogen → reservoir → mode of transmission → portal of exit → portal of entry"], "correct": 0, "expl": ["Correct — the chain of infection proceeds: pathogen (infectious agent) → reservoir → portal of exit → mode of transmission → portal of entry → susceptible host.", "Incorrect — this order skips reservoir and portal of exit before transmission.", "Incorrect — this order is out of sequence; portal of exit must precede transmission.", "Incorrect — susceptible host is the last link, not the first."], "concept": "Breaking any link in the chain (hand hygiene, PPE, isolation precautions) prevents infection transmission — foundational infection control concept.", "formula": "", "id": 11, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Infection Control", "stem": "A patient on airborne precautions for suspected active tuberculosis requires a CT simulation. Which action is most appropriate?", "choices": ["Have the patient wear a surgical mask during transport and use a properly ventilated/negative-pressure room if available; staff wear N95 respirators", "Transport the patient without a mask since the CT room has good ventilation", "Cancel the simulation until the patient's isolation status is lifted, regardless of clinical urgency", "Only don gloves; no other PPE is required for airborne pathogens"], "correct": 0, "expl": ["Correct — patient wears a surgical mask during transport, and staff use N95 (or higher) respiratory protection with negative-pressure room precautions for airborne pathogens like TB.", "Incorrect — omitting a mask during transport risks airborne pathogen spread.", "Incorrect — care should not be automatically cancelled; precautions can allow safe imaging when clinically necessary.", "Incorrect — gloves alone are insufficient for airborne precautions; respiratory protection is required."], "concept": "Transmission-based precautions (contact, droplet, airborne) each require specific PPE; airborne precautions require N95/PAPR respiratory protection, not just standard precautions.", "formula": "", "id": 12, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Pharmacology", "stem": "A patient with a documented creatinine of 2.4 mg/dL and reduced eGFR is scheduled for a contrast-enhanced CT simulation. What is the primary clinical concern?", "choices": ["Increased radiosensitivity of tumor tissue", "Increased risk of hyperglycemia", "Decreased risk of extravasation", "Increased risk of contrast-induced nephropathy"], "correct": 3, "expl": ["Incorrect — renal function does not alter tumor radiosensitivity.", "Incorrect — iodinated contrast is not directly linked to hyperglycemia risk; this is not the primary renal concern.", "Incorrect — renal function does not affect extravasation risk, which relates to IV technique and vessel integrity.", "Correct — impaired renal function (elevated creatinine, low eGFR) increases the risk of contrast-induced nephropathy from iodinated contrast media."], "concept": "Laboratory values (BUN, creatinine, eGFR) must be checked before iodinated contrast administration due to nephrotoxicity risk, especially in patients with renal impairment.", "formula": "", "id": 13, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Pharmacology", "stem": "A patient receiving IV contrast reports a burning sensation and visible swelling at the injection site during the injection. This most likely represents:", "choices": ["Extravasation/infiltration of contrast into surrounding tissue", "An anaphylactic reaction", "A normal, expected sensation from contrast injection", "Vasovagal syncope"], "correct": 0, "expl": ["Correct — localized swelling, pain, and burning at the injection site during contrast administration indicate extravasation/infiltration, a local complication requiring the injection be stopped and the site assessed/treated per protocol.", "Incorrect — anaphylaxis presents with systemic symptoms (hives, airway compromise, hypotension), not isolated site swelling.", "Incorrect — burning with visible swelling at the site is not a normal expected sensation.", "Incorrect — vasovagal syncope presents with pallor, diaphoresis, and fainting, not localized site swelling."], "concept": "Local contrast reactions (extravasation/infiltration, phlebitis) are distinct from systemic reactions and require immediate cessation of injection and site-specific management/documentation.", "formula": "", "id": 14, "catKey": "PC1"}, {"cat": "Patient and Medical Record Management", "sub": "Evaluation", "stem": "A patient's chart shows a rising PSA following prior definitive treatment for prostate cancer. This lab finding is most consistent with:", "choices": ["Radiation pneumonitis", "Acute renal failure", "Treatment-related anemia", "Possible biochemical recurrence of prostate cancer"], "correct": 3, "expl": ["Incorrect — pneumonitis is a pulmonary complication unrelated to PSA, which is prostate-specific.", "Incorrect — renal failure is assessed via creatinine/BUN/eGFR, not PSA.", "Incorrect — anemia would be reflected in CBC/hemoglobin values, not PSA.", "Correct — a rising PSA after definitive prostate cancer treatment is the classic marker for biochemical recurrence and prompts further workup."], "concept": "Recognize common tumor marker/lab associations: PSA (prostate), CBC (hematologic status), BUN/creatinine (renal function) — key to interpreting the medical record.", "formula": "", "id": 15, "catKey": "PC2"}, {"cat": "Patient and Medical Record Management", "sub": "Evaluation", "stem": "Which imaging modality is most useful for assessing metabolic activity and detecting distant metastatic disease prior to treatment planning?", "choices": ["Ultrasound", "MRI T1-weighted without contrast", "Plain radiograph", "PET/CT"], "correct": 3, "expl": ["Incorrect — ultrasound has limited utility for whole-body metastatic staging.", "Incorrect — non-contrast T1 MRI provides anatomic detail but not metabolic/functional information for staging.", "Incorrect — plain radiographs provide limited soft-tissue and metabolic information.", "Correct — PET/CT combines metabolic (FDG-avidity) and anatomic information, making it valuable for staging and detecting distant metastases."], "concept": "PET/CT's combination of functional (metabolic) and anatomic imaging makes it central to staging workups in oncology.", "formula": "", "id": 16, "catKey": "PC2"}, {"cat": "Patient and Medical Record Management", "sub": "Assessment", "stem": "A patient undergoing pelvic radiation develops persistent diarrhea and crampy abdominal pain. Which dietary modification is most appropriate to recommend, per physician/dietitian guidance?", "choices": ["Low-residue, low-fiber diet with adequate hydration", "High-fat diet", "Unrestricted dairy intake", "High-fiber, high-residue diet"], "correct": 0, "expl": ["Correct — a low-residue, low-fiber diet with good hydration is generally recommended to reduce bowel irritation and manage radiation-induced diarrhea, per dietary counseling guidelines.", "Incorrect — high-fat foods can exacerbate GI upset and diarrhea.", "Incorrect — many patients develop temporary lactose intolerance during pelvic RT; unrestricted dairy may worsen symptoms.", "Incorrect — high-fiber/high-residue foods can worsen radiation-induced enteritis symptoms like diarrhea and cramping."], "concept": "Radiation-induced GI side effects often respond to low-residue, low-fat, lactose-limited dietary modification, coordinated with a dietitian.", "formula": "", "id": 17, "catKey": "PC2"}, {"cat": "Patient and Medical Record Management", "sub": "Assessment", "stem": "A patient's weekly CBC during pelvic chemoradiation shows a significant drop in white blood cell count. What is the most likely clinical concern?", "choices": ["No clinical significance", "Improved treatment tolerance", "Increased risk of bleeding", "Increased risk of infection due to leukopenia/neutropenia"], "correct": 3, "expl": ["Incorrect — significant leukopenia is clinically significant and must be reported/monitored.", "Incorrect — a falling WBC reflects hematologic toxicity, not improved tolerance.", "Incorrect — bleeding risk relates to platelet count (thrombocytopenia), not WBC.", "Correct — a significant drop in WBC (leukopenia, especially neutropenia) increases infection risk and may require treatment modification or supportive care/reverse isolation precautions."], "concept": "Monitor CBC trends during concurrent chemoradiation: low WBC → infection risk, low platelets → bleeding risk, low hemoglobin → fatigue/tissue hypoxia (radioresistance).", "formula": "", "id": 18, "catKey": "PC2"}, {"cat": "Patient and Medical Record Management", "sub": "Documentation", "stem": "Which of the following must be included in the daily treatment record according to standard documentation requirements?", "choices": ["Monitor units, fraction number, elapsed days, and field/energy parameters delivered that day", "The patient's home address and insurance ID only", "Only the physician's signature, with no dosimetric details", "The patient's next scheduled appointment only"], "correct": 0, "expl": ["Correct — the treatment record must capture the dosimetric and delivery details for that fraction: monitor units, fraction number, elapsed days, energy, and field parameters, among other elements.", "Incorrect — demographic/insurance information is part of the record but not sufficient documentation of a treatment delivered.", "Incorrect — a signature alone without dosimetric details is inadequate documentation.", "Incorrect — scheduling information is administrative, not a required element of the dosimetric treatment record."], "concept": "The treatment record must be accurate, complete, and legible, documenting prescription, MU, dose (daily/accumulated), energy, date, fraction, elapsed days, field description, and setup instructions.", "formula": "", "id": 19, "catKey": "PC2"}, {"cat": "Patient and Medical Record Management", "sub": "Documentation", "stem": "A therapist notices the delivered treatment field does not match the physician's prescription for that day. This discrepancy is best classified and documented as a:", "choices": ["Routine variance requiring no action", "Normal daily variation", "Potential medical event requiring notification per institutional/regulatory reporting requirements", "Billing error only"], "correct": 2, "expl": ["Incorrect — a mismatch between delivered treatment and prescription is not routine and requires action.", "Incorrect — this is not normal variation; deviations from prescription require formal review.", "Correct — a significant deviation from the prescription may constitute a reportable medical event under NRC/state regulations and must be documented, investigated, and reported per policy.", "Incorrect — while billing may be affected, the primary concern is a treatment/safety error requiring formal reporting."], "concept": "Understand the concept and required documentation of medical events (deviations meeting regulatory thresholds) versus minor, non-reportable variances.", "formula": "", "id": 20, "catKey": "PC2"}, {"cat": "Patient and Medical Record Management", "sub": "Documentation", "stem": "Which term describes the professional and technical components that make up billing for a radiation therapy service?", "choices": ["CPT-specific coding rules", "Medical event classification", "HIPAA privacy elements", "Charge capture components"], "correct": 3, "expl": ["Incorrect — specific CPT codes are explicitly not covered content; the general concept is charge capture terminology.", "Incorrect — medical event classification concerns reportable treatment errors, not billing terminology.", "Incorrect — HIPAA privacy is a separate confidentiality concept, unrelated to billing components.", "Correct — charge capture refers to the general principles of documenting professional and technical components of billable services, procedures, and devices (specific CPT codes are not tested)."], "concept": "Know general charge capture concepts (professional vs. technical component, billable services/procedures/devices) without needing specific CPT codes.", "formula": "", "id": 21, "catKey": "PC2"}, {"cat": "Patient and Medical Record Management", "sub": "Evaluation", "stem": "A patient's history reveals a prior surgical resection and pathology report showing positive margins after lumpectomy for breast cancer. This information is most relevant to which planning decision?", "choices": ["Selection of contrast media type", "MRI safety screening", "Choice of immobilization device only", "Need for a tumor bed boost to the lumpectomy cavity"], "correct": 3, "expl": ["Incorrect — positive margins do not influence contrast media selection.", "Incorrect — margin status is unrelated to MRI safety screening.", "Incorrect — while immobilization matters for setup, the margin status is not the driver of device selection.", "Correct — positive margins after lumpectomy increase local recurrence risk and are a key factor supporting delivery of an additional boost dose to the tumor bed."], "concept": "Surgical/pathology history (margin status, nodal involvement) directly informs treatment volume and dose decisions such as boost fields.", "formula": "", "id": 22, "catKey": "PC2"}, {"cat": "Radiation Physics and Radiobiology", "sub": "Sources of Radiation", "stem": "Bremsstrahlung x-rays are produced by which interaction?", "choices": ["Annihilation of a positron and electron", "Deceleration of an electron in the electric field of a nucleus", "Absorption of a photon by the entire atom", "Ejection of an inner-shell electron by an incident electron"], "correct": 1, "expl": ["Incorrect — this describes pair production annihilation, unrelated to bremsstrahlung generation in an x-ray tube/linac target.", "Correct — bremsstrahlung (\"braking radiation\") x-rays result from deceleration/deflection of high-speed electrons in the strong electric field near a target nucleus, converting kinetic energy to photon energy.", "Incorrect — photoelectric absorption involves the whole-atom absorption of an incoming photon, not electron deceleration.", "Incorrect — this describes the mechanism for characteristic x-ray production, not bremsstrahlung."], "concept": "Bremsstrahlung = continuous spectrum x-ray production from electron deceleration near the nucleus; characteristic x-rays = discrete energies from inner-shell electron transitions.", "formula": "", "id": 23, "catKey": "S1"}, {"cat": "Radiation Physics and Radiobiology", "sub": "Principles of Physics", "stem": "According to the inverse square law, if the distance from a point radiation source is doubled, the intensity of radiation at the new distance is:", "choices": ["Doubled", "Unchanged", "Halved", "One-fourth of the original"], "correct": 3, "expl": ["Incorrect — doubling distance decreases, not increases, intensity.", "Incorrect — intensity is strongly distance-dependent for a point source.", "Incorrect — intensity falls off by the square of distance, not linearly.", "Correct — intensity is inversely proportional to the square of the distance (I ∝ 1/d²); doubling distance reduces intensity to 1/4 of the original."], "concept": "Inverse square law: I₁d₁² = I₂d₂² — fundamental to shielding, personnel protection distance, and SSD dose calculations.", "formula": "I₁d₁² = I₂d₂²", "id": 24, "catKey": "S1"}, {"cat": "Radiation Physics and Radiobiology", "sub": "Principles of Physics", "stem": "At megavoltage photon energies typically used in external beam radiation therapy, which photon interaction with matter predominates in soft tissue?", "choices": ["Coherent (Rayleigh) scattering", "Photoelectric effect", "Compton scattering", "Pair production"], "correct": 2, "expl": ["Incorrect — coherent scattering is a minor interaction with negligible energy transfer, not dominant at therapy energies.", "Incorrect — the photoelectric effect predominates at low (diagnostic-range) energies and in high-Z materials, not at megavoltage therapy energies in tissue.", "Correct — Compton scattering is the dominant interaction in soft tissue across the megavoltage therapeutic energy range (approximately 100 keV–10 MeV), and is independent of atomic number.", "Incorrect — pair production only occurs above 1.02 MeV and becomes significant only at very high energies (>10 MV), not the dominant interaction for typical therapy beams."], "concept": "Compton scattering dominates megavoltage photon therapy interactions in tissue; photoelectric effect dominates at low energy/high-Z (important for kV imaging and shielding).", "formula": "", "id": 25, "catKey": "S1"}, {"cat": "Radiation Physics and Radiobiology", "sub": "Biological Effects", "stem": "Which SI unit is used to express absorbed dose?", "choices": ["Sievert (Sv)", "Curie (Ci)", "Gray (Gy)", "Coulomb/kilogram (C/kg)"], "correct": 2, "expl": ["Incorrect — sievert measures dose equivalent, which accounts for radiation weighting factors, not raw absorbed dose.", "Incorrect — the curie is a non-SI unit of radioactivity (source activity), not absorbed dose.", "Correct — the gray (Gy), equal to 1 joule/kg, is the SI unit of absorbed dose, the primary unit used clinically for radiation therapy prescriptions.", "Incorrect — coulomb/kilogram measures exposure (ionization in air), not absorbed dose."], "concept": "Know unit distinctions: Gy = absorbed dose, Sv = dose equivalent/effective dose, C/kg = exposure, Bq (SI) = activity (curie is the older non-SI unit).", "formula": "", "id": 26, "catKey": "S1"}, {"cat": "Radiation Physics and Radiobiology", "sub": "Biological Effects", "stem": "Linear energy transfer (LET) describes:", "choices": ["The time interval between fractions", "The total dose delivered to a tumor over the entire treatment course", "The rate at which energy is deposited per unit path length as radiation travels through tissue", "The biological effectiveness of a radiation type relative to a reference radiation"], "correct": 2, "expl": ["Incorrect — this describes fractionation interval, unrelated to LET.", "Incorrect — this describes total/cumulative dose, not LET.", "Correct — LET is the amount of energy deposited per unit length of track as radiation traverses matter (e.g., keV/µm); high-LET radiation (protons, neutrons, alpha particles) deposits energy more densely than low-LET radiation (photons, electrons).", "Incorrect — this describes relative biological effectiveness (RBE), which is influenced by LET but is a distinct concept."], "concept": "LET (energy deposited per unit path length) directly influences RBE — high-LET radiation generally has higher biological effectiveness for the same physical dose.", "formula": "", "id": 27, "catKey": "S1"}, {"cat": "Radiation Physics and Radiobiology", "sub": "Biological Effects", "stem": "Which best describes the oxygen effect in radiobiology?", "choices": ["Hypoxic cells respond identically to oxygenated cells for high-LET radiation", "Well-oxygenated cells are more radiosensitive than hypoxic cells", "Oxygen has no impact on radiosensitivity", "Well-oxygenated cells are more resistant to radiation damage than hypoxic cells"], "correct": 1, "expl": ["Incorrect — the oxygen effect is diminished (OER approaches 1) for high-LET radiation, meaning hypoxic and oxygenated cells respond more similarly — but they are not identical, and this doesn't describe the oxygen effect definition.", "Correct — oxygen \"fixes\" free-radical damage to DNA, making well-oxygenated cells more radiosensitive than hypoxic cells (oxygen enhancement ratio, OER, typically 2.5–3 for low-LET radiation).", "Incorrect — oxygenation status significantly impacts radiosensitivity for low-LET radiation.", "Incorrect — this is the opposite of the true relationship; oxygen enhances, not diminishes, radiation damage."], "concept": "Hypoxic tumor cells are relatively radioresistant due to the oxygen effect — a key rationale for fractionation (reoxygenation) and radiosensitizers.", "formula": "", "id": 28, "catKey": "S1"}, {"cat": "Radiation Physics and Radiobiology", "sub": "Biological Effects", "stem": "A radiation worker receives a whole-body dose sufficient to cause bone marrow suppression as the dominant clinical syndrome, occurring roughly 2–6 weeks after exposure. This describes which acute radiation syndrome?", "choices": ["Central nervous system syndrome", "Cutaneous syndrome", "Gastrointestinal syndrome", "Hemopoietic syndrome"], "correct": 3, "expl": ["Incorrect — CNS syndrome occurs at very high doses (>50 Gy) with a very rapid onset (hours) and is rapidly fatal.", "Incorrect — cutaneous syndrome is not one of the three classic whole-body acute radiation syndrome categories (hemopoietic, GI, CNS).", "Incorrect — GI syndrome occurs at higher doses (~10 Gy+) with an earlier, more rapid onset (days) dominated by mucosal sloughing/diarrhea.", "Correct — hemopoietic syndrome results from lower whole-body doses (~1–10 Gy), presenting with bone marrow suppression (pancytopenia) typically over weeks, the least severe of the three classic ARS categories."], "concept": "Acute radiation syndrome severity/timeline scales with dose: hemopoietic (lowest dose, weeks) < GI (higher dose, days) < CNS (highest dose, hours) — a classic board concept.", "formula": "", "id": 29, "catKey": "S1"}, {"cat": "Radiation Physics and Radiobiology", "sub": "Radiation Tissue Tolerance", "stem": "TD5/5 refers to:", "choices": ["The dose delivering a 5% probability of severe complication within 5 years of treatment", "The tolerance dose for 5% of the treatment field area", "The total dose delivered over 5 fractions in 5 days", "A 5% weekly dose reduction schedule"], "correct": 0, "expl": ["Correct — TD5/5 is the whole-organ tolerance dose associated with a 5% risk of a severe complication within 5 years of treatment — a classic radiobiology tissue tolerance concept.", "Incorrect — TD5/5 refers to complication probability, not field area.", "Incorrect — this describes a fractionation schedule, unrelated to the TD5/5 definition.", "Incorrect — TD5/5 is not a dose-reduction schedule."], "concept": "TD5/5 and TD50/5 (50% complication risk at 5 years) describe organ-specific dose tolerance limits used in treatment planning to minimize late toxicity.", "formula": "", "id": 30, "catKey": "S1"}, {"cat": "Radiation Physics and Radiobiology", "sub": "Radiation Tissue Tolerance", "stem": "Which factor would most increase a patient's risk of radiation-induced normal tissue toxicity?", "choices": ["Larger fraction size (hypofractionation) to a critical structure without adjustment", "Use of a radioprotector agent", "Longer overall treatment time with standard fractionation", "Smaller treatment volume"], "correct": 0, "expl": ["Correct — larger fraction sizes increase the biological effect per fraction on late-responding normal tissues, increasing late toxicity risk if not properly accounted for in the treatment plan.", "Incorrect — radioprotectors are specifically used to reduce normal tissue toxicity.", "Incorrect — standard fractionation with typical overall treatment time is the baseline against which risk is compared, not an added risk factor.", "Incorrect — smaller treatment volumes generally reduce, not increase, normal tissue toxicity risk."], "concept": "Fractionation scheme, volume irradiated, and use of modifiers (radiosensitizers/radioprotectors) all affect the therapeutic ratio and normal tissue toxicity risk.", "formula": "", "id": 31, "catKey": "S1"}, {"cat": "Radiation Physics and Radiobiology", "sub": "Radiation Tissue Tolerance", "stem": "A patient with a cardiac pacemaker is scheduled for radiation therapy to a field near the device. Which is the most important consideration?", "choices": ["MRI-based simulation is contraindicated for all pacemaker patients", "Cumulative dose to the pacemaker must be monitored and kept below manufacturer-specified limits, often requiring cardiology consultation", "The pacemaker must always be surgically relocated before treatment", "Pacemakers are unaffected by ionizing radiation and require no special precautions"], "correct": 1, "expl": ["Incorrect — MRI safety and radiation dose tolerance are separate issues; the concern here is cumulative radiation dose, not MRI compatibility.", "Correct — cumulative dose to the device must be tracked and kept under manufacturer/AAPM-recommended limits, often with cardiology/device manufacturer consultation and possible device interrogation during treatment.", "Incorrect — relocation is not always necessary; dose monitoring and planning adjustments are the standard first-line approach.", "Incorrect — pacemakers can malfunction from cumulative radiation dose and from secondary neutron production at high photon energies; precautions are required."], "concept": "Pacemakers/ICDs represent a medical factor affecting tissue tolerance planning — dose limits, energy selection (avoiding high-energy neutron production), and monitoring are required.", "formula": "", "id": 32, "catKey": "S1"}, {"cat": "Radiation Physics and Radiobiology", "sub": "Radiation Tissue Tolerance", "stem": "Concurrent chemotherapy given with radiation therapy most often has which effect on normal tissue tolerance?", "choices": ["It generally decreases tissue tolerance, increasing risk of toxicity", "It always improves normal tissue tolerance", "It has no effect on radiation tolerance", "It only affects tumor tissue, never normal tissue"], "correct": 0, "expl": ["Correct — many chemotherapeutic agents act as radiosensitizers, enhancing tumor cell kill but also generally lowering normal tissue tolerance and increasing acute toxicity risk.", "Incorrect — concurrent chemotherapy typically decreases, not improves, normal tissue tolerance.", "Incorrect — concurrent chemotherapy is well documented to affect normal tissue tolerance.", "Incorrect — radiosensitizing chemotherapy affects both tumor and normal tissue radiosensitivity."], "concept": "Contribution from other sources (chemotherapy, brachytherapy boost, prior/abutting fields) must be factored into total tissue tolerance assessment during planning.", "formula": "", "id": 33, "catKey": "S1"}, {"cat": "Radiation Physics and Radiobiology", "sub": "Principles of Physics", "stem": "Which statement correctly compares x-ray beam quality and half-value layer (HVL)?", "choices": ["HVL is unrelated to beam energy", "A higher HVL indicates a higher-energy (more penetrating) beam", "HVL only applies to electron beams, not photon beams", "A higher HVL indicates a lower-energy (softer) beam"], "correct": 1, "expl": ["Incorrect — HVL is directly used as an indirect measure of photon beam quality/energy.", "Correct — HVL is the thickness of a specified material needed to reduce beam intensity by half; a higher HVL means the beam is more penetrating (higher effective energy/quality).", "Incorrect — HVL is primarily a photon beam quality concept, not applied to electron beams in this way.", "Incorrect — this is the reverse of the true relationship."], "concept": "HVL is a practical surrogate for beam quality/effective energy, used in QA of kV imaging and orthovoltage/superficial units.", "formula": "", "id": 34, "catKey": "S1"}, {"cat": "Radiation Protection, Equipment Operation, and Quality Assurance", "sub": "Minimizing Patient Exposure", "stem": "Which action most directly reduces patient dose from kV imaging without compromising the diagnostic purpose of the image?", "choices": ["Increasing imaging frequency beyond protocol", "Using the smallest field size/collimation necessary to visualize the anatomy of interest", "Increasing mAs indiscriminately for every image", "Removing all shielding for a clearer image"], "correct": 1, "expl": ["Incorrect — increasing imaging frequency beyond what is clinically indicated increases unnecessary dose.", "Correct — tight collimation to the region of interest reduces the volume of tissue irradiated and scatter dose while preserving diagnostic image quality, consistent with ALARA.", "Incorrect — increasing mAs unnecessarily increases patient dose without added benefit.", "Incorrect — shielding, where appropriate, reduces dose to radiosensitive structures outside the area of interest."], "concept": "ALARA for patients: use appropriate exposure factors, collimation, and shielding to minimize dose while achieving the clinical/imaging goal.", "formula": "", "id": 35, "catKey": "S2"}, {"cat": "Radiation Protection, Equipment Operation, and Quality Assurance", "sub": "Personnel Protection", "stem": "Which of the following is NOT one of the three basic methods of personnel radiation protection?", "choices": ["Filtration", "Time", "Distance", "Shielding"], "correct": 0, "expl": ["Correct — filtration modifies the x-ray beam's energy spectrum; it is a beam quality concept, not one of the three classic personnel protection methods (time, distance, shielding).", "Incorrect — time (minimizing exposure duration) is one of the three basic protection methods.", "Incorrect — distance (maximizing distance from the source, per inverse square law) is one of the three basic methods.", "Incorrect — shielding (using attenuating material) is one of the three basic methods."], "concept": "The three cardinal principles of personnel radiation protection: minimize TIME, maximize DISTANCE, use SHIELDING.", "formula": "", "id": 36, "catKey": "S2"}, {"cat": "Radiation Protection, Equipment Operation, and Quality Assurance", "sub": "Personnel Protection", "stem": "A pregnant radiation therapist declares her pregnancy to the radiation safety officer. Per NCRP recommendations, the dose limit to the embryo/fetus for the remainder of the pregnancy is:", "choices": ["5 mSv per month, with a total not to exceed 5 mSv for the pregnancy period after declaration", "50 mSv total", "No limit as long as a lead apron is worn", "0.5 mSv per month (not to exceed 5 mSv total for the declared pregnancy)"], "correct": 3, "expl": ["Incorrect — this overstates the recommended monthly limit.", "Incorrect — 50 mSv is the annual occupational limit for a non-pregnant radiation worker, not the fetal dose limit.", "Incorrect — dose limits still apply even with shielding measures; monitoring against the recommended limit is required.", "Correct — NCRP recommends a fetal dose limit of 0.5 mSv (50 mrem) per month, with a total not to exceed 5 mSv for the entire declared pregnancy, to keep fetal dose as low as reasonably achievable."], "concept": "Declared pregnant worker fetal dose limits are substantially lower than standard occupational limits, reflecting increased fetal radiosensitivity.", "formula": "", "id": 37, "catKey": "S2"}, {"cat": "Radiation Protection, Equipment Operation, and Quality Assurance", "sub": "Personnel Protection", "stem": "Which personnel dosimeter type is capable of providing an immediate, real-time dose reading?", "choices": ["Film badge", "Thermoluminescent dosimeter (TLD)", "Optically stimulated luminescence (OSL) badge", "Electronic personal dosimeter (direct-reading)"], "correct": 3, "expl": ["Incorrect — film badges require chemical development and are read retrospectively, not in real time.", "Incorrect — TLDs also require processing (heating to release stored energy as light) after the wear period.", "Incorrect — OSL badges require processing after the monitoring period; they do not give real-time readings.", "Correct — electronic personal dosimeters provide immediate/real-time dose and dose-rate readouts, useful for high-exposure-potential tasks."], "concept": "Distinguish dosimeter types: TLD/OSL/film = passive, processed later; electronic dosimeters = active, real-time readout.", "formula": "", "id": 38, "catKey": "S2"}, {"cat": "Radiation Protection, Equipment Operation, and Quality Assurance", "sub": "Facilities/Area Monitoring", "stem": "Under NRC regulations (10 CFR Part 20), a \"restricted area\" is best defined as:", "choices": ["An area where access is limited by the licensee for purposes of protecting individuals against radiation exposure", "An area exclusively reserved for radioactive waste storage", "An area with no radiation sources present", "An area freely accessible to the general public"], "correct": 0, "expl": ["Correct — a restricted area is one where the licensee limits access specifically to protect individuals from radiation exposure, as defined under 10 CFR Part 20.", "Incorrect — waste storage is one possible use but not the defining characteristic of a restricted area.", "Incorrect — restricted areas are designated because of the presence of radiation sources/potential exposure.", "Incorrect — a restricted area, by definition, has limited (not free) public access."], "concept": "Know NRC area classifications: restricted, controlled, and unrestricted areas, each with different access and posting/monitoring requirements.", "formula": "", "id": 39, "catKey": "S2"}, {"cat": "Radiation Protection, Equipment Operation, and Quality Assurance", "sub": "Facilities/Area Monitoring", "stem": "A primary radiation barrier in a linear accelerator vault must be designed to attenuate the:", "choices": ["Radiation from adjacent rooms only", "Leakage radiation only", "Scattered radiation only", "Useful (primary) beam that can be directed at the barrier"], "correct": 3, "expl": ["Incorrect — this describes a general concern for vault design overall, not the specific definition of a primary barrier.", "Incorrect — leakage attenuation is also primarily a secondary barrier consideration.", "Incorrect — attenuating scatter is the role of a secondary barrier.", "Correct — the primary barrier must be designed and constructed (typically substantially thicker) to attenuate the useful/primary beam wherever it can be directed at that wall, floor, or ceiling."], "concept": "Primary barriers (intercept the direct useful beam) require far greater thickness than secondary barriers (intercept only leakage and scatter).", "formula": "", "id": 40, "catKey": "S2"}, {"cat": "Radiation Protection, Equipment Operation, and Quality Assurance", "sub": "Instrumentation", "stem": "Which detector is most appropriate for routine, precise calibration of linear accelerator output during monthly/annual QA?", "choices": ["Neutron detector", "Geiger-Müller detector", "Film badge", "Ionization chamber"], "correct": 3, "expl": ["Incorrect — neutron detectors are used to monitor neutron contamination at very high photon energies, not routine photon/electron output calibration.", "Incorrect — a GM detector is a survey instrument for detecting the presence of radiation, not suited to precise dosimetric output calibration.", "Incorrect — film badges are personnel dosimeters, not suited for precise machine output calibration.", "Correct — a calibrated ionization chamber is the standard instrument for precise, absolute dose/output measurements in linac calibration and QA, per protocols such as TG-51."], "concept": "Know instrumentation purpose: ionization chamber = precise dose calibration; GM detector = area/contamination surveys; TLD/OSL/diodes = in vivo or personnel dosimetry; neutron detectors = neutron contamination monitoring.", "formula": "", "id": 41, "catKey": "S2"}, {"cat": "Radiation Protection, Equipment Operation, and Quality Assurance", "sub": "Instrumentation", "stem": "Diode detectors are commonly used clinically for which purpose?", "choices": ["In vivo patient dose verification during treatment", "Screening patients for MRI compatibility", "Absolute calibration of the linear accelerator's primary output", "Detecting airborne radioactive contamination"], "correct": 0, "expl": ["Correct — diodes are commonly used for in vivo dosimetry (real-time entrance/exit dose verification on the patient) due to their small size, immediate readout, and high sensitivity.", "Incorrect — diodes have no role in MRI safety screening.", "Incorrect — absolute reference-standard calibration is performed with a calibrated ionization chamber, not diodes.", "Incorrect — detecting airborne contamination is a survey/area monitoring task using different instrumentation (e.g., GM detectors)."], "concept": "Diodes: small, real-time, good for in vivo/patient dose verification; less suited than ion chambers for absolute reference dosimetry.", "formula": "", "id": 42, "catKey": "S2"}, {"cat": "Radiation Protection, Equipment Operation, and Quality Assurance", "sub": "Quality Control", "stem": "During morning warm-up of the linear accelerator, the interlock system is tested primarily to verify:", "choices": ["The gantry rotation speed", "That safety mechanisms correctly halt beam delivery under fault conditions (e.g., door open, beam-off conditions)", "Image quality of the on-board imager", "The mechanical accuracy of the couch height indicator"], "correct": 1, "expl": ["Incorrect — gantry rotation speed/accuracy is a separate mechanical QA test.", "Correct — interlock testing confirms that safety systems (door interlocks, emergency-off switches, beam-hold conditions) function correctly to prevent unintended or unsafe beam delivery.", "Incorrect — imaging QA is a separate, distinct daily/weekly check, not the primary purpose of interlock testing.", "Incorrect — couch indexing accuracy is a separate mechanical QA check."], "concept": "Daily linac warm-up/QA includes interlocks, safety lights, emergency switches, laser alignment, and imaging/AV system checks — each protecting a different safety function.", "formula": "", "id": 43, "catKey": "S2"}, {"cat": "Radiation Protection, Equipment Operation, and Quality Assurance", "sub": "Quality Control", "stem": "A monthly QA check reveals disagreement between the light field and the radiation field beyond tolerance. What is the clinical significance of this finding?", "choices": ["This indicates the visible light field may not accurately represent the actual treatment field, risking a geographic miss", "This only affects image quality, not treatment accuracy", "This is expected and requires no corrective action", "None — light field and radiation field are unrelated"], "correct": 0, "expl": ["Correct — light/radiation field congruence ensures that the visible field edges used for patient setup (e.g., skin marks, block/MLC shaping visualization) accurately represent where the radiation beam will actually be delivered; disagreement beyond tolerance risks a geographic miss of the target.", "Incorrect — this directly affects treatment field accuracy, not merely image quality.", "Incorrect — out-of-tolerance results require investigation, adjustment, and documentation/course of action, not passive acceptance.", "Incorrect — the light field is specifically designed to represent the radiation field for setup purposes."], "concept": "Light/radiation field congruence is a critical QA test because setup often relies on the visible light field to represent actual beam placement.", "formula": "", "id": 44, "catKey": "S2"}, {"cat": "Radiation Protection, Equipment Operation, and Quality Assurance", "sub": "MRI Screening", "stem": "A patient scheduled for an MRI-based simulation reports having a ferrous (iron-containing) surgical clip placed decades ago. What is the most appropriate next step?", "choices": ["Proceed with MRI simulation without further investigation", "Assume it is safe since it was placed long ago", "Cancel all future imaging for this patient permanently", "Verify the specific implant type/MRI-conditional status through operative records or manufacturer documentation before scanning"], "correct": 3, "expl": ["Incorrect — proceeding without verification risks patient injury from ferromagnetic implant movement/heating in the MRI's strong magnetic field.", "Incorrect — implant age does not determine MRI safety; ferrous material remains a hazard regardless of when it was placed.", "Incorrect — cancellation is not automatically required; many implants are MRI-safe or conditional once verified.", "Correct — implant type and MRI-conditional/compatible status must be verified (via records, implant card, or manufacturer database) before scanning, per MRI safety screening protocols."], "concept": "MRI safety screening must address biomedical implants, ferrous foreign bodies, and other risk factors before any patient enters the MRI environment — never assume safety without verification.", "formula": "", "id": 45, "catKey": "S2"}, {"cat": "Radiation Protection, Equipment Operation, and Quality Assurance", "sub": "Components/Operation", "stem": "Which linear accelerator component is primarily responsible for accelerating electrons to high energy before they strike the target or exit as a treatment beam?", "choices": ["Multileaf collimator", "Waveguide (accelerating structure)", "Flattening filter", "Ion chamber (beam monitoring chamber)"], "correct": 1, "expl": ["Incorrect — the MLC shapes the beam after it is produced; it does not accelerate electrons.", "Correct — the waveguide (accelerating structure) uses microwave energy to accelerate electrons to therapeutic energies before they strike the target (photon mode) or exit directly (electron mode).", "Incorrect — the flattening filter shapes the photon beam's dose profile after production, not acceleration.", "Incorrect — the beam monitoring ion chamber measures beam output/symmetry; it does not accelerate electrons."], "concept": "Understand basic linac components and their functional order: electron gun → waveguide (acceleration) → bending magnet → target/scattering foil → flattening filter/collimation → monitor chamber.", "formula": "", "id": 46, "catKey": "S2"}, {"cat": "Radiation Protection, Equipment Operation, and Quality Assurance", "sub": "Radiation Protection", "stem": "Which shielding material is most commonly used for primary and secondary barriers in a linear accelerator vault due to its high density and cost-effectiveness?", "choices": ["Wood", "Concrete", "Lead only", "Aluminum"], "correct": 1, "expl": ["Incorrect — wood provides negligible shielding and is not used for radiation barriers.", "Correct — concrete's combination of density, structural strength, and relative cost-effectiveness makes it the standard material for primary/secondary vault barriers at megavoltage energies.", "Incorrect — while lead is used for some applications (e.g., door shielding, small components), concrete is the standard bulk barrier material for vault walls due to structural and cost advantages.", "Incorrect — aluminum has insufficient density for effective megavoltage photon shielding."], "concept": "Vault design typically uses thick concrete walls (sometimes with high-density concrete or added lead) calculated from workload, use factor, occupancy factor, and distance.", "formula": "", "id": 47, "catKey": "S2"}, {"cat": "Treatment Sites and Tumors", "sub": "Anatomy/Pathophysiology", "stem": "A patient with a left-sided breast tumor has biopsy-confirmed metastasis to axillary lymph nodes. Which lymphatic drainage pathway is most consistent with this finding?", "choices": ["Inguinal nodes", "Popliteal nodes", "Cervical nodes exclusively", "Axillary nodes as the primary regional drainage basin for the breast"], "correct": 3, "expl": ["Incorrect — inguinal nodes drain the lower extremities and perineum, not the breast.", "Incorrect — popliteal nodes drain the lower leg, unrelated to breast lymphatic drainage.", "Incorrect — cervical nodes are not the primary drainage basin for breast tissue.", "Correct — the axillary lymph nodes are the primary regional drainage basin for breast lymphatics, which is why axillary staging/dissection is central to breast cancer management."], "concept": "Know primary regional lymphatic drainage basins by site: breast → axillary (+/- internal mammary); head/neck → cervical chains; prostate → pelvic/obturator nodes.", "formula": "", "id": 48, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Anatomy/Pathophysiology", "stem": "A tumor arising in the nasopharynx would most commonly metastasize first to which regional lymph node group?", "choices": ["Inguinal nodes", "Axillary nodes", "Mediastinal nodes", "Retropharyngeal and cervical lymph nodes"], "correct": 3, "expl": ["Incorrect — inguinal nodes are unrelated to head and neck drainage.", "Incorrect — axillary nodes drain the breast/upper extremity, not the nasopharynx.", "Incorrect — mediastinal nodes drain thoracic structures, not the nasopharynx directly.", "Correct — nasopharyngeal carcinoma classically drains first to retropharyngeal and upper cervical (level II) lymph nodes, frequently presenting with a neck mass."], "concept": "Head and neck cancers characteristically spread to cervical lymph node chains in a fairly predictable, level-based pattern.", "formula": "", "id": 49, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Tumor Classification", "stem": "A tumor graded as G1 on histopathologic grading is best described as:", "choices": ["Anaplastic", "Well differentiated, low-grade", "Poorly differentiated, high-grade", "Undetermined grade"], "correct": 1, "expl": ["Incorrect — anaplastic (essentially undifferentiated) tumors are the highest grade, not G1.", "Correct — G1 indicates a well-differentiated tumor that closely resembles normal tissue architecture, generally associated with slower growth and better prognosis (lower grade).", "Incorrect — poorly differentiated/high-grade tumors are typically graded G3 or G4.", "Incorrect — undetermined grade is designated GX, not G1."], "concept": "Grading (G1–G4, GX = cannot be assessed) reflects differentiation and growth rate — distinct from staging (TNM), which reflects anatomic extent of disease.", "formula": "", "id": 50, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Tumor Classification", "stem": "Which staging system is most commonly used for classifying the anatomic extent of Hodgkin lymphoma?", "choices": ["Ann Arbor staging", "Gleason staging", "TNM staging", "FIGO staging"], "correct": 0, "expl": ["Correct — the Ann Arbor staging system (Stages I–IV, with subclassifications) is the classic system used to describe anatomic extent of Hodgkin (and historically non-Hodgkin) lymphoma.", "Incorrect — Gleason grading/scoring is specific to prostate adenocarcinoma histologic grading, not staging.", "Incorrect — TNM staging is used for most solid tumors, not typically for lymphomas.", "Incorrect — FIGO staging is used for gynecologic malignancies, not lymphoma."], "concept": "Match staging systems to their disease: TNM (most solid tumors), Ann Arbor (lymphoma), FIGO (gynecologic cancers), Gleason (prostate grading, not staging).", "formula": "", "id": 51, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Oncologic Emergencies", "stem": "A patient with k
