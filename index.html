"cat": "Treatment Sites and Tumors", "sub": "Tumor Classification", "stem": "Which staging system is most appropriate for a newly diagnosed cervical cancer?", "choices": ["Gleason grading", "Ann Arbor staging", "FIGO staging system", "TNM only, never FIGO"], "correct": 2, "expl": ["Gleason grading is specific to prostate cancer histologic grading, not cervical cancer staging.", "Ann Arbor staging is used for lymphoma, not cervical cancer.", "Correct — FIGO (International Federation of Gynecology and Obstetrics) staging is the classic and most directly relevant staging system for cervical (and other gynecologic) cancers.", "While TNM concepts exist, FIGO has historically been the primary staging system specifically used for gynecologic cancers including cervical cancer (now often used alongside TNM)."], "concept": "FIGO staging remains the standard for gynecologic malignancies, distinct from the general TNM system used for most other solid tumors.", "formula": "", "id": 253, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Tumor Classification", "stem": "The \"N\" category in the TNM staging system specifically describes:", "choices": ["The tumor's histologic grade", "The presence of distant metastasis", "The presence and extent of regional lymph node involvement", "The size/extent of the primary tumor"], "correct": 2, "expl": ["Histologic grade is a separate classification (G), not part of the TNM anatomic staging categories.", "This describes the M category.", "Correct — the N category specifically describes the presence and extent of regional lymph node involvement.", "This describes the T category."], "concept": "TNM = Tumor (T, local extent), Node (N, regional lymph node involvement), Metastasis (M, distant spread) — the three independent components combined to determine overall stage.", "formula": "", "id": 254, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Tumor Classification", "stem": "Which statement correctly distinguishes tumor grading from tumor staging?", "choices": ["Grading and staging are the same concept", "Grading reflects the tumor's differentiation/growth rate at the cellular level, while staging reflects the anatomic extent of disease spread", "Staging is always determined before any imaging or pathology is obtained", "Grading has no clinical relevance to prognosis"], "correct": 1, "expl": ["Grading and staging are distinct, complementary concepts.", "Correct — grading describes cellular differentiation and growth rate (aggressiveness at the microscopic level), while staging describes the anatomic extent of disease (local, regional, distant) — both inform prognosis and treatment planning differently.", "Staging typically incorporates imaging and often pathology findings, not determined before this information is available.", "Grading has significant prognostic relevance and often influences treatment intensity decisions."], "concept": "Clearly distinguishing grade (biological aggressiveness) from stage (anatomic extent) is a frequently tested conceptual distinction.", "formula": "", "id": 255, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Oncologic Emergencies", "stem": "A patient with known bone metastases presents with severe nausea, vomiting, confusion, and constipation. Which oncologic emergency should be suspected?", "choices": ["Hypercalcemia of malignancy", "SVC syndrome", "Febrile neutropenia", "Spinal cord compression"], "correct": 0, "expl": ["Correct — nausea, vomiting, confusion, and constipation are classic symptoms of hypercalcemia of malignancy, an oncologic emergency often associated with bone metastases or PTHrP-secreting tumors, requiring urgent recognition and treatment (e.g., IV fluids, bisphosphonates).", "SVC syndrome presents with facial/neck swelling and dyspnea, not this symptom complex.", "Febrile neutropenia presents with fever in the setting of low neutrophil count, not this symptom complex.", "Cord compression presents with neurologic deficits, not primarily GI/mental status symptoms as the leading features here."], "concept": "Hypercalcemia of malignancy has a classic symptom complex (\"stones, bones, groans, and psychiatric overtones\") that should prompt urgent recognition and physician notification.", "formula": "", "id": 256, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Oncologic Emergencies", "stem": "A patient undergoing chemoradiation presents with a fever of 101.5°F and is known to have a recently low neutrophil count. What is the most appropriate immediate action?", "choices": ["Delay evaluation until the next scheduled visit", "Treat this as a potential medical emergency (febrile neutropenia) requiring urgent physician notification and evaluation, as it can progress rapidly to sepsis", "Assume it is a minor viral illness requiring no escalation", "Give the patient acetaminophen and send them home with no further action"], "correct": 1, "expl": ["Delaying evaluation risks rapid deterioration since febrile neutropenia can progress quickly to life-threatening sepsis.", "Correct — febrile neutropenia is a true oncologic emergency requiring urgent evaluation and often prompt antibiotic therapy, given the risk of rapid progression to sepsis in an immunocompromised patient.", "Assuming a benign cause without urgent evaluation risks missing a life-threatening emergency.", "Symptomatic treatment alone without urgent physician evaluation is inadequate and unsafe in this high-risk scenario."], "concept": "Febrile neutropenia is a time-sensitive oncologic emergency requiring immediate escalation, given the risk of rapid clinical deterioration in immunocompromised cancer patients.", "formula": "", "id": 257, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Oncologic Emergencies", "stem": "Which oncologic emergency is most associated with elevated intracranial pressure from brain metastases, presenting with headache, vomiting, and altered mental status?", "choices": ["Febrile neutropenia", "Hypercalcemia", "Signs concerning for impending brain herniation/elevated intracranial pressure", "SVC syndrome"], "correct": 2, "expl": ["Febrile neutropenia presents primarily with fever in the setting of low neutrophil count.", "Hypercalcemia presents with GI/mental status symptoms but is a distinct metabolic (not primarily intracranial pressure-related) emergency.", "Correct — headache, vomiting, and altered mental status in a patient with known brain metastases raise concern for elevated intracranial pressure and possible impending herniation, a neurologic oncologic emergency requiring urgent imaging and often emergent steroids/intervention.", "SVC syndrome presents with facial/neck swelling and dyspnea, not primarily headache/mental status changes."], "concept": "Recognizing signs of elevated intracranial pressure in patients with known brain metastases is critical, as rapid deterioration can occur without urgent intervention.", "formula": "", "id": 258, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Anatomy/Pathophysiology", "stem": "A tumor arising from the exocrine (ductal) tissue of the pancreas is most commonly classified histologically as:", "choices": ["Adenocarcinoma", "Squamous cell carcinoma", "Lymphoma", "Sarcoma"], "correct": 0, "expl": ["Correct — the vast majority of pancreatic exocrine tumors are adenocarcinomas, arising from the glandular ductal epithelium.", "Squamous cell carcinoma is not the typical histology for pancreatic exocrine tumors.", "Lymphoma arises from lymphoid tissue and is a rare, distinct pancreatic malignancy type.", "Sarcomas arise from connective/mesenchymal tissue, not typical pancreatic exocrine tissue."], "concept": "Recognizing typical histology by organ/tissue type (adenocarcinoma for most glandular organs, squamous cell carcinoma for most epithelial surface linings) supports accurate interpretation of pathology reports.", "formula": "", "id": 259, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Anatomy/Pathophysiology", "stem": "Squamous cell carcinoma is the most common histology for malignancies arising in which of the following sites?", "choices": ["Cervix (uterine cervix)", "Prostate gland", "Pancreas", "Thyroid"], "correct": 0, "expl": ["Correct — squamous cell carcinoma is the most common histologic subtype of cervical cancer, arising from the squamous epithelium of the cervix.", "Prostate cancer is predominantly adenocarcinoma.", "Pancreatic cancer is predominantly adenocarcinoma.", "Most thyroid cancers are of follicular cell origin (papillary, follicular), not predominantly squamous cell carcinoma."], "concept": "Matching common histologic subtypes to specific anatomic sites (squamous cell: cervix, skin, head/neck, anus, esophagus; adenocarcinoma: prostate, breast, pancreas, colon) is fundamental oncology knowledge.", "formula": "", "id": 260, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Tumor Classification", "stem": "Which best describes the clinical significance of perineural invasion noted on a pathology report?", "choices": ["It always indicates metastatic disease is present", "It indicates a potential route for local tumor spread along nerve sheaths, associated with increased risk of local recurrence", "It has no prognostic significance", "It only applies to skin cancers"], "correct": 1, "expl": ["Perineural invasion reflects a local spread pattern, not necessarily distant metastatic disease.", "Correct — perineural invasion indicates tumor spread along nerve sheaths, a recognized route of local extension associated with increased risk of local recurrence, sometimes prompting more aggressive local treatment or wider target volumes.", "Perineural invasion is a recognized adverse prognostic finding with clinical significance.", "Perineural invasion is relevant across multiple tumor types, including head and neck, prostate, and pancreatic cancers, not limited to skin cancers alone."], "concept": "Recognizing adverse pathologic features (perineural invasion, lymphovascular invasion, positive margins) helps understand why certain patients receive intensified local treatment.", "formula": "", "id": 261, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Tumor Classification", "stem": "Lymphovascular space invasion (LVSI) on a pathology report is most relevant to which clinical consideration?", "choices": ["Increased risk of nodal or distant metastatic spread, which may influence the extent of nodal treatment or systemic therapy recommendations", "It is relevant only to skin biopsies", "It has no bearing on treatment decisions", "It indicates the tumor is definitely benign"], "correct": 0, "expl": ["Correct — LVSI indicates tumor cells have invaded lymphatic or vascular spaces, increasing the risk of nodal or distant spread, and often influences decisions about the extent of nodal treatment fields or the addition of systemic therapy.", "LVSI is assessed and clinically relevant across many tumor types beyond skin, including endometrial, cervical, and breast cancers.", "LVSI is a clinically significant adverse pathologic finding, not irrelevant to treatment planning.", "LVSI is a feature of malignant tumors reflecting invasive behavior, not indicative of a benign process."], "concept": "LVSI is another key adverse pathologic feature (alongside margin status, perineural invasion) that influences risk stratification and treatment intensity across many tumor types.", "formula": "", "id": 262, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Anatomy/Pathophysiology", "stem": "Which critical structure is of primary concern when planning treatment for a tumor located in the nasopharynx, given its close proximity?", "choices": ["The heart", "The kidneys", "The femoral heads", "The brainstem and optic structures at the skull base"], "correct": 3, "expl": ["The heart is relevant primarily to thoracic RT, not typically a primary concern for nasopharyngeal tumors.", "The kidneys are relevant to abdominal RT, unrelated to nasopharyngeal tumors.", "The femoral heads are relevant to pelvic RT, unrelated to nasopharyngeal tumors.", "Correct — the nasopharynx's proximity to the skull base places the brainstem, optic chiasm/nerves, and other critical neural structures at risk, requiring careful dose constraint consideration."], "concept": "Site-specific critical structure awareness (skull base structures for nasopharynx, parotids/spinal cord/brainstem for other head and neck sites) is essential for safe treatment planning.", "formula": "", "id": 263, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Anatomy/Pathophysiology", "stem": "Which critical structure must be carefully considered and often spared when treating a mediastinal lymphoma with radiation therapy?", "choices": ["The heart and lungs", "The uterus", "The prostate", "The femoral heads"], "correct": 0, "expl": ["Correct — the heart and lungs are major dose-limiting critical structures adjacent to mediastinal targets, given the long-term risks of cardiac toxicity and radiation pneumonitis/fibrosis.", "The uterus is unrelated to mediastinal treatment planning.", "The prostate is unrelated to mediastinal treatment planning.", "The femoral heads are relevant to pelvic treatment planning, not mediastinal."], "concept": "Cardiopulmonary structures are the primary dose-limiting organs at risk in mediastinal radiation therapy, driving modern techniques (e.g., deep inspiration breath-hold) to minimize their dose.", "formula": "", "id": 264, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Anatomy/Pathophysiology", "stem": "When planning treatment for a tumor of the bladder, which nearby structure is most important to consider for late toxicity risk?", "choices": ["The thyroid gland", "The parotid glands", "The brainstem", "The rectum and small bowel"], "correct": 3, "expl": ["The thyroid gland is relevant to neck-region RT, unrelated to bladder treatment.", "The parotid glands are relevant to head and neck RT, unrelated to bladder treatment.", "The brainstem is relevant to cranial RT, unrelated to bladder treatment.", "Correct — the rectum and small bowel are key adjacent critical structures in pelvic radiation therapy for bladder cancer, with dose to these structures directly linked to risk of late GI toxicity."], "concept": "Recognizing pelvic organs at risk (rectum, bladder, small bowel, femoral heads) is essential for safe pelvic treatment planning across multiple pelvic tumor sites.", "formula": "", "id": 265, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Oncologic Emergencies", "stem": "Tumor lysis syndrome, an oncologic emergency most associated with treatment of rapidly proliferating hematologic malignancies, is characterized by which laboratory abnormality pattern?", "choices": ["Hyperkalemia, hyperphosphatemia, hypocalcemia, and hyperuricemia", "Hypoglycemia only", "Normal electrolytes with isolated anemia", "Hypokalemia, hypophosphatemia, hypercalcemia"], "correct": 0, "expl": ["Correct — tumor lysis syndrome classically presents with hyperkalemia, hyperphosphatemia, hypocalcemia, and hyperuricemia due to rapid breakdown of tumor cells releasing intracellular contents, most often triggered by treatment of bulky, rapidly proliferating tumors.", "Tumor lysis syndrome is characterized by electrolyte disturbances, not primarily hypoglycemia.", "Tumor lysis syndrome involves significant, multi-electrolyte laboratory abnormalities, not an isolated normal picture.", "This is the reverse pattern of the true tumor lysis syndrome electrolyte abnormalities."], "concept": "Tumor lysis syndrome is a metabolic oncologic emergency most classically associated with treatment initiation in bulky lymphomas/leukemias, requiring vigilant lab monitoring.", "formula": "", "id": 266, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Tumor Classification", "stem": "Which best describes the general purpose of cancer staging systems (e.g., TNM)?", "choices": ["To calculate the patient's insurance co-pay", "To determine the patient's diet during treatment", "To determine the exact treatment machine to be used", "To provide a standardized way to describe disease extent, guiding prognosis and treatment planning, and enabling comparison across patients/studies"], "correct": 3, "expl": ["Staging is a clinical, not financial/billing, tool.", "Staging is unrelated to dietary planning.", "Machine selection is a separate technical planning decision, not the purpose of staging.", "Correct — staging systems provide a standardized framework describing disease extent, which informs prognosis, guides treatment decisions, and allows meaningful comparison of outcomes across patients and clinical trials."], "concept": "Understanding the fundamental purpose of staging (standardization, prognosis, treatment guidance, research comparability) reinforces why accurate staging is foundational to oncologic care.", "formula": "", "id": 267, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Anatomy/Pathophysiology", "stem": "A tumor originating in the meninges (the membranes covering the brain and spinal cord) and generally benign in behavior is termed a:", "choices": ["Meningioma", "Astrocytoma", "Glioblastoma", "Medulloblastoma"], "correct": 0, "expl": ["Correct — a meningioma arises from the meninges and is generally a benign, slow-growing tumor, though it can still cause significant symptoms due to mass effect and may require radiation therapy.", "Astrocytoma arises from astrocytes (glial cells), not the meninges, and ranges from low- to high-grade.", "Glioblastoma arises from glial cells and is highly malignant, not the benign meningeal tumor described.", "Medulloblastoma is a malignant pediatric brain tumor arising in the cerebellum, not from the meninges."], "concept": "Recognizing that meningiomas are typically benign (unlike most other primary brain tumors) is important for understanding their generally more favorable treatment approach and prognosis.", "formula": "", "id": 268, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Anatomy/Pathophysiology", "stem": "Which of the following benign conditions may still require radiation therapy due to its tendency for local recurrence and functional impact despite non-malignant behavior?", "choices": ["Keloid scar formation", "Normal wound healing", "Common seasonal allergies", "A simple viral upper respiratory infection"], "correct": 0, "expl": ["Correct — keloid scars, while benign, have a high tendency for recurrence after excision alone and are sometimes treated with adjuvant low-dose radiation therapy to reduce recurrence risk.", "Normal wound healing does not require radiation therapy.", "Allergies are unrelated to radiation therapy indications.", "A viral infection is unrelated to radiation therapy indications."], "concept": "Recognize that radiation therapy is occasionally used for select benign conditions (keloids, heterotopic bone prevention, certain vascular malformations) despite the absence of malignancy.", "formula": "", "id": 269, "catKey": "P1"}, {"cat": "Treatment Sites and Tumors", "sub": "Anatomy/Pathophysiology", "stem": "Heterotopic bone formation prevention with low-dose radiation therapy is most commonly used in which clinical scenario?", "choices": ["As a primary treatment for lung cancer", "After total hip arthroplasty in patients at high risk for heterotopic ossification", "As a treatment for melanoma", "As a treatment for lymphoma"], "correct": 1, "expl": ["Lung cancer requires definitive, not prophylactic low-dose, radiation therapy.", "Correct — low-dose radiation therapy is commonly used prophylactically after hip arthroplasty (or in other at-risk orthopedic surgical scenarios) to reduce the risk of heterotopic bone formation.", "Melanoma treatment is disease-directed, unrelated to heterotopic bone prevention.", "Lymphoma is treated with disease-directed radiation therapy, not for heterotopic bone prevention."], "concept": "Benign-indication radiation therapy (heterotopic ossification prophylaxis) is a distinct, lower-dose application relevant to understanding the full scope of RT indications.", "formula": "", "id": 270, "catKey": "P1"}, {"cat": "Treatment Volume Localization", "sub": "Treatment Techniques", "stem": "Which factor is most important when selecting between a supine and prone position for treating a rectal tumor?", "choices": ["Bowel displacement out of the pelvis (often better achieved prone with a belly board) versus setup reproducibility and comfort (often better achieved supine)", "The color of the immobilization device", "The therapist's personal preference", "Patient preference alone, regardless of clinical factors"], "correct": 0, "expl": ["Correct — prone positioning with a belly board can help displace small bowel out of the pelvic radiation field, while supine positioning often offers more reproducible, comfortable setup; the choice balances these clinical trade-offs per physician preference and patient-specific factors.", "Irrelevant to clinical decision-making.", "Position selection should be based on clinical rationale, not personal preference.", "While comfort matters, position selection is primarily a clinical decision balancing bowel-sparing goals with reproducibility, not simply patient preference alone."], "concept": "Site-specific positioning decisions (e.g., prone vs. supine for pelvic tumors) reflect a balance between normal tissue sparing and setup reproducibility.", "formula": "", "id": 271, "catKey": "P2"}, {"cat": "Treatment Volume Localization", "sub": "Treatment Techniques", "stem": "A thermoplastic mask is most commonly used for immobilization in which treatment site?", "choices": ["Head and neck", "Pelvis", "Breast", "Lower extremity"], "correct": 0, "expl": ["Correct — thermoplastic masks are the standard immobilization device for head and neck treatments, providing reproducible, rigid immobilization of the head, neck, and shoulders.", "Pelvic immobilization typically uses different devices (e.g., Vac-Lok, leg immobilizers), not thermoplastic masks.", "Breast immobilization typically uses breast boards/wing boards, not thermoplastic masks.", "Lower extremity immobilization uses different device types suited to limb positioning."], "concept": "Matching immobilization device type to treatment site (thermoplastic mask for head/neck, Vac-Lok for body sites, breast board for breast/chest wall) reflects practical treatment volume localization knowledge.", "formula": "", "id": 272, "catKey": "P2"}, {"cat": "Treatment Volume Localization", "sub": "Treatment Techniques", "stem": "A vacuum-formed body immobilization device (Vac-Lok) is most commonly used for which purpose?", "choices": ["Providing reproducible whole-body or body-region immobilization conforming to the patient's individual body contour", "Only for cosmetic patient comfort with no reproducibility benefit", "Exclusively for head and neck cases", "Replacing the need for CT simulation"], "correct": 0, "expl": ["Correct — Vac-Lok (vacuum cushion) devices conform to and immobilize the patient's individual body contour, supporting reproducible daily positioning for body-site treatments (thorax, abdomen, pelvis).", "Reproducibility, not merely comfort, is the primary clinical purpose of this immobilization device.", "Vac-Lok devices are typically used for body sites, while thermoplastic masks are the standard for head and neck.", "Immobilization devices support, but do not replace, the need for CT simulation to acquire planning images."], "concept": "Understanding the specific purpose and typical application of common immobilization devices supports safe, reproducible treatment.", "formula": "", "id": 273, "catKey": "P2"}, {"cat": "Treatment Volume Localization", "sub": "CT Simulation", "stem": "Reducing CT slice thickness during simulation for a small, mobile lung tumor primarily improves which aspect of treatment planning?", "choices": ["Increases the total field of view automatically", "Eliminates the need for image fusion", "Improves spatial resolution and accuracy of small target/structure delineation along the longitudinal (z) axis", "Reduces total imaging dose to zero"], "correct": 2, "expl": ["Field of view is a separate acquisition parameter, not automatically changed by adjusting slice thickness.", "Slice thickness selection does not eliminate the potential need for image fusion with other modalities (e.g., PET, MRI).", "Correct — thinner CT slices improve spatial resolution along the z-axis, allowing more accurate delineation of small or complex targets and adjacent critical structures.", "Reducing slice thickness does not eliminate imaging dose, though dose optimization remains a consideration."], "concept": "Slice thickness selection directly affects spatial resolution and, therefore, the accuracy of target/organ delineation — particularly important for small or complex targets.", "formula": "", "id": 274, "catKey": "P2"}, {"cat": "Treatment Volume Localization", "sub": "CT Simulation", "stem": "Which of the following best describes the purpose of image fusion (registration) between planning CT and diagnostic MRI in treatment volume localization?", "choices": ["To reduce the total number of images needed", "To replace the CT entirely with the MRI for dose calculation", "To combine the superior soft-tissue contrast of MRI with the electron density information from CT, improving target/organ delineation while retaining accurate dose calculation capability", "To eliminate the need for physician contouring"], "correct": 2, "expl": ["Fusion does not reduce required imaging; it adds complementary information from multiple studies.", "MRI alone typically cannot fully replace CT for dose calculation due to lack of reliable electron density information in standard sequences.", "Correct — image fusion leverages MRI's superior soft-tissue contrast for more accurate target/organ delineation while still using the CT's electron density data for accurate dose calculation.", "Physician contouring remains essential to define new targets/structures even with fused, information-rich datasets."], "concept": "Multi-modality image fusion combines the strengths of different imaging modalities (MRI soft-tissue contrast + CT electron density) for optimal treatment volume localization.", "formula": "", "id": 275, "catKey": "P2"}, {"cat": "Treatment Volume Localization", "sub": "CT Simulation", "stem": "Which reconstruction algorithm consideration is most relevant when a patient has bilateral hip prostheses causing significant CT artifact in the pelvis?", "choices": ["No adjustment is needed; artifacts do not affect dose calculation", "The patient should be denied treatment entirely", "Metal artifact reduction techniques/algorithms should be considered to improve image quality and dose calculation accuracy in the affected region", "The prostheses should be surgically removed before every simulation"], "correct": 2, "expl": ["Significant metal artifact can meaningfully degrade image quality and affect dose calculation accuracy in the affected region if not addressed.", "Treatment is not automatically precluded; appropriate imaging/planning adjustments can often address the challenge.", "Correct — metal artifact reduction techniques (specialized reconstruction algorithms or acquisition protocols) help mitigate the impact of high-density implants on image quality and subsequent dose calculation accuracy.", "Surgical removal of a prosthesis is not a reasonable or appropriate response to a CT artifact issue."], "concept": "Awareness of metal artifact reduction strategies is important for maintaining accurate treatment planning in patients with orthopedic hardware or other implants.", "formula": "", "id": 276, "catKey": "P2"}, {"cat": "Treatment Volume Localization", "sub": "Documentation/Verification", "stem": "Which best describes the appropriate content of \"set-up photographs\" taken during CT simulation?", "choices": ["Photographs documenting the patient's positioning, immobilization device placement, and relevant reference marks to support accurate daily setup reproduction", "Photographs of the treatment planning computer screen only", "Photographs taken purely for the department's social media account", "Photographs of the patient's face only for identification purposes unrelated to setup"], "correct": 0, "expl": ["Correct — set-up photographs document the patient's specific positioning, immobilization device configuration, and reference marks/accessories, supporting accurate and consistent reproduction of the simulated setup at each treatment.", "Set-up photographs specifically document the patient/positioning setup, not planning software screens.", "This is not an appropriate clinical use of set-up photographs.", "While identification is one component, set-up photographs specifically document positioning/immobilization details relevant to reproducible daily setup, not simply identification."], "concept": "Set-up photographs are a practical documentation and verification tool supporting reproducible daily positioning, especially important across different treating therapists.", "formula": "", "id": 277, "catKey": "P2"}, {"cat": "Treatment Volume Localization", "sub": "Documentation/Verification", "stem": "During simulation, the therapist notices the physician's order specifies a particular immobilization device that is unavailable that day. What is the most appropriate action?", "choices": ["Simulate the patient without any immobilization device", "Notify the physician of the unavailability and discuss an appropriate alternative or reschedule as clinically appropriate, documenting the resolution", "Cancel the patient's entire treatment course permanently", "Substitute any available device without physician input and proceed"], "correct": 1, "expl": ["Omitting immobilization entirely without physician approval could compromise setup accuracy and safety.", "Correct — any deviation from the physician's ordered setup, including equipment availability issues, should be discussed with the physician to determine an appropriate path forward, with the resolution clearly documented.", "Cancellation of the entire course is a disproportionate response to a single equipment availability issue that can typically be resolved through communication.", "Substituting a device without physician input could compromise the intended level of immobilization/reproducibility for that specific case."], "concept": "Any deviation from the physician-ordered simulation plan requires communication and documentation, reflecting the \"implement according to physician order\" documentation standard.", "formula": "", "id": 278, "catKey": "P2"}, {"cat": "Treatment Volume Localization", "sub": "Documentation/Verification", "stem": "Temporary reference marks placed during CT simulation, prior to permanent tattoo placement, serve what primary purpose?", "choices": ["To provide a lasting reference for the entire treatment course without further verification", "To allow verification and adjustment of the isocenter position (e.g., through physician/physicist review of the plan) before permanent marks are placed", "To replace the need for permanent tattoos entirely", "To identify the patient's allergies"], "correct": 1, "expl": ["Temporary marks are, by definition, not intended as the lasting reference; permanent tattoos serve that purpose once the plan is finalized.", "Correct — temporary marks allow flexibility for the isocenter position to be verified and adjusted (e.g., after physics/physician plan review) before permanent tattoos are placed, ensuring the final reference marks accurately reflect the approved treatment plan.", "Temporary marks are a preliminary step; permanent tattoos are still placed once the plan is finalized and verified.", "Reference marks are unrelated to documenting patient allergies."], "concept": "Understanding the sequential process (temporary marks → plan verification → permanent tattoo placement) reflects the careful, verified workflow underlying treatment volume localization.", "formula": "", "id": 279, "catKey": "P2"}, {"cat": "Treatment Volume Localization", "sub": "Treatment Techniques", "stem": "Which factor most influences the choice of patient positioning and immobilization technique for a breast cancer patient receiving whole breast irradiation?", "choices": ["The patient's favorite color", "The therapist's personal preference for device type", "Reproducible arm and breast positioning (e.g., using a breast board with arms raised) to allow consistent tangential field setup and minimize lung/heart dose", "The time of day the patient is scheduled"], "correct": 2, "expl": ["Irrelevant to clinical decision-making.", "Positioning technique should be selected based on clinical rationale and physician preference/protocol, not arbitrary personal preference.", "Correct — breast board positioning with the arms raised out of the treatment field supports reproducible tangential field setup, helping minimize dose to the underlying lung and heart while maintaining accurate daily positioning.", "Scheduling time does not influence the clinical rationale for positioning technique selection."], "concept": "Breast treatment positioning reflects a deliberate strategy to optimize target coverage while minimizing dose to adjacent critical structures (lung, heart).", "formula": "", "id": 280, "catKey": "P2"}, {"cat": "Treatment Volume Localization", "sub": "CT Simulation", "stem": "Which best describes the purpose of a scout/topogram image acquired at the start of a CT simulation?", "choices": ["To verify the patient's insurance information", "To calculate the final prescribed dose", "To provide a quick overview image used to plan the actual scan range/coverage for the full CT acquisition", "To replace the need for axial CT images entirely"], "correct": 2, "expl": ["Irrelevant to insurance verification.", "Dose calculation requires the full volumetric CT dataset, not the scout image alone.", "Correct — the scout (topogram) image is a quick, low-dose overview scan used to plan and verify the appropriate scan range before acquiring the full CT dataset.", "The scout image supplements, but does not replace, the need for full axial CT image acquisition."], "concept": "The scout/topogram image is a practical first step in CT simulation workflow, ensuring appropriate scan coverage before full acquisition.", "formula": "", "id": 281, "catKey": "P2"}, {"cat": "Treatment Volume Localization", "sub": "CT Simulation", "stem": "DICOM format is significant in treatment volume localization primarily because it:", "choices": ["Only applies to billing information", "Cannot be used to transfer treatment planning data", "Is a proprietary format usable by only one specific vendor", "Is a standardized format enabling interoperability of medical images and related data (including RT-specific objects like structure sets and dose) across different systems and vendors"], "correct": 3, "expl": ["DICOM concerns clinical imaging/planning data, not billing information.", "DICOM (including DICOM-RT extensions) is specifically used to transfer treatment planning-related data between systems.", "DICOM is specifically a widely adopted standard, not a single-vendor proprietary format.", "Correct — DICOM (Digital Imaging and Communications in Medicine) is a standardized format that enables interoperability of medical images and RT-specific data objects (structure sets, dose, plans) across different vendor systems, essential for modern treatment planning workflows."], "concept": "DICOM standardization underlies the ability to transfer simulation images, contours, and plans between the CT simulator, treatment planning system, and treatment delivery system.", "formula": "", "id": 282, "catKey": "P2"}, {"cat": "Treatment Volume Localization", "sub": "Documentation/Verification", "stem": "Programmable lasers in the treatment room are typically referenced to which coordinate system to ensure accurate daily setup?", "choices": ["The coordinates established at CT simulation, transferred to the treatment room via the treatment planning system", "The treatment machine's serial number", "The billing system's patient ID number", "An arbitrary coordinate system reset daily with no reference to simulation"], "correct": 0, "expl": ["Correct — programmable lasers are referenced to the isocenter coordinates established at CT simulation and transferred through the treatment planning system, ensuring the treatment room accurately reproduces the simulated and planned setup.", "Irrelevant to laser coordinate referencing.", "Irrelevant to laser coordinate referencing.", "An arbitrary, non-referenced system would compromise setup accuracy and safety."], "concept": "The chain of coordinate transfer — from CT simulation isocenter through the planning system to the treatment room lasers — is fundamental to accurate, reproducible treatment volume localization.", "formula": "", "id": 283, "catKey": "P2"}, {"cat": "Treatment Volume Localization", "sub": "Treatment Techniques", "stem": "Abdominal compression as a motion management technique is primarily used to reduce which type of tumor motion?", "choices": ["Skeletal motion unrelated to breathing", "Patient rotational setup error", "Respiratory-induced motion of upper abdominal/lower thoracic targets (e.g., liver, some lung tumors)", "Cardiac motion"], "correct": 2, "expl": ["Abdominal compression specifically addresses respiration-related motion, not unrelated skeletal motion.", "Abdominal compression addresses respiratory motion, not general rotational setup error, which is addressed through positioning/IGRT correction.", "Correct — abdominal compression physically restricts diaphragmatic excursion, reducing respiratory-induced motion of upper abdominal and lower thoracic targets, an alternative or complement to gating/breath-hold techniques.", "Abdominal compression is not primarily intended to address cardiac motion."], "concept": "Motion management options (ITV margins, gating, breath-hold, abdominal compression) each have specific mechanisms and best-fit clinical scenarios based on tumor location and patient factors.", "formula": "", "id": 284, "catKey": "P2"}, {"cat": "Treatment Volume Localization", "sub": "Treatment Techniques", "stem": "Which imaging technique is most useful for assessing and quantifying the extent of tumor motion prior to selecting a motion management strategy?", "choices": ["4D-CT simulation, which captures images across multiple respiratory phases", "A plain chest x-ray", "A single free-breathing CT scan only", "Ultrasound of the abdomen"], "correct": 0, "expl": ["Correct — 4D-CT acquires images throughout the respiratory cycle, allowing quantification of tumor motion range and informing the selection of an appropriate motion management strategy (ITV margin, gating, breath-hold).", "Plain chest x-ray lacks the 3D/volumetric detail needed to properly characterize tumor motion for treatment planning.", "A single free-breathing scan captures only one motion state and does not fully characterize the range of tumor motion.", "Ultrasound is not the standard modality for characterizing respiratory tumor motion in treatment planning."], "concept": "4D-CT is the standard tool for quantifying respiratory motion, directly informing subsequent motion management technique selection.", "formula": "", "id": 285, "catKey": "P2"}, {"cat": "Prescription and Dose Calculation", "sub": "Treatment Prescription", "stem": "A physician prescribes a hypofractionated regimen of 4000 cGy in 15 fractions for breast cancer. What is the dose per fraction?", "choices": ["300 cGy", "266.7 cGy", "200 cGy", "400 cGy"], "correct": 1, "expl": ["300 cGy/fraction would total 4500 cGy over 15 fractions, not 4000 cGy.", "Correct — dose per fraction = total dose ÷ number of fractions = 4000 ÷ 15 ≈ 266.7 cGy per fraction.", "200 cGy/fraction would total only 3000 cGy over 15 fractions, not 4000 cGy.", "400 cGy/fraction would total 6000 cGy over 15 fractions, not 4000 cGy."], "concept": "Basic fractionation calculation: dose/fraction = total dose ÷ number of fractions — essential for verifying any prescription.", "formula": "Dose/fraction = Total dose ÷ # fractions", "id": 286, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Treatment Prescription", "stem": "Which target volume specifically accounts for daily setup uncertainty and internal organ motion, and is used to define the field/aperture margins for treatment planning?", "choices": ["CTV", "PTV", "ITV alone with no further margin needed", "GTV"], "correct": 1, "expl": ["CTV accounts for microscopic disease spread but not setup/motion uncertainty.", "Correct — the PTV adds a geometric margin around the CTV (or ITV, if used) specifically to account for daily setup uncertainty and, if an ITV wasn't already used for motion, organ/patient motion, ensuring adequate target dose coverage despite these uncertainties.", "The ITV accounts for internal organ motion but still requires an additional PTV margin for setup uncertainty.", "GTV represents only the visible/palpable tumor, with no added margins."], "concept": "The full ICRU volume hierarchy (GTV → CTV → ITV [motion] → PTV [setup]) reflects progressively broader margins addressing different sources of geometric uncertainty.", "formula": "", "id": 287, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Geometric Parameters", "stem": "In an SSD (source-to-surface distance) treatment setup, the SSD is measured from the radiation source to which point?", "choices": ["The linear accelerator's base", "The isocenter, regardless of patient anatomy", "The patient's skin surface at the point the central axis enters", "The treatment couch surface, ignoring the patient"], "correct": 2, "expl": ["Irrelevant to the definition of SSD.", "This describes an SAD (source-to-axis distance) setup reference, not SSD.", "Correct — SSD is measured from the radiation source to the patient's skin surface along the central axis, distinct from SAD, which is measured to the isocenter regardless of skin surface depth.", "SSD is measured to the patient's actual skin surface, not the couch surface independent of the patient."], "concept": "Understanding the distinction between SSD (source-to-surface) and SAD (source-to-axis/isocenter) setups is fundamental to accurate treatment setup and MU calculation.", "formula": "", "id": 288, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Geometric Parameters", "stem": "In an isocentric (SAD) treatment technique, the distance from the source to the isocenter remains constant regardless of:", "choices": ["The gantry angle used only", "The energy selected only", "The field size used only", "The patient's thickness/depth to the isocenter"], "correct": 3, "expl": ["While gantry angle changes beam direction, SAD to isocenter remains constant across gantry angles, which is a related but distinct point from this specific answer framing.", "Energy selection does not change the fixed geometric SAD.", "Field size does not change the fixed geometric SAD.", "Correct — in an isocentric SAD setup, the source-to-isocenter distance remains fixed (e.g., 100 cm) regardless of patient thickness, since the isocenter is a fixed geometric point rather than referenced to the variable skin surface."], "concept": "The isocentric (SAD) technique's key advantage is that the fixed source-to-isocenter distance simplifies multi-field, multi-angle treatment setup regardless of patient thickness variation.", "formula": "", "id": 289, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Dose Calculation", "stem": "A photon beam has a PDD of 100% at dmax and 80% at 5 cm depth. If 250 cGy is prescribed to be delivered at dmax, what dose is delivered at 5 cm depth?", "choices": ["200 cGy", "250 cGy", "400 cGy", "312.5 cGy"], "correct": 0, "expl": ["Correct — Dose at 5 cm = Dose at dmax × (PDD at 5cm/100) = 250 × 0.80 = 200 cGy.", "250 cGy would only be correct if PDD were 100% at 5 cm, which it is not.", "400 cGy is an overestimate not supported by the given PDD relationship.", "312.5 cGy would result from dividing rather than multiplying by the PDD fraction."], "concept": "Dose(depth) = Dose(dmax) × PDD(depth)/100 — the fundamental PDD-based dose calculation relationship, testable in either direction (solve for dose at depth or dose at dmax).", "formula": "Dose(depth) = Dose(dmax) × PDD(depth)/100", "id": 290, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Dose Calculation", "stem": "Using the inverse square law, if the dose rate at 80 cm is 150 cGy/min, what is the approximate dose rate at 100 cm (all else equal)?", "choices": ["96 cGy/min", "117 cGy/min", "150 cGy/min", "234 cGy/min"], "correct": 0, "expl": ["Correct — New rate = 150 × (80/100)² = 150 × 0.64 = 96 cGy/min; increasing distance decreases dose rate per the inverse square law.", "117 cGy/min underestimates the decrease produced by the actual squared ratio.", "150 cGy/min would incorrectly assume no change with distance.", "234 cGy/min would incorrectly assume dose rate increases with increasing distance, the opposite of the true relationship."], "concept": "Inverse square calculations: New rate = Old rate × (Old distance/New distance)² — practice both increasing and decreasing distance scenarios for board preparation.", "formula": "I₂ = I₁ × (d₁/d₂)²", "id": 291, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Dose Calculation", "stem": "A patient is prescribed a total dose of 6000 cGy delivered in fractions of 200 cGy each. How many total fractions will the patient receive?", "choices": ["25", "30", "20", "35"], "correct": 1, "expl": ["25 fractions × 200 cGy = 5000 cGy, not the prescribed 6000 cGy.", "Correct — Number of fractions = total dose ÷ dose per fraction = 6000 ÷ 200 = 30 fractions.", "20 fractions × 200 cGy = 4000 cGy, not the prescribed 6000 cGy.", "35 fractions × 200 cGy = 7000 cGy, exceeding the prescribed 6000 cGy."], "concept": "Number of fractions = total dose ÷ dose per fraction — a straightforward but essential prescription verification calculation.", "formula": "# fractions = Total dose ÷ dose/fraction", "id": 292, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Dose Calculation", "stem": "Which factor accounts for the change in scatter radiation reaching a point as field size changes, independent of the collimator setting itself?", "choices": ["Collimator scatter factor", "Phantom (patient) scatter factor", "Wedge factor", "Tray factor"], "correct": 1, "expl": ["Collimator scatter factor accounts for scatter originating from the collimator/treatment head as field size changes, a distinct component from patient scatter.", "Correct — phantom (patient) scatter factor accounts for the change in scattered radiation contribution from within the irradiated patient/phantom volume as field size changes.", "Wedge factor accounts for attenuation from a wedge, unrelated to field-size-dependent patient scatter.", "Tray factor accounts for attenuation from an accessory tray, unrelated to field-size-dependent scatter."], "concept": "Total scatter factor is often the product of collimator scatter factor and phantom scatter factor, each representing a distinct source of field-size-dependent dose contribution.", "formula": "", "id": 293, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Dose Calculation", "stem": "Percentage depth dose (PDD) generally increases with which combination of factors?", "choices": ["Increasing beam energy and increasing field size (to a point), and increasing SSD", "Decreasing beam energy and decreasing field size", "PDD is unaffected by any of these factors", "Decreasing SSD only, with no effect from energy or field size"], "correct": 0, "expl": ["Correct — PDD generally increases with higher beam energy (more penetrating, dmax shifts deeper), larger field size (more scatter contribution, though this effect plateaus), and increasing SSD (the Mayneord F factor effect).", "This describes factors that generally decrease, not increase, PDD.", "PDD is meaningfully affected by all three of these factors.", "SSD does affect PDD (increasing SSD increases PDD, the Mayneord effect), and energy/field size are also influential factors."], "concept": "Understanding how energy, field size, and SSD each independently influence PDD is fundamental to predicting and verifying dose distributions.", "formula": "", "id": 294, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Dose Calculation", "stem": "The Mayneord F factor is used to correct percentage depth dose data for a change in which parameter?", "choices": ["Beam energy only", "Field size only", "SSD (source-to-surface distance)", "Gantry angle"], "correct": 2, "expl": ["Energy-specific PDD data is generally obtained directly through measurement/tables, not derived via the Mayneord F factor.", "Field size changes are corrected using different equivalent square/scatter methods, not the Mayneord F factor specifically.", "Correct — the Mayneord F factor mathematically corrects PDD data for changes in SSD, accounting for the combined effects of the inverse square law and changing attenuation path as SSD changes.", "Gantry angle does not require Mayneord F factor correction; it is unrelated to SSD variation."], "concept": "The Mayneord F factor is a classic (though today often replaced by direct measurement/computer calculation) method for extending PDD tables to non-standard SSDs.", "formula": "F factor accounts for PDD variation with changing SSD", "id": 295, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Dose Calculation", "stem": "A wedge with a wedge factor of 0.65 is used for a field requiring 200 MU without the wedge to deliver the prescribed dose. Approximately how many MU are needed with the wedge in place to deliver the same dose (ignoring other minor corrections)?", "choices": ["308 MU", "260 MU", "200 MU", "130 MU"], "correct": 0, "expl": ["Correct — because a wedge attenuates the beam, MU must be increased to compensate: MU(with wedge) = MU(without wedge) ÷ wedge factor = 200 ÷ 0.65 ≈ 308 MU.", "260 MU is an overestimate not matching the correct division calculation.", "200 MU would not account for the wedge's attenuation of the beam, resulting in underdosing.", "130 MU would result from multiplying by the wedge factor, which underdelivers dose since the wedge attenuates the beam and thus requires more MU, not fewer, to compensate."], "concept": "Wedge factors (less than 1.0) represent beam attenuation; compensating MU calculations require dividing by (not multiplying by) the wedge factor to maintain the prescribed dose.", "formula": "MU(with modifier) = MU(without modifier) ÷ transmission factor", "id": 296, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Dose Calculation", "stem": "Off-axis dose points (points away from the central axis) require correction using which factor to account for beam profile variation across the field?", "choices": ["Wedge factor only", "Off-axis ratio (OAR)", "Tray factor", "Collimator scatter factor only"], "correct": 1, "expl": ["Wedge factor accounts for wedge attenuation specifically, not general off-axis profile variation (though wedges do create their own profile gradient, addressed via wedge-specific data).", "Correct — the off-axis ratio (OAR) accounts for the variation in beam intensity/profile at points away from the central axis, which is not perfectly flat even after flattening filter shaping.", "Tray factor accounts for accessory tray attenuation, unrelated to off-axis position.", "Collimator scatter factor accounts for field-size-dependent head scatter, not off-axis position specifically."], "concept": "Off-axis ratio corrections account for realistic beam profile variation across the field width, relevant to accurate dose calculation at any point beyond the central axis.", "formula": "", "id": 297, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Dose Calculation", "stem": "Which best describes the purpose of an inhomogeneity (heterogeneity) correction factor in dose calculation?", "choices": ["To correct for machine output drift over time", "To account for patient motion only", "To account for tissue density variations (e.g., lung, bone, air cavities) that affect photon attenuation and dose distribution compared to homogeneous water-equivalent tissue", "To correct for room temperature variation"], "correct": 2, "expl": ["Machine output calibration/drift is addressed through separate QA/calibration processes, not inhomogeneity correction.", "Motion is addressed through margins/motion management, not inhomogeneity correction factors.", "Correct — inhomogeneity corrections adjust dose calculations to account for tissue density variations (lung, bone, air cavities) that differ significantly from water-equivalent soft tissue, affecting beam attenuation and dose distribution, particularly relevant for lung and bone-adjacent targets.", "Room temperature is addressed through ionization chamber correction factors during calibration, not inhomogeneity correction in patient dose calculation."], "concept": "Inhomogeneity corrections (using CT-derived electron density information) are essential for accurate dose calculation in anatomically heterogeneous regions like the thorax.", "formula": "", "id": 298, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Dose Calculation", "stem": "A gap calculation between two abutting photon fields on the skin surface is performed primarily to:", "choices": ["Increase the total treatment time", "Eliminate the need for any field matching technique", "Determine the appropriate surface gap needed to avoid a hot spot (overlap) or cold spot (underdose) at depth due to beam divergence", "Calculate the patient's total cumulative dose only"], "correct": 2, "expl": ["Gap calculations address geometric field matching, not total treatment time.", "Gap calculations are themselves a field matching technique, not a means of eliminating the need for one.", "Correct — because photon beams diverge, a properly calculated surface gap between two adjacent fields ensures the beams do not overlap (hot spot) or leave an underdosed region (cold spot) at the depth of the target/junction.", "Gap calculations address geometric matching, not cumulative dose calculation broadly."], "concept": "Gap calculations use beam divergence geometry (half-beam angles and depth) to determine the surface separation needed for accurate field matching — a classic calculation-based board topic.", "formula": "", "id": 299, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Dose Calculation", "stem": "Which best describes the concept of \"equivalent square\" in dose calculation for rectangular treatment fields?", "choices": ["A method to convert a rectangular field into a square field of equivalent scatter-generating dimensions for use with square-field dosimetric data tables", "A method used only for circular fields", "A method to determine treatment time only", "A method to calculate the patient's exact body surface area"], "correct": 0, "expl": ["Correct — the equivalent square method allows a rectangular (or irregular) field to be represented by a square field with similar scatter characteristics, enabling use of standard square-field dosimetric data tables for dose calculation.", "Equivalent square methodology is specifically used for rectangular/irregular fields, not exclusively circular fields.", "Equivalent square supports dose/output factor determination, not directly treatment time calculation alone.", "Equivalent square is a beam/field geometry concept, not a body surface area calculation."], "concept": "Equivalent square calculations extend standard square-field dosimetric data to the wide variety of rectangular and irregular field shapes used clinically.", "formula": "", "id": 300, "catKey": "P3"}, {"cat": "Prescription and Dose Calculation", "sub": "Dose Calculation", "stem": "A patient's prescribed dose is 180 cGy per fraction for 28 fractions, followed by a boost of 200 cGy per fraction for 5 fractions. What is the total prescribed dose?", "choices": ["6040 cGy", "7040 cGy", "5040 cGy", "6440 cGy"], "correct": 0, "expl": ["Correct — Total dose = (180 x 28) + (200 x 5) = 5040 + 1000 = 6040 cGy.", "7040 cGy overstates the correct total.", "5040 cGy represents only the initial course (180 x 28), omitting the boost phase.", "6440 cGy overstates the correct total; it does not match the sum of the two phases."], "concept": "Multi-phase prescriptions (initial course + boost) require summing each phase's total dose (dose/fraction × fractions) to determine the overall prescribed dose.", "formula": "Total dose = Σ(dose/fraction × # fractions) for each treatment phase", "id": 301, "catKey": "P3"}, {"cat": "Treatments", "sub": "Treatment Options", "stem": "Adjuvant chemotherapy, as opposed to neoadjuvant chemotherapy, is administered:", "choices": ["Only during radiation therapy, never before or after", "Before the primary local treatment", "Only for palliative, not curative, intent", "After the primary local treatment (surgery and/or radiation), to eliminate residual microscopic disease"], "correct": 3, "expl": ["Concurrent (not exclusively during-only) administration describes a different treatment sequencing strategy; adjuvant refers specifically to post-local-treatment timing.", "This describes neoadjuvant, not adjuvant, timing.", "Adjuvant therapy is frequently used with curative intent, not exclusively for palliation.", "Correct — adjuvant therapy is given after definitive local treatment to eliminate residual microscopic disease and reduce recurrence risk."], "concept": "Adjuvant (after local therapy) vs. neoadjuvant (before local therapy) vs. concurrent (during radiation) — precise treatment sequencing terminology is frequently tested.", "formula": "", "id": 302, "catKey": "P4"}, {"cat": "Treatments", "sub": "Treatment Options", "stem": "Brachytherapy, as a treatment option, is generally characterized by which dosimetric advantage compared to external beam therapy for an appropriate target?", "choices": ["Identical dose distribution characteristics to external beam therapy", "A steep dose gradient allowing high dose to the target with relative sparing of nearby normal tissue due to the inverse square law from an internal source", "No ability to deliver a boost dose", "Lower total dose delivered to the tumor"], "correct": 1, "expl": ["Brachytherapy's internal source geometry produces distinctly different dose distribution characteristics compared to external beam.", "Correct — because the radioactive source is placed within or adjacent to the tumor, brachytherapy takes advantage of the inverse square law to create a steep dose fall-off, delivering high dose to the target while relatively sparing nearby normal tissue.", "Brachytherapy boosts (e.g., for cervical or prostate cancer) are a well-established, common clinical application.", "Brachytherapy often allows very high, not lower, doses to be delivered to the target."], "concept": "Brachytherapy's characteristic steep dose gradient (inverse square law from an internal source) is a key advantage exploited for dose escalation with normal tissue sparing.", "formula": "", "id": 303, "catKey": "P4"}, {"cat": "Treatments", "sub": "Treatment Options", "stem": "Multimodality treatment combining surgery, chemotherapy, and radiation therapy is often selected for which type of clinical scenario?", "choices": ["Only for very early-stage, low-risk tumors requiring minimal intervention", "Locally advanced or higher-risk tumors where combining modalities improves local control and/or survival compared to any single modality alone", "Only when the patient specifically requests it regardless of clinical indication", "Exclusively for benign tumors"], "correct": 1, "expl": ["Early-stage, low-risk tumors are often treated with a single modality; multimodality therapy is generally reserved for higher-risk or more advanced disease.", "Correct — multimodality treatment is typically employed for locally advanced or higher-risk malignancies where evidence supports improved outcomes (local control, survival) from combining surgery, chemotherapy, and/or radiation compared to any single modality.", "Multimodality treatment decisions are based on clinical evidence and disease characteristics, not simply patient preference alone.", "Multimodality cancer treatment is specific to malignant disease management, not benign tumors."], "concept": "Understanding when and why multimodality treatment is selected (based on disease stage/risk) reflects broader oncologic treatment-planning principles.", "formula": "", "id": 304, "catKey": "P4"}, {"cat": "Treatments", "sub": "Verification/Application", "stem": "Which best describes the clinical value of daily kV planar imaging compared to periodic (e.g., weekly) imaging for IGRT verification?", "choices": ["Daily imaging is never clinically indicated", "Daily imaging provides more frequent verification of patient position, which can be especially important for high-precision techniques or highly mobile targets, at the cost of additional imaging dose", "Weekly imaging is always sufficient regardless of technique or target", "Imaging frequency has no relationship to treatment precision requirements"], "correct": 1, "expl": ["Daily imaging is clinically indicated and standard for many modern high-precision treatment techniques.", "Correct — daily imaging offers more frequent position verification, valuable for high-precision techniques (e.g., SBRT) or targets with significant motion/setup variability, balanced against the added imaging dose.", "Imaging frequency should be individualized based on technique precision requirements and target stability, not universally fixed at a lower frequency for all cases.", "Imaging frequency is directly related to the required precision and stability of a given treatment technique."], "concept": "IGRT imaging frequency is a risk-based clinical decision balancing verification benefit against cumulative imaging dose, individualized to technique and target characteristics.", "formula": "", "id": 305, "catKey": "P4"}, {"cat": "Treatments", "sub": "Verification/Application", "stem": "Adaptive radiation therapy refers to which of the following practices?", "choices": ["Changing the treatment machine daily", "Systematically re-evaluating and, when necessary, modifying the treatment plan during the course of therapy to account for anatomical or tumor changes", "Only adjusting the patient's diet during treatment", "Never modifying the treatment plan once treatment begins"], "correct": 1, "expl": ["Adaptive therapy concerns plan adaptation, not machine selection.", "Correct — adaptive radiation therapy involves re-evaluating (and re-planning, if needed) the treatment based on observed anatomical or tumor changes during the treatment course, ensuring the plan remains optimal as the patient's anatomy evolves.", "Adaptive therapy concerns treatment plan modification, not dietary management.", "Adaptive therapy specifically involves plan modification when clinically indicated, not a strict never-modify approach."], "concept": "Adaptive radiation therapy reflects a modern approach to accounting for anatomical/tumor changes over a treatment course, made possible by frequent image guidance.", "formula": "", "id": 306, "catKey": "P4"}, {"cat": "Treatments", "sub": "Verification/Application", "stem": "Intensity-modulated radiation therapy (IMRT) achieves conformal dose distributions primarily through which mechanism?", "choices": ["Using only a single static field with no modulation", "Uniform, unmodulated beam intensity across all fields", "Modulating beam intensity across the field (via dynamic or segmented MLC motion) to create a highly conformal dose distribution that can also create concave shapes and avoid critical structures", "Eliminating the need for a treatment planning system"], "correct": 2, "expl": ["IMRT typically uses multiple modulated fields/beam angles, not a single static, unmodulated field.", "Uniform, unmodulated intensity describes conventional 3D-CRT, not IMRT.", "Correct — IMRT modulates beam intensity across the treatment field, typically via dynamic or step-and-shoot MLC motion, enabling highly conformal (including concave) dose distributions that can spare adjacent critical structures more effectively than conventional techniques.", "IMRT relies heavily on sophisticated inverse treatment planning systems, not something that eliminates the need for planning."], "concept": "IMRT's intensity modulation capability is the key technical advance enabling highly conformal, even concave, dose distributions unattainable with conventional 3D-CRT.", "formula": "", "id": 307, "catKey": "P4"}, {"cat": "Treatments", "sub": "Verification/Application", "stem": "Which imaging technique provides volumetric (3D) image guidance immediately before treatment, as opposed to a single 2D projection image?", "choices": ["MV portal imaging (single image)", "No imaging technique provides volumetric guidance", "kV planar imaging (single image)", "Cone beam CT (CBCT)"], "correct": 3, "expl": ["MV portal imaging provides a 2D projection, not volumetric information.", "CBCT is a widely used volumetric IGRT technique.", "kV planar imaging also provides a 2D projection, not volumetric information.", "Correct — CBCT acquires a volumetric (3D) dataset immediately before treatment, allowing direct 3D comparison to the planning CT and more comprehensive setup/anatomy verification than 2D projection imaging alone."], "concept": "CBCT's volumetric capability provides more comprehensive setup and soft-tissue verification compared to 2D planar (kV or MV) imaging alone.", "formula": "", "id": 308, "catKey": "P4"}, {"cat": "Treatments", "sub": "Machine Set-Up", "stem": "The optical or mechanical distance indicator (ODI/MDI) on a linear accelerator is used to verify:", "choices": ["The room's temperature", "The actual treatment distance (e.g., SSD) matches the intended treatment distance for the setup", "The patient's weight", "The gantry's rotational speed"], "correct": 1, "expl": ["Irrelevant to the ODI/MDI's function.", "Correct — the distance indicator projects a scale onto the patient's skin surface (or a reference point) to verify the actual treatment distance matches the intended SSD/SAD setup, critical for accurate dose delivery.", "Irrelevant to the ODI/MDI's function.", "Irrelevant to the ODI/MDI's function."], "concept": "The distance indicator is a practical daily verification tool ensuring treatment distance accuracy, directly tied to dose calculation assumptions (inverse square law).", "formula": "", "id": 309, "catKey": "P4"}, {"cat": "Treatments", "sub": "Machine Set-Up", "stem": "Which console control function allows the therapist to adjust and verify treatment parameters (gantry, collimator, MU) from inside the treatment room, near the patient, when needed?", "choices": ["Pendant controls", "The billing terminal", "The waiting room display", "The CT simulator console"], "correct": 0, "expl": ["Correct — pendant controls allow adjustment and verification of treatment parameters from within the treatment room, near the patient, useful for fine positioning adjustments and certain setup tasks before leaving the room.", "Irrelevant to treatment parameter adjustment.", "Irrelevant to treatment parameter adjustment.", "The CT simulator console is a separate system used for simulation, not treatment room parameter adjustment."], "concept": "Distinguish primary console controls (main control area, outside the vault) from pendant controls (in-room, portable) — each serving different practical functions in the treatment workflow.", "formula": "", "id": 310, "catKey": "P4"}, {"cat": "Treatments", "sub": "Machine Set-Up", "stem": "Surface guided radiation therapy (SGRT) primarily uses which technology to monitor patient position and motion in real time?", "choices": ["Ultrasound imaging exclusively", "Optical/structured light camera-based surface detection, without additional ionizing radiation", "MRI imaging during treatment", "Ionizing kV imaging continuously throughout treatment"], "correct": 1, "expl": ["Ultrasound is not the standard technology underlying SGRT.", "Correct — SGRT uses optical (structured light or camera-based) surface detection technology to monitor patient position and motion continuously without delivering additional ionizing radiation dose.", "While MR-linac systems exist, standard SGRT technology is optical/camera-based, not MRI-based.", "SGRT specifically avoids continuous ionizing imaging, using optical technology instead."], "concept": "SGRT's key advantage is real-time, non-ionizing position/motion monitoring, useful for setup verification, gating, and breath-hold monitoring without additional imaging dose.", "formula": "", "id": 311, "catKey": "P4"}, {"cat": "Treatments", "sub": "Machine Set-Up", "stem": "Which of the following is an example of a motion management technique relying on the patient actively holding their breath at a reproducible lung volume during each relevant portion of treatment?", "choices": ["Continuous free breathing with no motion management", "Free-breathing 4D-CT with ITV margin only", "Deep inspiration breath-hold (DIBH)", "Standard abdominal compression without breath instruction"], "correct": 2, "expl": ["This describes not using any motion management, the opposite of a breath-hold strategy.", "This describes a passive margin-based approach, not an active breath-hold technique.", "Correct — deep inspiration breath-hold (DIBH) requires the patient to actively hold their breath at a reproducible lung volume (often monitored via SGRT or spirometry) during beam delivery, commonly used to reduce cardiac dose in left breast irradiation.", "Standard abdominal compression does not require active patient breath-holding; it works through passive mechanical restriction."], "concept": "DIBH is a widely used, patient-active motion management technique, particularly valuable for reducing cardiac dose in left-sided breast cancer treatment.", "formula": "", "id": 312, "catKey": "P4"}, {"cat": "Treatments", "sub": "Treatment Accessories", "stem": "Enhanced dynamic wedges differ from physical wedges in that enhanced dynamic wedges achieve the wedge effect through:", "choices": ["Multileaf collimator motion only, unrelated to jaw movement", "Programmed, dynamic motion of one collimator jaw during beam delivery, without a physical attenuator", "Manual insertion of a wedge tray by the therapist during each fraction", "A solid physical attenuating wedge-shaped block placed in the beam"], "correct": 1, "expl": ["While MLC-based approaches to wedge-like effects exist in some systems, the classic \"enhanced dynamic wedge\" specifically refers to jaw-motion-based delivery.", "Correct — enhanced dynamic wedges achieve the wedge dose effect through programmed, dynamic motion of a collimator jaw during beam delivery, eliminating the need for a physical attenuating wedge block and its associated setup/handling.", "Dynamic wedges do not require manual physical tray insertion for each fraction, unlike physical wedges.", "This describes a physical wedge, not an enhanced dynamic wedge."], "concept": "Physical wedges (solid attenuator) vs. dynamic wedges (jaw motion) achieve similar dosimetric effects through fundamentally different delivery mechanisms.", "formula": "", "id": 313, "catKey": "P4"}, {"cat": "Treatments", "sub": "Treatment Accessories", "stem": "Custom immobilization devices, compared to standard (off-the-shelf) devices, offer which primary advantage?", "choices": ["No need for quality assurance checks", "Lower cost in all cases", "Faster fabrication time in every case", "Individualized fit to the specific patient's anatomy, potentially improving setup reproducibility for complex or high-precision cases"], "correct": 3, "expl": ["All immobilization devices, custom or standard, require appropriate quality assurance and verification.", "Custom devices are often more resource-intensive/costly to fabricate than standard devices, not necessarily lower cost.", "Custom device fabrication typically requires additional time compared to using an off-the-shelf standard device.", "Correct — custom immobilization devices are individually fabricated to a specific patient's anatomy, often improving setup reproducibility for complex cases or high-precision techniques (e.g., SBRT, SRS) compared to standard, generic devices."], "concept": "The custom vs. standard immobilization device choice reflects a trade-off between individualized precision and fabrication time/resource considerations, guided by clinical precision requirements.", "formula": "", "id": 314, "catKey": "P4"}, {"cat": "Treatments", "sub": "Treatment Administration", "stem": "Which best describes the purpose of a \"record and verify\" system in modern radiation therapy delivery?", "choices": ["To electronically capture, verify, and cross-check treatment parameters against the approved plan before allowing beam delivery, reducing the risk of delivery errors", "To manage the department's employee schedules", "To replace the need for any physician chart review", "To record patient billing information only"], "correct": 0, "expl": ["Correct — record and verify (R&V) systems electronically compare treatment parameters at the time of delivery against the approved plan, flagging discrepancies and helping prevent delivery errors — a critical safety technology in modern radiation therapy.", "Irrelevant to R&V system function.", "R&V systems support, but do not replace, physician oversight and chart review processes.", "Billing is unrelated to the clinical safety function of record and verify systems."], "concept": "Record and verify systems are a foundational patient safety technology, providing an electronic safeguard against treatment delivery errors.", "formula": "", "id": 315, "catKey": "P4"}, {"cat": "Treatments", "sub": "Treatment Administration", "stem": "A therapist notices the treatment console displays a parameter (e.g., gantry angle) that does not match the approved treatment plan just before beam-on. What is the correct action?", "choices": ["Proceed and simply note the discrepancy for later review after treatment is completed", "Manually override the record and verify system without investigation", "Proceed with treatment since minor discrepancies are unimportant", "Stop and resolve the discrepancy before proceeding, involving physics/physician as needed, since even small deviations can be clinically significant"], "correct": 3, "expl": ["Discrepancies must be resolved before delivery, not simply documented for later review after potentially incorrect treatment has already been delivered.", "Overriding a safety system without investigation is inappropriate and unsafe.", "Any parameter mismatch identified before beam-on must be resolved, not dismissed, regardless of apparent magnitude.", "Correct — any discrepancy between displayed treatment parameters and the approved plan must be resolved before treatment proceeds, since even small deviations (e.g., wrong gantry angle) can significantly affect dose delivery and safety."], "concept": "Never proceeding past an unresolved safety-relevant discrepancy is a foundational patient safety principle in daily treatment delivery.", "formula": "", "id": 316, "catKey": "P4"}, {"cat": "Treatments", "sub": "Treatment Administration", "stem": "Which type of equipment malfunction category would a sudden, unexpected beam-off event caused by a software fault most likely be classified under?", "choices": ["Radiation malfunction", "Electrical malfunction unrelated to software", "Purely mechanical malfunction", "Software malfunction"], "correct": 3, "expl": ["A software-triggered event is specifically categorized as a software malfunction, not a general radiation malfunction category.", "While related systems may be electrically powered, a fault specifically attributed to software is categorized as a software malfunction.", "Mechanical malfunction refers to physical/moving component failures, not software issues.", "Correct — a beam-off event caused by a software fault is classified as a software malfunction, one of the recognized equipment malfunction categories (radiation, electrical, mechanical, software) requiring appropriate troubleshooting and documentation."], "concept": "Understanding equipment malfunction categories (radiation, electrical, mechanical, software) supports appropriate troubleshooting, documentation, and reporting processes.", "formula": "", "id": 317, "catKey": "P4"}, {"cat": "Treatments", "sub": "Treatment Administration", "stem": "Following an equipment malfunction during treatment, which step is essential before treatment can safely resume?", "choices": ["Discharging the patient from the department permanently", "Appropriate troubleshooting, verification that the issue has been resolved (often involving physics/engineering), and documentation of the event before resuming treatment", "No documentation is needed if the issue seems to resolve itself", "Immediately resuming treatment without any further verification"], "correct": 1, "expl": ["Discharge from the department is not an appropriate response to an equipment malfunction event.", "Correct — appropriate troubleshooting, verification of resolution (often with physics/engineering involvement), and thorough documentation are all required before treatment safely resumes following an equipment malfunction.", "Documentation is required regardless of whether an issue appears to self-resolve, to maintain a complete safety record and allow trend monitoring.", "Resuming without verification and documentation risks patient safety and violates standard safety protocol."], "concept": "A structured troubleshooting, verification, and documentation process following any equipment malfunction is essential to maintaining a safe treatment environment.", "formula": "", "id": 318, "catKey": "P4"}, {"cat": "Patient Interactions and Management", "sub": "Medical Emergencies", "stem": "A patient's chart lists signs concerning for increased intracranial pressure. Which of the following would NOT typically be included?", "choices": ["Intense headache", "Coma", "Nausea", "Bradycardia (as part of Cushing's triad, seen with severe elevation)"], "correct": 3, "expl": ["Intense headache is a classic early symptom of elevated ICP.", "Coma reflects severe, advanced elevated ICP.", "Nausea is a common early sign of elevated ICP.", "Correct — bradycardia is actually a recognized sign of severely elevated ICP as part of Cushing's triad (hypertension, bradycardia, irregular respirations), so it should NOT be excluded from the list; among the options, this is the one that IS a sign of increased ICP rather than an exception, making it the answer to an 'except' question testing recognition of Cushing's triad."], "concept": "Elevated intracranial pressure classically presents with headache, nausea/vomiting, and altered consciousness progressing to coma; late-stage findings include Cushing's triad (bradycardia, hypertension, irregular breathing) — a critical medical emergency recognition skill.", "formula": "", "id": 319, "catKey": "PC1"}, {"cat": "Patient Interactions and Management", "sub": "Ergonomics/Monitoring", "stem": "When transporting or repositioning a patient wh
